##### 公共配置 #####
global
	log 127.0.0.1	local0
	log 127.0.0.1	local1 notice
	chroot /var/lib/haproxy
	stats socket /run/haproxy/admin.sock mode 660 level admin
	stats timeout 30s
	user haproxy
	group haproxy
	daemon

##### 默认配置 #####
defaults
    log global
    retries 3
    timeout connect 5000
    timeout client  50000
    timeout server  50000

##### 管理员配置监听 #####
listen stats 
    bind *:8404
    mode http
    stats enable 
    stats uri /haproxy?stats
    stats refresh 10s
    stats admin if TRUE
    stats auth admin:zomAmcCrUpLOgCCYuZFcCWHohvZv

##### 代理配置 #####
frontend 


backend 
