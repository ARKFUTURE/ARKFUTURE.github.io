#-#-#-#-#-#-#-#-#-#-#-#-#操作员设置#-#-#-#-#-#-#-#-#-#-#-#-#
# <class>标签定义了一组服务器操作员特权.此标签可以根据需要定义多次
<class name="Shutdown"
       commands="DIE RESTART REHASH LOADMODULE UNLOADMODULE RELOADMODULE GLOADMODULE GUNLOADMODULE GRELOADMODULE"
       privs="users/auspex channels/auspex servers/auspex users/mass-message users/flood/no-throttle users/flood/increased-buffers servers/ignore-blockamsg users/ignore-callerid channels/ignore-chanfilter users/ignore-commonchans users/ignore-privdeaf channels/ignore-delaymsg servers/use-disabled-commands servers/use-disabled-modes channels/ignore-noctcp users/ignore-noctcp channels/ignore-nonicks channels/ignore-opmoderated channels/ignore-repeat channels/restricted-create servers/ignore-securelist servers/ignore-shun"
       usermodes="*"
       chanmodes="*"
       snomasks="*">
<class name="SACommands" 
       commands="SAJOIN SAPART SANICK SAQUIT SATOPIC SAKICK SAMODE OJOIN"
       privs="users/samode-usermodes users/sajoin-others"
       usermodes="*"
       chanmodes="*">
<class name="ServerLink"
       commands="CONNECT SQUIT RCONNECT RSQUIT MKPASSWD ALLTIME SWHOIS"
       privs="servers/auspex"
       usermodes="*"
       chanmodes="*"
       snomasks="Cc">
<class name="BanControl"
       commands="KILL GLINE KLINE ZLINE QLINE ELINE TLINE RLINE CHECK NICKLOCK NICKUNLOCK SHUN CBAN"
       usermodes="*"
       chanmodes="*"
       snomasks="Xx">
<class name="OperChat"
       commands="WALLOPS GLOBOPS"
       privs="users/mass-message"
       usermodes="*"
       chanmodes="*"
       snomasks="Gg">
<class name="HostCloak"
       commands="SETHOST SETIDENT SETIDLE CHGNAME CHGHOST CHGIDENT"
       privs="users/auspex"
       usermodes="*" 
       chanmodes="*">

# <type>标签定义了服务器操作员的类型.此标签可以根据需要定义多次.
<type name="NetAdmin"
      classes="SACommands OperChat BanControl HostCloak Shutdown ServerLink"
      override="BANWALK INVITE KEY LIMIT"
      automotd="yes"
      modes="+s +cCqQ"
      vhost="NetAdmin">
<type name="GlobalOp"
      classes="SACommands OperChat BanControl HostCloak ServerLink"
      vhost="GlobalOp">
<type name="Helper"
      classes="HostCloak"
      modes="+h"
      vhost="Helper">


