# 服务器连接/irc服务连接
# 官网例子: https://github.com/inspircd/inspircd/blob/insp4/docs/conf/links.example.conf


#-#-#-#-#-#-#-#-#-#-#-  ircService链接配置  -#-#-#-#-#-#-#-#-#-#
# sasl Model 需要在modules.conf中手动启用,默认为不启用
<sasl requiressl="yes"
      target="ircs.arkfuture.irc">

# 为了anope开启本地监听
<bind port="7000" type="servers">

# 连接anope
<link name="ircs.arkfuture.irc"
      ipaddr="127.0.0.1"
      port="7000"
      allowmask="*"
      timeout="5m"
      statshidden="no"
      hidden="no"
      sendpass="FEhZyMU8DQX3A3MPApTF"
      recvpass="FEhZyMU8DQX3A3MPApTF">

# uline
<uline server="ircs.arkfuture.irc" silent="yes">
