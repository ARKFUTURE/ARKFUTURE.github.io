#-#-#-#-#-#-#-#-#-#-#-  ircService链接配置  -#-#-#-#-#-#-#-#-#-#
# 为anope开启本地监听
<bind port="7000" type="servers">

# 连接anope
<link name="ircs.arkfuture.irc"
      ipaddr="127.0.0.1"
      port="7000"
      allowmask="*"
      timeout="1m"
      statshidden="no"
      hidden="no"
      sendpass="FEhZyMU8DQX3A3MPApTF"
      recvpass="FEhZyMU8DQX3A3MPApTF">

# services标记
<services server="ircs.arkfuture.irc" silent="yes">
