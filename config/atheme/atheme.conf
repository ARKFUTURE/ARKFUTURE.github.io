/* atheme conf ---UTF-8 ---Security configuration
 *
 * 这只是一个基础的设置(模板)文件 我们展示了部分值展示给您 它可能需要根据您的需求进行调整. 
 * !!!!此文件已经经过实际测试,可以使用最新版本正常运行!!!!
 *
 * 您可以在官方文档中查询详细设置来完善此设置,我们的设置基于官方文档. 
 */

/******************************************************************************
 * 模块部分.                                                                   *
 ******************************************************************************/

/*
 * 这些是与 Services 核心发行版一起附带的模块. 
 *
 * 你可能也对 atheme 社区模块发行版感兴趣,
 * 它增加了额外的功能, 这些功能可能与该项目的旨在维护
 * atheme-services 核心的范式不兼容. 
 *
 * 请访问 atheme-services 网站获取更多信息并下载它们. 
 *
 * 标记为 [experimental] 的模块会污染你的 atheme-services 实例. 如果
 * 你在使用这些模块的情况下遇到问题, 请不要向我们提交任何错误报告;
 * 它们将被忽略. 
 */

/* 动态安全模块. 
 *
 * 警告: 如果你选择了这些模块之一, Atheme 包含的默认安全策略
 * 可能会被破坏. 这些模块适用于那些知道自己在做什么
 * 并理解其操作含义的人. 可能破坏默认策略的安全模块
 * 前缀为 [!], 如果你是 Atheme 的新手,
 * 你应该避免启用它们. 
 *
 * 如果你发现你的安全策略被破坏, 你可以通过将 Atheme 置于"permissive mode"来调试它,
 * 同时允许你的 IRC 网络正常运行. 为此, 请启用 general::permissive_mode. 
 *
 * [!] 推断 "command:" 命名空间权限   modules/security/cmdperm
 */
#loadmodule "modules/security/cmdperm";

/* 协议模块. 
 *
 * 请选择一个协议模块. 不同的服务器使用不同的协议. 
 * 以下是已知可与各种可用协议模块配合使用的 ircd 列表. 
 *
 * Asuka 1.2.1 或更高版本                         modules/protocol/asuka
 * Bahamut 1.8.x                                modules/protocol/bahamut
 * Charybdis IRCd                               modules/protocol/charybdis
 * DreamForge 4.6.7 或更高版本                    modules/protocol/dreamforge
 * InspIRCd 2.0                                 modules/protocol/inspircd
 * ircd-ratbox 2.0 及更高版本                    modules/protocol/ratbox
 * IRCNet ircd (ircd 2.11)                      modules/protocol/ircnet
 * ircd-seven                                   modules/protocol/ircd-seven
 * Nefarious IRCu 0.4.0 或更高版本                modules/protocol/nefarious
 * ngIRCd 19 或更高版本 [experimental]            modules/protocol/ngircd
 * UnrealIRCd 3.2.*                             modules/protocol/unreal
 * UnrealIRCd 4 或更高版本                        modules/protocol/unreal4
 *
 * 如果你的 IRCd 供应商提供了模块文件, 请构建它并在此处加载它,
 * 而不是加载上面的模块. 
 */
loadmodule "modules/protocol/inspircd";

/* 协议混入模块. 
 *
 * 如果你的网络没有/不想要某些你的 ircd 通常具有的功能, 则应使用这些模块. 
 * 如果你不知道这意味着什么, 则不需要它们中的任何一个. 
 *
 * 禁用 halfops                              modules/protocol/mixin_nohalfops
 * 禁用 holdnick (使用 enforcer 客户端)      modules/protocol/mixin_noholdnick
 * 禁用通道的 "protect" 模式                modules/protocol/mixin_noprotect
 * 禁用通道的 "owner" 模式                  modules/protocol/mixin_noowner
 */
#loadmodule "modules/protocol/mixin_nohalfops";
#loadmodule "modules/protocol/mixin_noholdnick";
#loadmodule "modules/protocol/mixin_noprotect";
#loadmodule "modules/protocol/mixin_noowner";

/* 数据库后端模块. 
 *
 * 请选择一个数据库后端模块. 不同的后端允许
 * 以不同的方式操作 services 数据. 你只能加载这些后端模块中的**一个**. 
 *
 * 以下后端可用:
 *
 * Atheme 0.1 平面文件数据库格式          modules/backend/flatfile
 * Open Services Exchange 数据库格式       modules/backend/opensex
 *
 * 大多数网络会想要 opensex. 
 */
loadmodule "modules/backend/opensex";

/* 加密模块. 
 *
 * 如果你想为你的 services 密码使用加密, 请
 * 在此处选择一个模块. 请注意, 在启动加密模块后,
 * 你的密码会立即且不可逆地被转换. 在尝试此操作之前,
 * 请对你的数据库进行**至少两次**备份. 
 * 如果你有数千个帐户, 此转换可能需要
 * 相当长的时间. 
 *
 * 以下加密模块可用:
 *
	* Argon2d (密码哈希竞赛, v1.3) modules/crypto/argon2d
	* PBKDF2 加密 (新, 推荐)       modules/crypto/pbkdf2v2
	* PBKDF2 加密 (旧, 兼容性)     modules/crypto/pbkdf2
	* POSIX 风格的 crypt(3)        modules/crypto/posix
	* IRCServices (以及 Anope 等) 兼容性   modules/crypto/ircservices
	* 原始 MD5 (Anope 兼容性)                modules/crypto/rawmd5
	* 原始 SHA1 (Anope 兼容性)               modules/crypto/rawsha1
 *
 * ircservices, rawmd5 和 rawsha1 模块仅推荐用于
 * 从启用了密码加密的其他 services 转换而来的数据库. 
 *
 * 要在加密方案之间过渡, 请首先加载首选方案,
 * 随着用户登录, 他们将被迁移到新的首选方案. 例如:
 *
 * loadmodule "modules/crypto/argon2d";
 * loadmodule "modules/crypto/pbkdf2v2";
 * loadmodule "modules/crypto/pbkdf2";
 * loadmodule "modules/crypto/posix";
 * loadmodule "modules/crypto/ircservices";
 *
 * rawsha1, pbkdf2 和 pbkdf2v2 模块需要 OpenSSL. 
 * Argon2d 模块没有依赖项, 并且是推荐的. 
 */
#loadmodule "modules/crypto/argon2d";
loadmodule "modules/crypto/posix";

/* 认证模块. 
 *
 * 这些允许使用来自外部系统的密码. 
 * 注册新帐户时给出的密码也会针对外部
 * 系统进行检查. 
 *
 * 以下认证模块可用:
 *
 * LDAP                                         modules/auth/ldap
 *
 * LDAP 模块需要 OpenLDAP 客户端库. 它以同步方式使用它们,
 * 这意味着无响应的 LDAP 服务器可能会冻结 services. 
 */
#loadmodule "modules/auth/ldap";

