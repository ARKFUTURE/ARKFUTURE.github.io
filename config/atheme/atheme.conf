 ******************************************************************************/

/*
 * 如果你正在使用 modules/crypto/argon2d 模块, 可以编辑此配置块.
 * 建议保持默认值, 或通过实验调整参数, 使得用户身份验证过程耗时约 0.5-1.0 秒.
 * 在计算或验证哈希值时, Services 会被阻塞, 因此不要将这些值设置得过大, 
 * 否则攻击者可以通过大量密码尝试导致服务挂起.
 */
argon2d {

	/* 内存成本(以 2 的幂次表示, 单位为 KiB)
	 * 有效值范围: 8(256 KiB)至 20(1 GiB), 包含两端
	 * 默认值为 14
	 */
	#memory = 14;      /* 2^14 KiB == 16384 KiB(16 MiB) */

	/* 时间成本(对内存的迭代次数)
	 * 有效值范围: 4 至 16384, 包含两端
	 * 默认值为 32
	 */
	#time = 32;
};

/*
 * 如果你正在使用 modules/crypto/pbkdf2v2 模块, 可以编辑此配置块.
 * 关于参数选择的建议, 请参见上方 argon2d {} 配置块的注释, 同样适用于此处.
 */
pbkdf2v2 {

	/* 摘要算法
	 * 有效值: "SHA1"、"SHA256"、"SHA512"
	 * 默认值为 "SHA512"
	 */
	#digest = "SHA512";

	/* 迭代轮数
	 * 有效值范围: 10000 至 5000000, 包含两端
	 * 默认值为 64000
	 */
	#rounds = 64000;
};


/* serverinfo{} 块定义了我们在 IRC 网络上的外观.  */
serverinfo {
	/* name
	 * 此程序在 IRC 网络上使用的服务器名称. 
	 * 这是你必须在 C:/N:Lines 中使用的名称. 它必须在 IRC 网络上
	 * 是唯一的, 并且至少包含一个点, 但不必等于任何 DNS 名称. 
	 */
	name = "ircs.arkfuture.irc";

	/* desc
	 * 我们发送到 IRC 网络的 ``服务器注释''. 
	 */
	desc = "ARKFUTURE IRC Services";

	/* numeric
	 * 某些协议驱动 (Charybdis, Ratbox2, P10, IRCNet)
	 * 需要一个服务器 ID, 也称为数字. 在提供此值时, 请查阅你的
	 * ircd 的文档. 
	 */
	numeric = "00A";

	/* (*)recontime
	 * 我们重新连接到 uplink 之前的秒数. 
	 */
	recontime = 10;

	/* (*)netname
	 * 你的网络名称. 
	 */
	netname = "ARKFUTURE";

	/* (*)hidehostsuffix
	 * P10 +x 主机隐藏给出 <account>.<hidehostsuffix>. 
	 * 如果在 asuka 上使用 +x, 这必须与 F:HIDDEN_HOST
	 * 一致. 
	 */
	hidehostsuffix = ".users.AFENet";

	/* (*)adminname
	 * 运行此服务的人员姓名. 
	 */
	adminname = "arkfutureadmin";

	/* (*)adminemail
	 * 运行此服务的人员的电子邮件地址. 
	 */
	adminemail = "s3rs38i7j@mozmail.com";

	/* (*)registeremail
	 * 消息应从中发出的电子邮件地址. 
	 * 如果未设置, 则将使用 "noreply.$adminemail". 
	 */
	registeremail = "noreply@admin.tld";

	/* (*)hidden
	 * 如果启用, Atheme 将向上游 IRCd 指示
	 * 它不应包含在 /links 输出中. 这目前仅适用于
	 * 以下 IRCd: charybdis, ircd-seven, ratbox. 
	 */
	#hidden;

	/* (*)mta
	 * 你的邮件传输代理的完整路径. 
	 * 这用于电子邮件授权和密码检索. 
	 * 注释掉此项以禁用发送电子邮件. 
	 * 警告: 发送电子邮件可能会泄露你 services 的 IP,
	 * 除非你采取预防措施 (此处不进一步讨论). 
	 */
	mta = "/usr/bin/msmtp";

	/* (*)loglevel
	 * 指定要在主 Atheme 日志文件 (通常为 var/atheme.log) 中记录的
	 * 日志信息默认类别. 
	 *
	 * 选项包括:
	 *      debug, all      - 所有可能类别的元关键字
	 *      trace           - 少量信息的元关键字
	 *      misc            - 类似于 trace, 但包含更多杂项信息
	 *      notice          - 类似通知信息的元关键字
	 * ------------------------------------------------------------------------------
	 *      error           - 关键错误
	 *      info            - 杂项日志通知
	 *      verbose         - 比 info 更详细一点, 没有 debug 那么 spammy
	 *      commands        - 所有命令使用
	 *      admin           - 管理命令使用
	 *      register        - 帐户和频道注册
	 *      set             - 帐户或频道设置的更改
	 *      request         - 用户请求 (目前仅 vhosts)
	 *      network         - 与网络状态相关的日志通知
	 *      rawdata         - 记录 services 发送和接收的原始数据
	 *      wallops         - <尚未使用>
	 */
	loglevel = { error; info; admin; network; wallops; };

	/* (*)maxlogins
	 * 允许登录到一个用户名的最大会话数是多少?
	 * 这减少了潜在的滥用. 仅在登录时检查. 
	 */
	maxlogins = 5;

	/* (*)maxusers
	 * 一个电子邮件地址可以注册的最大用户名数是多少?
	 * 设置为 0 以禁用此检查 (目前可能很慢). 
	 */
	maxusers = 5;

	/* (*)mdlimit
	 * 可以添加到一个对象上的元数据条目数是多少?
	 */
	mdlimit = 30;

	/* (*)emaillimit, emailtime
	 * 在该时间段 (秒) 内允许发送的最大电子邮件数. 
	 * 如果超过此限制, 将发送 wallops, 最多每分钟一次. 
	 */
	emaillimit = 10;
	emailtime = 300;

	/* (*)auth
	 * 你想要什么类型的用户名注册授权?
	 * 如果是 "email", Atheme 将向该地址发送确认电子邮件以
	 * 确保其有效. 如果注册未在一天内完成,
	 * 用户名将过期. 如果是 "none", 则不会发送消息,
	 * 用户名将完全注册. 
	 * 有效值为: email, none. 
	 */
	auth = none;

	/* casemapping
	 * 指定要使用的大小写映射. 几乎所有 TSora (以及任何正确遵循 RFC 的)
	 * ircd 都将使用 rfc1459 大小写映射. Bahamut, Unreal
	 * 和其他 ``Dalnet'' ircd 将使用 ascii 大小写映射. 
	 * 有效值为: rfc1459, ascii. 
	 */
	casemapping = ascii;
};

/* uplink{} 块定义到 IRC 服务器的连接. 
 * 可以定义多个, 但一次只会使用一个 (IRC
 * 是一个树状网络). Atheme 目前不支持通过 SSL 链接. 
 * 要通过 ssl 链接 Atheme, 请将 Atheme 连接到本地 ircd,
 * 并让该 ircd 通过 SSL 连接到你的网络. 
 */
uplink "irc.arkfuture.irc" {
	// 你正在链接到的 ircd 的服务器名称在上面. 

	// host
	// 要连接的主机名. 
	host = "127.0.0.1";

	// vhost
	// 从中连接的源 IP, 用于具有多个接口的机器. 
	#vhost = "192.0.2.5";

	// send_password
	// 为链接发送的密码. 
	#send_password = "";

	// receive_password
	// 为链接接收的密码. 
	#receive_password = "";
	password = "FEhZyMU8DQX3A3MPApTF";

	// port
	// 要连接的端口. 
	port = 7000;
};

/* Services 配置. 
 *
 * 这些块中的每一个都可以包含 nick, user, host, real 和 aliases. 
 * 其中一些还具有特定于该服务的选项. 
 */

/* NickServ 配置. 
 *
 * nickserv {} 块包含特定于 NickServ 模块的设置. 
 *
 * NickServ 提供昵称或用户名注册和认证
 * 服务. 它提供了 Services 正确运行所需的必要认证功能. 
 * 你应该确保这些设置为你的网络正确配置. 
 */
nickserv {
	/* (*)spam
	 * 让 NickServ 告诉人们它和 ChanServ 有多棒. 
	 */
	spam;

	/* no_nick_ownership
	 * 启用此选项以禁用昵称所有权 (旧的 userserv{}). 
	 * 这会将大多数消息中的 "nickname" 更改为 "account",
	 * 对未登录到同一帐户的用户禁用 GHOST,
	 * 并使 spam 指令无效. 
	 * 建议将 nick 设置为 UserServ, 加载 login.so
	 * 而不是 identify.so, 并且不加载 ghost.so. 
	 */
	#no_nick_ownership;

	/* (*)nick
	 * 我们希望 NickServ 拥有的昵称. 
	 */
	nick = "NickServ";

	/* (*)user
	 * 我们希望 NickServ 拥有的用户名. 
	 */
	user = "NickServ";

	/* (*)host
	 * 我们希望 NickServ 拥有的主机名. 
	 */
	host = "AFE.ircSERVICE";

	/* (*)real
	 * 我们希望 NickServ 拥有的 realname (gecos) 信息. 
	 */
	real = "Nickname Services";

	/* (*)aliases
	 * NickServ 的命令别名. 
	 */
	aliases {
		"ID" = "IDENTIFY";
		"MYACCESS" = "LISTCHANS";
	};

	/* (*)access
	 * 此块允许你修改运行命令所需的访问级别. 
	 * 可能的访问列表在此 .conf 后面的 operclass
	 * 部分中列出. 请注意, 你只能在实际命令上设置访问权限,
	 * 而不能在别名上设置. 
	 */
	access {
	};

	/* (*)maxnicks
	 * 如果加载了 GROUP, 一个用户名可以注册的最大昵称数是多少?
	 */
	maxnicks = 5;

	/* (*)expire
	 * 非活动注册过期前的天数. 
	 */
	expire = 100;

	/* (*)enforce_expire
	 * 多少天不使用后, 忽略昵称上的强制执行设置. 
	 */
	#enforce_expire = 14;

	/* (*)enforce_delay
	 * 延迟昵称更改强制执行设置的秒数. 
	 */
	#enforce_delay = 30;
	
	/* (*)enforce_prefix
	 * 在强制执行时更改用户昵称时要使用的前缀
	 */
	#enforce_prefix = "Guest";

	/* (*)cracklib_dict
	 * 用于 nickserv/cracklib 的 cracklib 字典的位置和文件名前缀. 
	 * 如果你打算使用 nickserv/cracklib, 则必须提供此项. 
	 */
	#cracklib_dict = "/var/cache/cracklib/cracklib_dict";

	/* (*)cracklib_warn
	 * 如果设置了此选项并且加载了 nickserv/cracklib, nickserv 将仅
	 * 警告用户其密码不安全, 建议他们更改密码,
	 * 但仍然注册昵称. 如果未设置此选项, 它将完全拒绝
	 * 注册昵称, 直到用户选择更好的密码. 
	 */
	#cracklib_warn;

	/* (*)emailexempts
	 * 将免于检查一个用户可能拥有多少帐户的电子邮件地址列表. 
	 * 此块中的任何电子邮件地址都可以注册
	 * 无限数量的帐户/用户名. 
	 */
	emailexempts {
	};
};

/* ChanServ 配置. 
 *
 * chanserv {} 块包含特定于 ChanServ 模块的设置. 
 *
 * ChanServ 提供频道注册服务, 允许用户拥有
 * 频道. 它不是必需的, 但强烈推荐. 
 */
chanserv {
	/* (*)nick
	 * 我们希望客户端拥有的昵称. 
	 */
	nick = "ChanServ";

	/* (*)user
	 * 我们希望客户端拥有的用户名. 
	 */
	user = "ChanServ";

	/* (*)host
	 * 我们希望客户端拥有的主机名. 
	 */
	host = "AFE.ircSERVICE";

	/* (*)real
	 * 客户端的 GECOS. 
	 */
	real = "Channel Services";

	/* (*)aliases
	 * ChanServ 的命令别名. 
	 */
	aliases {
	};
	
	/* (*)access
	 * ChanServ 的命令访问更改. 
	 */
	access {
	};

	/* (*)maxchans
	 * 一个用户名可以注册的最大频道数是多少?
	 */
	maxchans = 5;

	/* fantasy
	 * 你想启用 fantasy 命令吗? 这可能会消耗大量 CPU,
	 * 并且只有在你也启用了 join_chans 时才有效. 
	 */
	fantasy;

	/* (*) hide_xop
	 * 隐藏 XOP 模板. 如果你希望使用模板
	 * 而不显示 XOP 模板, 这很有用. 
	 */
	#hide_xop;

	/* (*) templates
	 * 定义全局模板包含哪些标志. 
	 *
	 * 对于特殊的 XOP 模板:
	 * 这些都应该不同, 并且不等于空集,
	 * 除了 hop 可以等于 vop 以禁用 hop. 
	 * 每个后续级别应该有更多的标志 (除了 +VHO). 
	 * 为了 /cs forcexop 的最佳功能, aop 不应包含任何 +sRf,
	 * hop 不应包含任何 +sRfoOr, vop 不应包含任何 +sRfoOrhHt. 
	 * 如果未指定, 则使用 Atheme 0.3 的值,
	 * 这些值通常不如这些直观. 
	 * 注意: 更改这些会保持现有频道访问条目的标志不变,
	 * 从而将它们从 /cs xop list 的视图中移除. 
	 * 通常频道 founder 可以使用 /cs forcexop 将条目更新
	 * 到新级别. 
	 *
	 * 建议:
	 * 如果你想添加一个联合创始人角色, 请从 SOP 角色中移除 flags 权限,
	 * 并定义一个具有 flags 权限的联合创始人角色. 
	 */
	templates {
		vop = "+AV";
		hop = "+AHehitrv";
		aop = "+AOehiortv";
		sop = "+AOaefhiorstv";

		founder = "+AFORaefhiorstv";

		/* 一些示例 (已被注释掉...) */
		#member = "+Ai";
		#op = "+AOiortv";
	};

	/* (*) deftemplates
	 * 定义要设置在新频道上的默认模板, 以
	 * 空格分隔的 name=+flags 对列表. 
	 * 注意: 目前对此不进行语法检查;
	 * 你自己有责任确保其正确. 
	 */
	#deftemplates = "MEMBER=+Ai OP=+AOeiortv";

	/* (*) changets
	 * 当某人重新创建一个已注册的频道时, 将频道 TS 更改为注册时间,
	 * 确保他们被解除操作权限并且所有他们的模式都被撤销. 
	 * 请注意, 这涉及 ChanServ 加入. 
	 * 当频道没有被重新创建时, 不会执行解除操作权限
	 * (除了 SECURE 选项). 
	 * 这也解决了 "join-mode" 问题, 即某人重新创建一个已注册的频道,
	 * 然后在被解除操作权限之前设置一些模式. 
	 * 目前支持 charybdis, ratbox, bahamut
	 * 和 inspircd 1.1+. 对于 charybdis 和 ratbox, 它只完全
	 * 适用于 TS6, 对于 TS5, 禁令和最后一刻的模式仍将
	 * 应用. 
	 * (在第一次启用此功能时, 这也可以被利用. )
	 */
	#changets;

	/* (*) trigger
	 * 此设置允许你更改 ChanServ 的频道内命令功能的触发前缀
	 * (可通过 chanserv::fantasy 禁用). 
	 * 如果未提供设置, 则使用默认值 "!". 
	 *
	 * 你可以考虑尝试的其他设置: ".", "~", "?", "`", "'". 
	 */
	trigger = "!";

	/* (*)expire
	 * 非活动注册过期前的天数. 
	 */
	expire = 30;

	/* (*)maxchanacs
	 * 频道的访问列表中允许的最大条目数
	 * (包括频道操作员和 akicks), 0 表示无限制. 
	 */
	maxchanacs = 0;

	/* (*)maxfounders
	 * 一个频道中允许的最大 founder 数. 
	 * 请注意, 所有 founder 都具有完全相同的权限,
	 * 并且 founder 列表会在多个地方显示. 
	 */
	maxfounders = 4;

	/* (*)founder_flags
	 * 用户注册新频道时将获得的标志. 
	 * 这必须至少包含 'F', 否则将被忽略. 
	 * 如果未设置, Atheme 将授予用户所有频道标志. 
	 */
	#founder_flags = "AFORefiorstv";

	/* (*)akick_time
	 * AKICK 的默认过期时间 (以分钟为单位). 
	 * 注释掉此选项或设置为零, 以使默认情况下 AKICK 永久有效
	 * (旧行为). 
	 */
	#akick_time = 10;

	/* (*)antiflood_enforce_method
	 * 默认情况下用于洪水保护的强制执行方法. 
	 * 频道工作人员可以覆盖此设置. 
	 * 可用选项为: quiet, kickban 和 akill. 
	 */
	antiflood_enforce_method = quiet;
};

