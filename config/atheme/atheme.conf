	nick = "StatServ";

	/* (*)user
	 * 我们希望 StatServ 拥有的用户名. 
	 */
	user = "StatServ";

	/* (*)host
	 * 我们希望 StatServ 拥有的主机名. 
	 */
	host = "AFE.ircSERVICE";

	/* (*)real
	 * 我们希望 StatServ 拥有的 realname (gecos) 信息. 
	 */
	real = "Statistics Services";
};

/* ALIS 配置. 
 *
 * alis {} 块包含特定于 ALIS 模块的设置. 
 */
alis {
	/* (*)nick
	 * 我们希望 ALIS 拥有的昵称. 
	 */
	nick = "ALIS";

	/* (*)user
	 * 我们希望 ALIS 拥有的用户名. 
	 */
	user = "alis";

	/* (*)host
	 * 我们希望 ALIS 拥有的主机名. 
	 */
	host = "AFE.ircSERVICE";

	/* (*)real
	 * 我们希望 ALIS 拥有的 realname (gecos) 信息. 
	 */
	real = "Channel Directory";
};

/* HTTP 服务器配置. 
 *
 * httpd {} 块包含特定于 HTTP 服务器模块的设置. 
 *
 * Services 中的 HTTP 服务器用于提供 XMLRPC 请求. 它也可以
 * 提供静态文档和统计页面. 
 */
httpd {
	/* host
	 * HTTP 服务器将监听的主机. 
	 * 如果你想监听所有可用的主机, 请使用 0.0.0.0. 
	 */
	host = "0.0.0.0";

	/* host (ipv6)
	 * 如果你愿意, 你也可以让 Atheme 监听 IPv6 主机. 
	 * 如果你想监听所有可用的 IPv6 主机, 请使用 ::. 
	 */
	#host = "::";

	/* www_root
	 * 包含应由 httpd 提供的文件的目录. 
	 */
	www_root = "/var/www";

	/* port
	 * HTTP 服务器将监听的端口. 
	 */
	port = 8080;
};

/* LDAP 配置. 
 *
 * ldap {} 块包含特定于 LDAP 认证模块的设置. 
 */
ldap {
	/* (*)url
	 * 要使用的服务器的 LDAP URL. 
	 */
	url = "ldap://127.0.0.1";

	/* (*)dnformat
	 * 将帐户名称转换为 LDAP DN 的格式字符串. 
	 * 必须恰好包含一个 %s, 它将被帐户名称替换. 
	 * Services 将尝试使用此 DN 和给定的密码进行简单绑定;
	 * 如果成功, 则认为密码正确. 
	 */
	dnformat = "cn=%s,dc=jillestest,dc=com";
};

/******************************************************************************
 * 日志记录部分.                                                               *
 ******************************************************************************/

/*
 * logfile{} 块可用于设置除 services 使用的主日志文件之外的日志文件,
 * 主日志文件由 serverinfo::loglevel 控制. 
 *
 * 各种日志记录类别为:
 *      debug, all      - 所有可能类别的元关键字
 *      trace           - 少量信息的元关键字
 *      misc            - 类似于 trace, 但包含更多杂项信息
 *      notice          - 类似通知信息的元关键字
 * ------------------------------------------------------------------------------
 *      error           - 关键错误
 *      info            - 杂项日志通知
 *      verbose         - 比 info 更详细一点, 没有 debug 那么 spammy
 *      commands        - 所有命令使用
 *      admin           - 管理命令使用
 *      register        - 帐户和频道注册
 *      set             - 帐户或频道设置的更改
 *      request         - 用户请求 (目前仅 vhosts)
 *      network         - 与网络状态相关的日志通知
 *      rawdata         - 记录 services 发送和接收的原始数据
 *      wallops         - <尚未使用>
 *      denycmd         - 安全模型拒绝 (命令, 权限)
 */

/*
 * 此块将所有帐户和频道注册及删除,
 * 以及帐户和频道设置更改记录到 var/account.log. 
 */
logfile "var/log/atheme/account.log" { register; set; };

/*
 * 此块将所有命令使用记录到 var/commands.log. 
 */
logfile "var/log/atheme/commands.log" { commands; };

/*
 * 此块将所有安全审计信息记录到 var/audit.log. 
 */
logfile "var/log/atheme/audit.log" { denycmd; };

/*
 * 你也可以记录到 IRC 频道, 甚至可以按类别进行拆分. 
 * 此条目提供与旧 snoop 功能大致相同的功能. 
 */
logfile "#arkfuture_ao" { error; info; admin; request; register; denycmd; };

/*
 * 此块记录到服务器通知. 
 */
#logfile "!snotices" { error; info; request; denycmd; };

/******************************************************************************
 * 通用参数配置部分.                                                           *
 ******************************************************************************/

/* general {} 块定义通用配置选项.  */
general {
	/* (*)permissive_mode
	 * 安全拒绝应该是软拒绝而不是硬拒绝. 
	 * 如果安全拒绝是软拒绝, 那么它们将只被记录到拒绝日志中. 
	 */
	#permissive_mode;

	/* (*)helpchan
	 * 网络帮助频道. 当用户请求不存在的命令的帮助时,
	 * 向用户显示. 
	 */
	#helpchan = "#help";

	/* (*)helpurl
	 * 用于 services 帮助的网络网页. 当用户请求不存在的命令的帮助时,
	 * 向用户显示. 
	 */
	#helpurl = "http://www.stack.nl/~jilles/irc/atheme-help/";

	/* (*)silent
	 * 如果你想阻止 services 发送关于事情的 WALLOPS/GLOBOPS,
	 * 请取消注释此选项. 不推荐. 
	 */
	#silent;

	/* (*)verbose_wallops
	 * 如果你希望 services 向你发送有关正在发生的事件
	 * (特别是 AKILL) 的更多信息, 请取消注释下面的指令. 
	 *
	 * 警告！这可能会导致大量的 wallops/globops 洪水. 
	 */
	#verbose_wallops;

	/* (*)join_chans
	 * 是否允许 ChanServ 加入已注册的频道?
	 * 此选项对于 fantasy 命令集很有用. 
	 *
	 * 如果启用, 你可以通过 SET GUARD ON 告诉 ChanServ 加入. 
	 *
	 * 如果你使用 ircu 类的 ircd (asuka), 你必须保持此项启用,
	 * 并将 guard 放在默认的 cflags 中. 
	 *
	 * 对于 ratbox, 建议保持启用并将其放入默认的 cflags 中,
	 * 以便 ChanServ 不必为了做某些事情而加入/离开. 
	 * 另一方面, 启用此选项会增加机器人与 ChanServ 争斗的可能性. 
	 *
	 * 无论此选项如何, 如果需要强制执行 akick/restricted/close,
	 * 以及如果启用了 changets 则更改 TS,
	 * ChanServ 将临时加入否则为空的频道. 
	 */
	join_chans;

	/* (*)leave_chans
	 * 在其他人都离开后, 我们是否离开已注册的频道?
	 * 关闭此选项几乎没有意义, 除了通过保持频道开放来标记 "官方"
	 * 网络频道, 以及保留主题和 +beI 列表. 
	 */
	leave_chans;

	/* secure
	 * 你是否要求使用 /msg <service>@<services host>?
	 * 启用此选项有助于防止欺骗, 但由于大多数网络目前不使用它,
	 * 因此默认禁用. 
	 */
	#secure;

	/* (*)uflags
	 * 注册时要为用户名的设置的默认标志. 
	 * 有效值为: hold, neverop, noop, hidemail, nomemo, emailmemos,
	 * enforce, privmsg, private, quietchg 和 none. 
	 */
	uflags = { hidemail; };

	/* (*)cflags
	 * 注册时要为频道设置的默认标志. 
	 * 有效值为: hold, secure, verbose, verbose_ops, keeptopic,
	 * topiclock, guard, private, nosync, limitflags, pubacl 和 none. 
	 */
	cflags = { verbose; guard; };

	/* (*)raw
	 * 你是否允许 SRA 使用 RAW 和 INJECT 命令?
	 * 这些命令用于调试. 如果你不知道如何使用它们,
	 * 请不要启用它们. 它们不受支持. 
	 */
	#raw;

	/* (*)flood_msgs
	 * 你是否希望 services 检测洪水?
	 * 设置为触发洪水之前有多少条消息. 
	 * 请注意, 某些需要大量处理的消息计为两条或四条消息. 
	 * 如果 services 在 `flood_time` 内收到 `flood_msgs` 条消息,
	 * 用户将触发洪水保护. 设置为零可禁用洪水保护. 
	 */
	flood_msgs = 7;

	/* (*)flood_time
	 * 你是否希望 services 检测洪水?
	 * 设置为计数器重置前的时间长度. 
	 * 如果 services 在 `flood_time` 内收到 `flood_msgs` 条消息,
	 * 用户将触发洪水保护. 
	 */
	flood_time = 10;

	/* (*)ratelimit_uses
	 * 命令使用多少次后用户将被限流. 
	 * 用户在 `ratelimit_period` 内使用某个命令达到 `ratelimit_uses` 次后,
	 * 在该时间段结束前将无法运行该受限命令. 
	 * 注释掉此选项、下面的 ratelimit_period 或同时注释掉两者以禁用限流. 
	 * 当前用于 helpserv/helpme, helpserv/ticket, hostserv/request,
	 * nickserv/register 和 chanserv/register. 
	 */
	ratelimit_uses = 5;

	/* (*)ratelimit_period
	 * ratelimit_uses 计数器将在多长时间 (秒) 后重置. 
	 * 用户在 `ratelimit_period` 内使用某个命令达到 `ratelimit_uses` 次后,
	 * 在该时间段结束前将无法运行该受限命令. 
	 * 注释掉此选项、上面的 ratelimit_uses 或同时注释掉两者以禁用限流. 
	 * 当前用于 helpserv/helpme, helpserv/ticket, hostserv/request,
	 * nickserv/register 和 chanserv/register. 
	 */
	ratelimit_period = 60;

	/* (*)kline_time
	 * KLINE 的默认过期时间, 以天为单位. 
	 * 设置为 0 将使所有 KLINE 永久有效. 
	 */
	kline_time = 7;

	/* (*)kline_with_ident
	 * 使用 user@host 而不是 *@host 进行 KLINE. 
	 * 适用于 services 设置的所有自动 KLINE. 
	 */
	#kline_with_ident;

	/* (*)kline_verified_ident
	 * 如果 ident 的第一个字符是 ~, 则使用 *@host 进行 KLINE,
	 * 无论 kline_with_ident 的值如何. 
	 */
	#kline_verified_ident;

	/* (*)clone_time
	 * 这是 CLONE 豁免的默认过期时间, 以分钟为单位. 
	 * 设置为 0 将使所有 CLONE 豁免永久有效. 
	 */
	clone_time = 0;

	/* commit_interval
	 * 数据库写入之间的时间间隔, 以分钟为单位. 
	 */
	commit_interval = 5;

	/* (*)default_clone_allowed
	 * 超过此限制后, 克隆将被 KILL 或 TKLINE. 
	 * 由 operserv/clones 使用. 
	 */
	default_clone_allowed = 5;

	/* (*)default_clone_warn
	 * 超过此限制后, 克隆将被警告他们可能不能再有更多并发连接. 
	 * 应低于 default_clone_allowed. 由 operserv/clones 使用. 
	 */
	default_clone_warn = 4;

	/* (*)clone_identified_increase_limit
	 * 如果启用此选项, 则每个标识到 services 的克隆,
	 * IP/主机的克隆限制将增加 1. 这有一个上限, 即上述克隆限制的两倍. 
	 */
	clone_identified_increase_limit;

	/* (*)uplink_sendq_limit
	 * 可以排队等待发送到 uplink 的最大数据量, 以字节为单位. 
	 * 这应该足以容纳 Atheme 对网络突发数据的响应,
	 * 但小于 IRCd 对服务器的 sendq 限制. 
	 */
	uplink_sendq_limit = 1048576;

	/* (*)language
	 * 用于频道和 oper 消息以及用户默认使用的语言. 
	 */
	language = "en";

	/* exempts
	 * 此块包含一个 user@host 掩码列表. 匹配其中任何一个的用户
	 * 都不会被 services 自动 K:line. 
	 */
	exempts {
	};

	/* allow_taint
	 * 通过启用此选项, Atheme 将在上游不提供支持的配置中运行. 
	 * 启用此功能即表示你放弃任何认为获得支持的权利. 
	 */
	#allow_taint;

	/* (*)immune_level
	 * 此选项允许你自定义获得踢人免疫权限的操作员级别. 
	 *
	 * 以下标志可用:
	 *    immune - 需要踢人免疫所需的任何 ircd 用户模式 (这是默认值);
	 *    admin  - 需要管理员权限才能获得踢人免疫
	 *    ircop  - 需要任何 ircop 权限才能获得踢人免疫 (用户模式 +o)
	 */
	immune_level = immune;

	/* show_entity_id
	 * 这使得昵称/用户和组实体 ID 对所有人可见,
	 * 而不仅仅是具有 user:auspex 或 group:auspex 权限的操作员. 
	 */
	show_entity_id;
};

proxyscan {
	/* 在这里你可以配置 Proxyscan (DNS 黑名单) 扫描服务
	 * 的详细信息. 
	 */

	nick = "Proxyscan";
	user = "dnsbl";
	host = "AFE.ircSERVICE";
	real = "Proxyscan Service";

	blacklists {
	 "dnsbl.dronebl.org";
	 "rbl.efnetrbl.org";
	 "tor.efnet.org";
	};
	
	/* 可用的 dnsbl_action:
	 * NONE - 什么都不做
	 * NOTIFY - 通知用户他们列在 DNSBL 中以及列在哪个中
	 * SNOOP - 向日志频道或 services 频道报告用户
	 * KLINE - 从网络中 AKILL 用户 (默认 AKILL 为 24 小时)
	 */
	 
	dnsbl_action = kline;
};

/******************************************************************************
 * 操作员和权限配置部分.                                                       *
 ******************************************************************************/

/* 操作员配置
 * 有关更多信息, 请参阅 PRIVILEGES 文档. 
 * 注意: 所有更改在重新哈希后立即生效. 你可能需要发送一个信号
 * (killall -HUP atheme-services) 来重新获得控制权. 
 */
/* (*) Operclass 指定 services 操作员权限的组 */
/* "user" operclass 指定所有用户获得的权限. 
 * 这可以为空 (默认), 在这种情况下用户不会获得特殊权限. 
 * 如果你使用 security/cmdperm 模块, 你需要为你希望用户能够使用的
 * 每个命令授予 command: 权限. 
 */
operclass "user" { };

/* "ircop" operclass 指定所有 IRCop 获得的权限. 
 * 这可以为空, 在这种情况下 IRCop 不会获得任何权限. 
 * 建议至少包含 chan:cmodes, chan:joinstaffonly 和 general:auspex. 
 */
operclass "ircop" {
	privs {
		special:ircop;
	};

	privs {
		user:auspex;
		user:admin;
		user:sendpass;
		user:vhost;
		user:mark;
	};

	privs {
		chan:auspex;
		chan:admin;
		chan:cmodes;
		chan:joinstaffonly;
	};

	privs {
		general:auspex;
		general:helper;
		general:viewprivs;
		general:flood;
	};

	privs {
		operserv:omode;
		operserv:akill;
		operserv:jupe;
		operserv:global;
	};

	privs {
		group:auspex;
		group:admin;
	};
};

operclass "sra" {
	/* 你可以从较低级别的 operclass 继承权限.  */
	extends "ircop";

	privs {
		user:hold;
		user:regnolimit;
	};

	privs {
		general:metadata;
		general:admin;
	};

	privs {
		#operserv:massakill;
		#operserv:akill-anymask;
		operserv:noop;
		operserv:grant;
		#operserv:override;
	};

	/* needoper
	 * 仅当 IRC 用户被操作时, 才授予此 oper class 中的 IRC 用户权限;
	 * 其他权限使用 (频道继承, XMLRPC 等) 不受此影响. 
	 *
	 * 此标志 *不会* 被扩展此 operclass 的子类继承;
	 * 你将需要为每个 operclass 显式设置它. 
	 */
	needoper;
};


/* (*) Operator 块指定具有某些权限的帐户
 * Oper class 必须在 operator 块中使用之前定义. 
 */
operator "arkfutureadmin" {
	/* operclass */
	operclass = "sra";
	/* password
	 * 通常, 用户需要使用帐户的密码进行标识/登录,
	 * 并且可能需要是 IRCop (请参阅上面的 operclass::needoper). 
	 * 如果你认为这不够安全, 你可以在此处指定一个额外的密码,
	 * 用户必须使用 OperServ IDENTIFY 命令输入该密码,
	 * 然后才能使用权限. 
	 * 如果正在使用加密模块, 密码必须加密. 
	 */
	#password = "$1$3gJMO9by$0G60YE6GqmuHVH3AnFPor1";
};

