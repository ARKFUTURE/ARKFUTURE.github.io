<!DOCTYPE html>
<html lang="zh-CN">
<!-- 1.1 -->
<head>
	<meta charset="UTF-8" version="1.7">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<meta name="description" content="ARKFUTURE-NET IRC">
	<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
	<meta http-equiv="Pragma" content="no-cache">
	<meta http-equiv="Expires" content="0">
	<title>IRC Web Client</title>
	<style>
	:root {
		--c-cyan:    #00e5ff;
		--c-magenta: #e040fb;
		--c-yellow:  #ffd740;
		--c-green:   #69ff47;
		--c-red:     #ff1744;
		--c-orange:  #ff6d00;

		--bg-base:   #0d0d0f;
		--bg-raised: #141418;
		--bg-overlay:#1a1a20;
		--bg-hover:  #202028;
		--bg-active: #252530;

		--bd-subtle:  #242430;
		--bd-default: #2e2e3c;
		--bd-strong:  #3a3a4a;

		--tx-primary:  #e8e8f0;
		--tx-secondary:#9898b0;
		--tx-muted:    #55556a;
		--tx-link:     var(--c-cyan);

		--glow-cyan:    0 0 8px rgba(0,229,255,.5), 0 0 20px rgba(0,229,255,.2);
		--glow-magenta: 0 0 8px rgba(224,64,251,.5), 0 0 20px rgba(224,64,251,.2);
		--glow-green:   0 0 8px rgba(105,255,71,.5), 0 0 20px rgba(105,255,71,.2);
		--glow-red:     0 0 8px rgba(255,23,68,.5),  0 0 20px rgba(255,23,68,.2);

		--sp-1: 4px;
		--sp-2: 8px;
		--sp-3: 12px;
		--sp-4: 16px;
		--sp-5: 20px;
		--sp-6: 24px;

		--font-ui:   -apple-system, 'Segoe UI', system-ui, sans-serif;
		--font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', 'Courier New', monospace;
		--font-size-xs:  10px;
		--font-size-sm:  11px;
		--font-size-md:  13px;
		--font-size-lg:  15px;

		--sidebar-w: 220px;
		--panel-w:   260px;
		--header-h:  48px;
		--tabbar-h:  36px;
		--input-h:   56px;

		--radius-sm: 4px;
		--radius-md: 6px;
		--radius-lg: 10px;
		--transition: all 0.18s cubic-bezier(.4,0,.2,1);

		/* JS colour aliases – DO NOT REMOVE */
		--cyber-primary:   var(--c-cyan);
		--cyber-secondary: var(--c-magenta);
		--cyber-accent:    var(--c-yellow);
		--cyber-green:     var(--c-green);
		--cyber-red:       var(--c-red);
		--cyber-dark:      var(--bg-base);
		--cyber-dark2:     var(--bg-raised);
		--cyber-dark3:     var(--bg-overlay);
		--cyber-border:    var(--bd-default);
		--cyber-text:      var(--tx-primary);
		--cyber-text-dim:  var(--tx-secondary);
		--glow-primary:    var(--glow-cyan);
		--glow-secondary:  var(--glow-magenta);

		--clr-font:       var(--tx-primary);
		--clr-info:       var(--c-cyan);
		--clr-success:    var(--c-green);
		--clr-warning:    var(--c-yellow);
		--clr-error:      var(--c-red);
		--clr-red:        var(--c-red);
		--clr-green:      var(--c-green);
		--clr-blue:       var(--c-cyan);
		--clr-purple:     var(--c-magenta);
		--clr-gold:       var(--c-yellow);
		--clr-brown:      #cd853f;
		--clr-accent:     var(--c-yellow);
		--clr-secondary:  var(--c-magenta);
		--clr-text-dim:   var(--tx-secondary);
	}

	*, *::before, *::after {
		box-sizing: border-box;
		margin: 0; padding: 0;
	}

	button, input, select, textarea, [role="button"],
	.irc-menu__btn, .settings-toggle-btn, .header-menu-item,
	.channel-item, .user-item, .sidebar-header, .tab-btn,
	.irc-header, .irc-sidebar, .irc-tabbar {
		user-select: none;
		-webkit-user-select: none;
	}
	::-webkit-scrollbar { width: 4px; height: 4px; }
	::-webkit-scrollbar-track { background: transparent; }
	::-webkit-scrollbar-thumb { background: var(--bd-strong); border-radius: 99px; }
	::-webkit-scrollbar-thumb:hover { background: var(--c-cyan); }
	* { scrollbar-width: thin; scrollbar-color: var(--bd-strong) transparent; }

	html, body {
		height: 100%; overflow: hidden;
		font-family: var(--font-mono);
		font-size: var(--font-size-md);
		line-height: 1.6;
		background: var(--bg-base);
		color: var(--tx-primary);
		-webkit-font-smoothing: antialiased;
	}

	.irc-app {
		display: flex;
		flex-direction: column;
		height: 100vh;
		overflow: hidden;
	}

	.irc-header {
		flex: 0 0 var(--header-h);
		display: flex;
		align-items: center;
		justify-content: space-between;
		padding: 0 var(--sp-4);
		background: var(--bg-raised);
		border-bottom: 1px solid var(--bd-subtle);
		gap: var(--sp-3);
		z-index: 200;
	}

	.irc-header__left {
		display: flex;
		align-items: center;
		gap: var(--sp-3);
		min-width: 0;
	}

	.irc-header__title {
		font-size: 14px;
		font-weight: 700;
		color: var(--c-cyan);
		letter-spacing: 3px;
		text-transform: uppercase;
		white-space: nowrap;
		text-shadow: 0 0 12px rgba(0,229,255,.6);
	}

	.connection-status {
		display: inline-flex;
		align-items: center;
		gap: 6px;
		padding: 3px 10px;
		background: var(--bg-overlay);
		border: 1px solid var(--bd-default);
		border-radius: 99px;
		font-size: var(--font-size-xs);
		font-family: var(--font-mono);
		letter-spacing: .5px;
		white-space: nowrap;
		transition: var(--transition);
		/* button reset */
		cursor: pointer;
		outline: none;
		text-align: left;
	}
	/* Disconnected (red) — hover deepens red */
	.connection-status.disconnected:hover {
		border-color: rgba(255,23,68,.6);
		background: rgba(255,23,68,.1);
		box-shadow: 0 0 8px rgba(255,23,68,.2);
	}
	.connection-status.disconnected:hover .indicator {
		box-shadow: 0 0 8px var(--c-red);
	}
	/* Connected (green) — hover deepens green */
	.connection-status.connected:hover {
		border-color: rgba(105,255,71,.6);
		background: rgba(105,255,71,.1);
		box-shadow: 0 0 8px rgba(105,255,71,.2);
	}
	.connection-status.connected:hover .indicator {
		box-shadow: 0 0 8px var(--c-green);
	}
	/* Connecting — not interactive */
	.connection-status.connecting {
		cursor: default;
		pointer-events: none;
	}
	.connection-status .indicator {
		width: 7px; height: 7px;
		border-radius: 50%;
		background: var(--tx-muted);
		flex-shrink: 0;
		transition: var(--transition);
	}
	.connection-status.connected    { border-color: rgba(105,255,71,.4);  color: var(--c-green);  }
	.connection-status.connecting   { border-color: rgba(255,215,64,.4);  color: var(--c-yellow); animation: pulse 1.2s ease infinite; }
	.connection-status.disconnected { border-color: rgba(255,23,68,.35);  color: var(--c-red);   }
	.connection-status.connected  .indicator { background: var(--c-green);  box-shadow: 0 0 6px var(--c-green); }
	.connection-status.connecting .indicator { background: var(--c-yellow); box-shadow: 0 0 6px var(--c-yellow); animation: pulse 1.2s ease infinite; }
	.connection-status.disconnected .indicator { background: var(--c-red); box-shadow: 0 0 6px var(--c-red); }

	@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
	@keyframes shake {
		0%,100%{transform:translateX(0)}
		20%{transform:translateX(-4px)} 40%{transform:translateX(4px)}
		60%{transform:translateX(-3px)} 80%{transform:translateX(3px)}
	}
	@keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
	@keyframes slideIn { from{transform:translateX(8px);opacity:0} to{transform:translateX(0);opacity:1} }

	.irc-header__right {
		display: flex;
		align-items: center;
		gap: var(--sp-2);
		flex-shrink: 0;
	}

	.irc-menu { position: relative; }

	.irc-menu__btn {
		background: var(--bg-overlay);
		color: var(--tx-secondary);
		border: 1px solid var(--bd-default);
		border-radius: var(--radius-sm);
		padding: 5px 12px;
		cursor: pointer;
		font-size: var(--font-size-sm);
		font-family: var(--font-mono);
		letter-spacing: .5px;
		transition: var(--transition);
		display: flex; align-items: center; gap: 5px;
	}
	.irc-menu__btn:hover {
		background: var(--bg-hover);
		color: var(--c-cyan);
		border-color: rgba(0,229,255,.35);
	}

	.settings-toggle-btn {
		background: var(--bg-overlay);
		color: var(--tx-secondary);
		border: 1px solid var(--bd-default);
		border-radius: var(--radius-sm);
		padding: 5px 12px;
		cursor: pointer;
		font-size: var(--font-size-sm);
		font-family: var(--font-mono);
		letter-spacing: .5px;
		transition: var(--transition);
		display: flex; align-items: center; gap: 5px;
		white-space: nowrap;
	}
	.settings-toggle-btn:hover {
		background: var(--bg-hover);
		color: var(--c-cyan);
		border-color: rgba(0,229,255,.35);
	}
	.settings-toggle-btn.active {
		background: rgba(0,229,255,.1);
		color: var(--c-cyan);
		border-color: rgba(0,229,255,.5);
	}

	.irc-menu__dropdown {
		display: none;
		position: absolute;
		top: calc(100% + 6px);
		right: 0;
		min-width: 160px;
		background: var(--bg-overlay);
		border: 1px solid var(--bd-default);
		border-radius: var(--radius-md);
		box-shadow: 0 8px 32px rgba(0,0,0,.6), 0 0 0 1px rgba(0,229,255,.06);
		z-index: 9999;
		padding: 6px;
		animation: fadeIn .15s ease;
	}
	.irc-menu__dropdown.visible { display: block; }

	.header-menu-item {
		cursor: pointer;
		font-size: var(--font-size-sm);
		font-family: var(--font-mono);
		letter-spacing: .3px;
		padding: 7px 12px;
		color: var(--tx-secondary);
		border-radius: var(--radius-sm);
		transition: var(--transition);
		display: flex; align-items: center; gap: 8px;
	}
	.header-menu-item:hover { background: var(--bg-hover); color: var(--tx-primary); }
	.header-menu-item:nth-child(1):hover { color: var(--c-cyan); }
	.header-menu-item:nth-child(2):hover { color: var(--c-magenta); }
	.header-menu-item:nth-child(3):hover { color: var(--c-yellow); }
	.header-menu-item:nth-child(4):hover { color: var(--c-green); }
	.header-menu-item.active {
		background: rgba(105,255,71,.12);
		color: var(--c-green);
	}
	.header-menu-item.active::before { content:'✓'; margin-right: 2px; }

	.irc-settings {
		flex: 0 0 auto;
		overflow: hidden;
		max-height: 0;
		transition: max-height .3s cubic-bezier(.4,0,.2,1), border-color .3s;
		background: var(--bg-raised);
		border-bottom: 1px solid transparent;
	}
	.irc-settings.open {
		max-height: 200px;
		border-bottom-color: var(--bd-subtle);
	}

	.irc-settings__inner {
		display: flex;
		flex-wrap: wrap;
		align-items: flex-end;
		gap: var(--sp-3) var(--sp-4);
		padding: var(--sp-3) var(--sp-4);
	}

	.settings-group {
		display: flex;
		flex-direction: column;
		gap: 4px;
		flex: 0 0 auto;
	}
	.settings-group label {
		font-size: var(--font-size-xs);
		color: var(--tx-muted);
		text-transform: uppercase;
		letter-spacing: .8px;
		font-family: var(--font-ui);
	}
	.settings-group input[type="text"],
	.settings-group input[type="password"] {
		padding: 6px 10px;
		background: var(--bg-base);
		color: var(--tx-primary);
		border: 1px solid var(--bd-default);
		border-radius: var(--radius-sm);
		font-size: var(--font-size-sm);
		font-family: var(--font-mono);
		width: 170px;
		transition: var(--transition);
	}
	.settings-group input:focus {
		outline: none;
		border-color: rgba(0,229,255,.6);
		box-shadow: 0 0 0 2px rgba(0,229,255,.12);
	}
	.settings-group input.input-error {
		border-color: var(--c-red) !important;
		box-shadow: 0 0 0 2px rgba(255,23,68,.2) !important;
		animation: shake .35s ease;
	}

	.settings-group__row {
		display: flex;
		gap: var(--sp-1);
		align-items: center;
	}
	.settings-group__row input { flex: 1; min-width: 0; }

	.irc-settings__actions {
		display: flex;
		gap: var(--sp-2);
		align-items: center;
		margin-left: auto;
		flex-shrink: 0;
	}

	#saslGroup label, #saslPassGroup label { color: rgba(255,215,64,.7); }

	.btn {
		display: inline-flex;
		align-items: center;
		justify-content: center;
		gap: 5px;
		padding: 6px 14px;
		background: transparent;
		color: var(--c-cyan);
		border: 1px solid rgba(0,229,255,.4);
		border-radius: var(--radius-sm);
		cursor: pointer;
		font-size: var(--font-size-sm);
		font-family: var(--font-mono);
		white-space: nowrap;
		letter-spacing: .3px;
		transition: var(--transition);
	}
	.btn:hover {
		background: rgba(0,229,255,.1);
		border-color: var(--c-cyan);
		color: var(--c-cyan);
		box-shadow: var(--glow-cyan);
	}
	.btn:disabled {
		border-color: var(--bd-default);
		color: var(--tx-muted);
		cursor: not-allowed;
	}
	.btn:disabled:hover { background: transparent; box-shadow: none; }

	.connect-btn {
		color: var(--c-green);
		border-color: rgba(105,255,71,.4);
		background: rgba(105,255,71,.07);
	}
	.connect-btn:hover {
		background: rgba(105,255,71,.18);
		border-color: var(--c-green);
		box-shadow: var(--glow-green);
		color: var(--c-green);
	}
	.connect-btn.disconnect {
		color: var(--c-red);
		border-color: rgba(255,23,68,.4);
		background: rgba(255,23,68,.07);
	}
	.connect-btn.disconnect:hover {
		background: rgba(255,23,68,.18);
		border-color: var(--c-red);
		box-shadow: var(--glow-red);
	}

	.send-btn {
		padding: 6px 18px;
		background: rgba(0,229,255,.15);
		color: var(--c-cyan);
		border: 1px solid rgba(0,229,255,.5);
		border-radius: var(--radius-sm);
		cursor: pointer;
		font-size: var(--font-size-sm);
		font-family: var(--font-mono);
		white-space: nowrap;
		letter-spacing: .5px;
		transition: var(--transition);
		flex-shrink: 0;
	}
	.send-btn:hover {
		background: rgba(0,229,255,.28);
		border-color: var(--c-cyan);
		box-shadow: var(--glow-cyan);
	}
	.send-btn:disabled {
		background: var(--bg-base);
		border-color: var(--bd-default);
		color: var(--tx-muted);
		cursor: not-allowed;
	}

	.ssl-warning {
		display: none;
		position: fixed;
		bottom: 24px; right: 24px;
		max-width: 380px;
		background: var(--bg-overlay);
		border: 1px solid rgba(255,215,64,.5);
		border-radius: var(--radius-md);
		color: var(--tx-primary);
		padding: var(--sp-3) var(--sp-4);
		font-size: 12px;
		line-height: 1.5;
		z-index: 9000;
		box-shadow: 0 8px 32px rgba(0,0,0,.5), 0 0 20px rgba(255,215,64,.1);
	}
	.ssl-warning.visible { display: block; animation: slideIn .2s ease; }
	.ssl-warning a { color: var(--c-cyan); text-decoration: underline; cursor: pointer; }
	.ssl-warning code {
		background: var(--bg-base);
		padding: 1px 5px;
		border: 1px solid var(--bd-default);
		border-radius: 3px;
		font-family: var(--font-mono);
		font-size: 11px;
	}

	.irc-chat {
		flex: 1 1 auto;
		display: flex;
		flex-direction: column;
		overflow: hidden;
		position: relative;
		min-height: 0;
	}

	.log-container {
		display: none;
		position: absolute;
		inset: 0;
		flex-direction: column;
		background: rgba(13,13,15,.97);
		border-bottom: 1px solid rgba(0,229,255,.2);
		backdrop-filter: blur(4px);
		z-index: 100;
	}
	.log-container.visible { display: flex; animation: fadeIn .15s ease; }

	.log-header {
		flex: 0 0 auto;
		display: flex;
		justify-content: space-between;
		align-items: center;
		padding: 8px 14px;
		background: var(--bg-raised);
		border-bottom: 1px solid var(--bd-subtle);
		font-size: var(--font-size-sm);
		font-family: var(--font-mono);
		color: var(--c-cyan);
		letter-spacing: .5px;
	}
	.log-controls { display: flex; gap: 6px; }
	.log-controls button {
		padding: 3px 10px;
		background: transparent;
		border: 1px solid var(--bd-default);
		border-radius: var(--radius-sm);
		color: var(--tx-muted);
		cursor: pointer;
		font-size: var(--font-size-xs);
		font-family: var(--font-mono);
		transition: var(--transition);
	}
	.log-controls button:hover { border-color: var(--c-cyan); color: var(--c-cyan); }

	#logOutput {
		flex: 1 1 auto;
		overflow-y: auto;
		padding: var(--sp-2) var(--sp-3);
		font-size: var(--font-size-sm);
		font-family: var(--font-mono);
		color: var(--tx-secondary);
		word-wrap: break-word;
		line-height: 1.6;
	}
	#logOutput span { display: block; white-space: pre-wrap; }
	#logOutput:empty::before { content:'[ NO LOG DATA ]'; color: var(--tx-muted); font-size: 12px; }

	.channels {
		flex: 0 0 var(--tabbar-h);
		display: flex;
		align-items: center;
		gap: 3px;
		padding: 0 var(--sp-3);
		background: var(--bg-raised);
		border-bottom: 1px solid var(--bd-subtle);
		overflow-x: auto;
		overflow-y: hidden;
		flex-wrap: nowrap;
	}
	.channels::-webkit-scrollbar { height: 2px; }

	.channel {
		display: inline-flex;
		align-items: center;
		gap: 5px;
		padding: 0 12px;
		height: calc(var(--tabbar-h) - 6px);
		background: transparent;
		border: 1px solid transparent;
		border-radius: var(--radius-sm);
		cursor: pointer;
		font-size: var(--font-size-sm);
		font-family: var(--font-mono);
		color: var(--tx-secondary);
		white-space: nowrap;
		position: relative;
		transition: var(--transition);
		letter-spacing: .2px;
	}
	.channel:hover {
		background: var(--bg-hover);
		color: var(--tx-primary);
	}
	.channel.active {
		background: var(--bg-active);
		color: var(--c-cyan);
		border-color: rgba(0,229,255,.2);
		box-shadow: inset 0 -2px 0 var(--c-cyan);
	}
	.channel.private { color: var(--tx-secondary); }
	.channel.private.active { color: var(--c-magenta); border-color: rgba(224,64,251,.2); box-shadow: inset 0 -2px 0 var(--c-magenta); }

	.channel .unread-badge {
		position: absolute;
		top: 2px; right: 2px;
		background: var(--c-red);
		color: #fff;
		font-size: 8px;
		font-weight: 700;
		padding: 0 4px;
		min-width: 14px;
		height: 14px;
		line-height: 14px;
		text-align: center;
		border-radius: 99px;
		box-shadow: 0 0 6px var(--c-red);
	}
	.channel button.x {
		background: none;
		border: none;
		color: inherit;
		cursor: pointer;
		padding: 0 2px;
		font-size: 13px;
		font-weight: 300;
		line-height: 1;
		opacity: 0;
		transition: opacity .15s;
		margin-left: 2px;
	}
	.channel:hover button.x { opacity: .5; }
	.channel.active button.x { opacity: .6; }
	.channel button.x:hover { opacity: 1 !important; color: var(--c-red); }

	.channelcontents-wrapper {
		flex: 1 1 auto;
		display: flex;
		overflow: hidden;
		min-height: 0;
	}
	.channelcontents-wrapper.hidden { display: none; }
	.channelcontents-wrapper.visible { display: flex; }

	.channelcontents {
		display: flex;
		flex-direction: row;
		width: 100%;
		height: 100%;
		min-height: 0;
	}

	.channelcontent {
		display: none;
		flex: 1 1 auto;
		flex-direction: row;
		min-height: 0;
	}

<script>
(function () {
'use strict';

// Core state
let nickname = "";
let channelName = "";
let wsUrl = "";
let channels, channelContents, contentsWrapper, emptyState, input;
let channelMap = new Map();
let activeChannel = null;
let statusChannel = null;
let PrefixChars = ["", ""];
let websocket = null;
let isConnected = false;
let autoReconnect = false;
let reconnectAttempts = 0;
const maxReconnectAttempts = 5;
const reconnectDelay = 3000;
let keepAliveTimer = null;
const keepAliveInterval = 90000;
let inputBlurTimeoutId = null;
let connectTimeout = null;
let messageHistory = [];
let historyIndex = -1;
let isDisconnecting = false;
let headerMenuClickListener = null;
let sessionStartTime = null;
let sentCount = 0;
let recvCount = 0;

// IRCv3 Features
let batchBuffer = new Map();
let batchCleanupTimers = new Map(); // Prevent memory leaks
let labelCounter = 0;
let pendingLabels = new Map();
let ircv3ActiveCaps = new Set();
let capLsBuffer = "";

// IRCv3 Capability flags
let ircv3ServerTime = false;
let ircv3EchoMessage = false;
let ircv3MessageTags = false;
let ircv3AccountTag = false;
let ircv3AwayNotify = false;
let ircv3AccountNotify = false;
let ircv3ExtendedJoin = false;
let ircv3ChgHost = false;
let ircv3MultiPrefix = false;
let ircv3UserhostInNames = false;
let ircv3Batch = false;
let ircv3LabeledResponse = false;
let ircv3ChatHistory = false;
let ircv3InviteNotify = false;
let ircv3Multiline = false;
let ircv3Whox = false;

// SASL
let saslEnabled = false;
let saslAccount = "";
let saslPassword = "";
let saslPending = false;

// Typing indicators
let typingLastSent = 0;
const TYPING_THROTTLE_MS = 3000;
let typingInputTimer = null;
const TYPING_PAUSE_DELAY = 4000;
let remoteTypingState = new Map();

const LOG_COLORS = {
	'ERROR': '#ff0040', 'WARN': '#ffff00', 'WARNING': '#ffff00', 'INFO': '#00f0ff',
	'DEBUG': '#888888', 'OPEN': '#00ff00', 'CLOSE': '#ff6600',
	'CLIENT→SERVER': '#00d4ff', 'SERVER→CLIENT': '#cc88ff', 'SERVER': '#cc88ff',
	'IRC': '#aaffaa', 'CAP': '#88ddff', 'NOTICE': '#ffcc44', 'PING': '#558855',
	'PING/PONG': '#558855', 'KEEP-ALIVE': '#445544', 'RECONNECT': '#ffaa00',
	'PM': '#ff88ff', 'SETTINGS': '#aaaaff', 'TAB': '#77bbdd', 'SYSTEM': '#cccccc',
	'PART': '#ff8844', 'WEBSOCKET': '#44ccff', 'MSGTAG': '#99ccff', 'SASL': '#ffaa55',
	'AWAY': '#aaaaaa', 'CHGHOST': '#ddaaff', 'ACCOUNT': '#88ffcc', 'ECHO': '#ccff88',
	'TYPING': '#ffccaa', 'BATCH': '#88ccff', 'MONITOR': '#ffddaa', 'CHATHISTORY': '#aaddff',
	'INVITE': '#ffaadd', 'LABELED': '#ccddff', 'WHOX': '#ddffaa', 'REACT': '#ffddcc',
	'REPLY': '#ccffdd', 'FAIL': '#ff8888', 'MULTILINE': '#ddccff'
};

const DefaultPrefixMap = {
	'~': { symbol: '~', name: 'founder', color: 'var(--clr-purple)' },
	'&': { symbol: '&', name: 'admin', color: 'var(--clr-red)' },
	'%': { symbol: '%', name: 'halfop', color: 'var(--clr-green)' },
	'@': { symbol: '@', name: 'op', color: 'var(--clr-blue)' },
	'+': { symbol: '+', name: 'voice', color: 'var(--clr-gold)' }
};

// Utility functions
function findChannel(channelName) {
	if (!channelName) return null;
	const lowerName = channelName.toLowerCase();
	let channel = channelMap.get(channelName);
	if (channel) return channel;
	for (let [key, value] of channelMap) {
		if (key.toLowerCase() === lowerName) return value;
	}
	return null;
}

function htmlEscape(text) {
	if (!text) return "";
	const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
	return text.replace(/[&<>"']/g, m => map[m]);
}

function stripMircCodes(text) {
	if (!text) return "";
	return text.replace(/\x03(\d{1,2}(,\d{1,2})?)?/g, '').replace(/[\x02\x0F\x16\x1D\x1E\x1F\x11]/g, '');
}

const MIRC_COLORS = [
	'#ffffff', '#000000', '#00007f', '#009300', '#ff0000', '#7f0000', '#9c009c', '#fc7f00',
	'#ffff00', '#00fc00', '#009393', '#00ffff', '#0000fc', '#ff00ff', '#7f7f7f', '#d2d2d2'
];

function mircToHtml(text) {
	if (!text) return "";
	let fg = null, bg = null, bold = false, italic = false, underline = false, strike = false;
	let result = "", spanOpen = false;
	
	function closeSpan() { if (spanOpen) { result += "</span>"; spanOpen = false; } }
	function openSpan() {
		const styles = [];
		if (fg !== null) styles.push("color:" + fg);
		if (bg !== null) styles.push("background:" + bg);
		if (bold) styles.push("font-weight:bold");
		if (italic) styles.push("font-style:italic");
		if (underline && strike) styles.push("text-decoration:underline line-through");
		else if (underline) styles.push("text-decoration:underline");
		else if (strike) styles.push("text-decoration:line-through");
		if (styles.length > 0) { result += `<span style="${styles.join(';')}">`; spanOpen = true; }
	}
	function hasFormat() { return fg !== null || bg !== null || bold || italic || underline || strike; }
	function resetAll() { closeSpan(); fg = null; bg = null; bold = false; italic = false; underline = false; strike = false; }
	function applyFormat() { closeSpan(); if (hasFormat()) openSpan(); }

	const colorRe = /^\x03(\d{1,2})(?:,(\d{1,2}))?/;
	let i = 0;
	while (i < text.length) {
		const ch = text[i];
		if (ch === '\x02') { bold = !bold; applyFormat(); i++; continue; }
		if (ch === '\x1D') { italic = !italic; applyFormat(); i++; continue; }
		if (ch === '\x1F') { underline = !underline; applyFormat(); i++; continue; }
		if (ch === '\x1E') { strike = !strike; applyFormat(); i++; continue; }
		if (ch === '\x0F') { resetAll(); i++; continue; }
		if (ch === '\x16' || ch === '\x11') { i++; continue; }
		if (ch === '\x03') {
			const sub = text.slice(i);
			const m = colorRe.exec(sub);
			if (m) {
				applyFormat();
				const fgIdx = parseInt(m[1], 10);
				fg = (fgIdx >= 0 && fgIdx < MIRC_COLORS.length) ? MIRC_COLORS[fgIdx] : null;
				if (m[2] !== undefined) {
					const bgIdx = parseInt(m[2], 10);
					bg = (bgIdx >= 0 && bgIdx < MIRC_COLORS.length) ? MIRC_COLORS[bgIdx] : null;
				}
				if (hasFormat()) openSpan();
				i += m[0].length; continue;
			}
			applyFormat(); fg = null; bg = null;
			if (hasFormat()) openSpan();
			i++; continue;
		}
		if (ch === '&') { result += '&amp;'; i++; continue; }
		if (ch === '<') { result += '&lt;'; i++; continue; }
		if (ch === '>') { result += '&gt;'; i++; continue; }
		if (ch === '"') { result += '&quot;'; i++; continue; }
		if (ch === "'") { result += '&#039;'; i++; continue; }
		result += ch; i++;
	}
	closeSpan();
	return result;
}

function sortUserList(user_a, user_b) {
	if (!user_a || !user_b || user_a.length < 2 || user_b.length < 2) return 0;
	if (user_a[0][0] === user_b[0][0]) return user_a[1].localeCompare(user_b[1], undefined, { sensitivity: 'accent' });
	if (!PrefixChars || !PrefixChars[1]) return 0;
	let aIndex = PrefixChars[1].indexOf(user_a[0][0]);
	let bIndex = PrefixChars[1].indexOf(user_b[0][0]);
	if (aIndex === -1) aIndex = Infinity;
	if (bIndex === -1) bIndex = Infinity;
	return aIndex - bIndex;
}

function sanitizeUrl(url) {
	try {
		const parsed = new URL(url);
		if (parsed.protocol !== 'http:' && parsed.protocol !== 'https:') return null;
		return parsed.href;
	} catch (e) { return null; }
}

function mircAndLinkify(text) {
	if (!text) return "";
	const coloredHtml = mircToHtml(text);
	const mediaMaxWidth = '300px';
	return coloredHtml.replace(/(<[^>]*>)|([^<]+)/g, (match, tag, txt) => {
		if (tag) return tag;
		if (!txt) return "";
		return txt.replace(/https?:\/\/[^\s<>{}|\\^`[\]]+/g, escapedUrl => {
			const rawUrl = escapedUrl.replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"').replace(/&#039;/g, "'");
			const safeUrl = sanitizeUrl(rawUrl);
			if (!safeUrl) return escapedUrl;
			const lowerUrl = safeUrl.toLowerCase();
			const safeAttr = htmlEscape(safeUrl);
			const isImage = /\.(jpg|jpeg|png|gif|webp|bmp|svg|ico|tiff|tif|avif|heic|heif|jfif|pjpeg|pjp|apng)(\?.*)?$/i.test(lowerUrl);
			const isAudio = /\.(mp3|wav|ogg|aac|m4a|flac|opus|weba|wma|aiff|au|mid|midi|ra|ram|mka)(\?.*)?$/i.test(lowerUrl);
			const isVideo = /\.(mp4|webm|ogv|mov|avi|mkv|flv|m4v|m3u8|wmv|rmvb|rm|ts|mts|m2ts|3gp|3g2|divx|xvid|asf|vob|mpg|mpeg|mp2|mpe|mpv|m2v|svi|mxf|roq|nsv|f4v|f4p|f4a|f4b)(\?.*)?$/i.test(lowerUrl);
			if (isImage) return `<img src="${safeAttr}" alt="Image" referrerpolicy="no-referrer" crossorigin="anonymous" style="max-width:${mediaMaxWidth};height:auto;border-radius:4px;box-shadow:0 2px 6px rgba(0,0,0,.1);">`;
			if (isAudio) return `<audio controls src="${safeAttr}" referrerpolicy="no-referrer" style="max-width:${mediaMaxWidth};"></audio>`;
			if (isVideo) return `<video controls src="${safeAttr}" referrerpolicy="no-referrer" style="max-width:${mediaMaxWidth};height:auto;border-radius:4px;"></video>`;
			return `<a href="${safeAttr}" target="_blank" rel="noopener noreferrer" style="color:var(--clr-accent);text-decoration:underline;word-break:break-all;">${safeAttr}</a>`;
		});
	});
}

function byteLength(str) { return new TextEncoder().encode(str).length; }

function splitIRCMessage(message) {
	const MAX_BYTES = 512;
	const isPrivmsg = message.toLowerCase().startsWith("privmsg ");
	const fullMessage = message + "\r\n";
	if (!isPrivmsg || byteLength(fullMessage) <= MAX_BYTES) return [fullMessage];
	
	const colonIndex = message.indexOf(':');
	if (colonIndex === -1) return [fullMessage];
	
	const baseCommand = message.substring(0, colonIndex + 1);
	const messageContent = message.substring(colonIndex + 1);
	const baseBytes = byteLength(baseCommand) + 2;
	const maxContentBytes = MAX_BYTES - baseBytes;
	
	if (byteLength(messageContent) <= maxContentBytes) return [fullMessage];
	
	const encoder = new TextEncoder();
	const contentBytes = encoder.encode(messageContent);
	const messages = [];
	let offset = 0;
	while (offset < contentBytes.length) {
		let end = Math.min(offset + maxContentBytes, contentBytes.length);
		while (end > offset && (contentBytes[end] & 0xC0) === 0x80) end--;
		const chunk = new TextDecoder().decode(contentBytes.slice(offset, end));
		messages.push(baseCommand + chunk + "\r\n");
		offset = end;
	}
	return messages;
}

// IRCv3 message tag parsing
function unescapeTagValue(val) {
	if (!val) return "";
	return val.replace(/\\:/g, ';').replace(/\\s/g, ' ').replace(/\\\\/g, '\x00').replace(/\\r/g, '\r').replace(/\\n/g, '\n').replace(/\x00/g, '\\').replace(/\\./g, '');
}

function parseMsgTags(tagStr) {
	const tags = new Map();
	if (!tagStr) return tags;
	const parts = tagStr.split(';');
	for (const part of parts) {
		if (!part) continue;
		const eqIdx = part.indexOf('=');
		if (eqIdx === -1) tags.set(part, true);
		else tags.set(part.substring(0, eqIdx), unescapeTagValue(part.substring(eqIdx + 1)));
	}
	return tags;
}

function extractMsgTags(rawLine) {
	if (!rawLine || rawLine[0] !== '@') return { tags: new Map(), rest: rawLine };
	const spaceIdx = rawLine.indexOf(' ');
	if (spaceIdx === -1) return { tags: parseMsgTags(rawLine.substring(1)), rest: "" };
	const tagStr = rawLine.substring(1, spaceIdx);
	const rest = rawLine.substring(spaceIdx + 1);
	const tags = parseMsgTags(tagStr);
	return { tags, rest };
}

// Logging
let _logOutputEl = null;
function getLogOutput() {
	if (!_logOutputEl) _logOutputEl = document.getElementById('logOutput');
	return _logOutputEl;
}

function writeToLog(message) {
	const logOutput = getLogOutput();
	const now = new Date();
	const ts = now.toISOString().replace('T', ' ').substring(0, 23) + 'Z';
	const fullMessage = `[${ts}] ${message}`;
	
	if (logOutput) {
		const tagMatch = message.match(/^\[([^\]]+)\]/);
		const line = document.createElement('span');
		if (tagMatch) {
			const tag = tagMatch[1].toUpperCase();
			const firstSeg = tag.split(/[\s\/]/)[0];
			line.style.color = LOG_COLORS[tag] || LOG_COLORS[firstSeg] || '#e0e0e0';
		} else line.style.color = '#e0e0e0';
		line.textContent = fullMessage;
		logOutput.appendChild(line);
		
		while (logOutput.children.length > 500) logOutput.removeChild(logOutput.firstChild);
		requestAnimationFrame(() => logOutput.scrollTop = logOutput.scrollHeight);
	}
	console.log(fullMessage);
}

// UI Functions
function updateConnectionStatus(status) {
	const statusEl = document.getElementById('connectionStatus');
	const statusText = document.getElementById('statusText');
	if (!statusEl || !statusText) return;
	statusEl.classList.remove('connected', 'connecting', 'disconnected');
	if (status === 'connected') {
		statusEl.classList.add('connected');
		statusText.textContent = `已连接 (${nickname})`;
	} else if (status === 'connecting') {
		statusEl.classList.add('connecting');
		statusText.textContent = '连接中...';
	} else {
		statusEl.classList.add('disconnected');
		statusText.textContent = '未连接';
	}
}

function toggleSettings() {
	const panel = document.getElementById('settingsPanel');
	const btn = document.getElementById('settingsToggleBtn');
	if (!panel) return;
	const isOpen = panel.classList.toggle('open');
	if (btn) btn.classList.toggle('active', isOpen);
}

function toggleHeaderMenu() {
	const menu = document.getElementById('headerMenuDropdown');
	if (!menu) return;
	menu.classList.toggle('visible');
	updateAutoReconnectMenuItem();
	
	if (headerMenuClickListener) {
		document.removeEventListener('click', headerMenuClickListener);
		headerMenuClickListener = null;
		menu.classList.remove('menu-attached');
	}
	if (menu.classList.contains('visible')) {
		headerMenuClickListener = closeHeaderMenuOnClickOutside;
		menu.classList.add('menu-attached');
		setTimeout(() => document.addEventListener('click', headerMenuClickListener), 0);
	}
}

function closeHeaderMenuOnClickOutside(event) {
	const menu = document.getElementById('headerMenuDropdown');
	const menuBtn = document.querySelector('.header-menu-btn');
	if (menu && !menu.contains(event.target) && (!menuBtn || !menuBtn.contains(event.target))) {
		menu.classList.remove('visible');
		menu.classList.remove('menu-attached');
		document.removeEventListener('click', closeHeaderMenuOnClickOutside);
		headerMenuClickListener = null;
	}
}

function toggleAutoReconnect() {
	const checkbox = document.getElementById('autoReconnect');
	if (checkbox) {
		checkbox.checked = !checkbox.checked;
		autoReconnect = checkbox.checked;
		updateAutoReconnectMenuItem();
		writeToLog(`[SETTINGS] Auto-reconnect: ${autoReconnect ? 'ENABLED' : 'DISABLED'}`);
		saveSettings();
	}
}

function updateAutoReconnectMenuItem() {
	const autoReconnectCheckbox = document.getElementById('autoReconnect');
	const menuItem = document.querySelector('.header-menu-item[onclick="toggleAutoReconnect()"]');
	if (menuItem && autoReconnectCheckbox) {
		menuItem.classList.toggle('active', autoReconnectCheckbox.checked);
	}
}

function toggleLog() {

	if (logContainer) {

		if (logContainer.classList.contains('visible')) {
			const logOutput = getLogOutput();

}

function clearLog() {

}

function showPrivateChatList() {
	const privateChats = [];
	channelMap.forEach((channel, name) => { if (channel.isPrivate) privateChats.push(name); });
	if (privateChats.length === 0) writeToScreen("var(--clr-info)", "当前没有私聊会话", statusChannel, "*");
	else writeToScreen("var(--clr-info)", `私聊会话列表 (${privateChats.length}): ${privateChats.join(', ')}`, statusChannel, "*");

function showSSLWarning(url) {
	const warning = document.getElementById('sslWarning');
	const link = document.getElementById('sslLink');
	if (!warning || !link) return;
	let displayUrl = url || document.getElementById('wsUrl')?.value.trim();
	if (displayUrl) {
		link.href = displayUrl.replace('wss://', 'https://').replace('ws://', 'http://');
		link.textContent = link.href;
	} else {
		link.href = '#';
		link.textContent = '请先在WebSocket地址栏输入服务器地址';
	}
	warning.classList.add('visible');
	setTimeout(() => { if (warning) warning.classList.remove('visible'); }, 6000);
}

function saveSettings() {
	try {
		const settings = {
			wsUrl: document.getElementById('wsUrl').value,
			nickname: document.getElementById('nickInput').value,
			channel: document.getElementById('channelInput').value,
			autoReconnect: document.getElementById('autoReconnect').checked,
			saslAccount: document.getElementById('saslAccountInput') ? document.getElementById('saslAccountInput').value : ''
		};
		localStorage.setItem('ircSettings', JSON.stringify(settings));
	} catch (e) { writeToLog(`[WARN] Failed to save settings: ${e.message}`); }
}

function loadSettings() {
	try {
		const settings = JSON.parse(localStorage.getItem('ircSettings') || '{}');
		if (settings.wsUrl) document.getElementById('wsUrl').value = settings.wsUrl;
		if (settings.nickname) document.getElementById('nickInput').value = settings.nickname;
		if (settings.channel) document.getElementById('channelInput').value = settings.channel;
		if (settings.autoReconnect !== undefined) document.getElementById('autoReconnect').checked = settings.autoReconnect;
		if (settings.saslAccount && document.getElementById('saslAccountInput')) document.getElementById('saslAccountInput').value = settings.saslAccount;
	} catch (e) { writeToLog(`[WARN] Failed to load settings: ${e.message}`); }
}

// Tab management
function tabsHide() {
	channelMap.forEach(ch => {
		if (ch.channel) ch.channel.classList.remove('active');
		if (ch.button) ch.button.classList.remove('active');
	});
}

function tabShow(name) {
	if (!name) return;
	const channel = findChannel(name);
	tabsHide();
	if (channel && channel.channel) {
		channel.channel.classList.add('active');
		channel.button.classList.add("active");
		activeChannel = channel;
		clearUnreadBadge(channel);
		setTimeout(() => { if (channel.content) channel.content.scrollTop = channel.content.scrollHeight; }, 10);
		updateTypingIndicatorUI(channel.name);
		const prefixEl = document.getElementById('inputPrefix');
		if (prefixEl) {
			if (channel.isPrivate) {
				prefixEl.textContent = '→ ' + channel.name;
				prefixEl.style.color = 'var(--c-magenta)';
			} else if (channel.name === 'Status') {
				prefixEl.textContent = '»';
				prefixEl.style.color = 'var(--tx-muted)';
			} else {
				prefixEl.textContent = channel.name;
				prefixEl.style.color = 'var(--c-cyan)';
			}
		}
	}
}
const Tab_Show = tabShow;

function tabOnClick(evt) {
	if (!evt || !evt.currentTarget) return;
	const chanName = evt.currentTarget.value;
	tabShow(chanName);
}
const Tab_onClick = tabOnClick;

function addUnreadBadge(channel) {
	if (!channel || !channel.button) return;
	let badge = channel.button.querySelector('.unread-badge');
	if (!badge) {
		badge = document.createElement('span');
		badge.className = 'unread-badge';
		channel.button.appendChild(badge);
	}
	let count = parseInt(badge.textContent) || 0;
	badge.textContent = count + 1;
}

function clearUnreadBadge(channel) {
	if (!channel || !channel.button) return;
	const badge = channel.button.querySelector('.unread-badge');
	if (badge) badge.remove();
}

function openPrivateChat(targetNick) {
	if (!targetNick || targetNick === nickname) {
		writeToScreen("var(--clr-warning)", "不能与自己私聊", statusChannel, "*");
		return;
	}
	let pmChannel = findChannel(targetNick);
	if (!pmChannel) {
		pmChannel = new Tab_Create(targetNick, `与 ${targetNick} 的私聊`, false);
		pmChannel.isPrivate = true;
		if (pmChannel.button) pmChannel.button.classList.add('private');
		writeToLog(`[PM] Opening private chat with: ${targetNick}`);
		writeToScreen("var(--clr-green)", `私聊会话已建立: ${targetNick}`, statusChannel, "*");
	}
	Tab_Show(targetNick);
}

class Tab_Create {
	constructor(name, topic, createlist) {
		if (!name || !channels || !channelContents) {
			console.error("Tab_Create: missing required elements");
			writeToLog(`[ERROR] Tab_Create failed — name: "${name}"`);
			return;
		}
		tabsHide();
		this.name = name;
		this.isPrivate = false;
		
		this.button = document.createElement("button");
		this.button.textContent = name;
		this.button.value = name;
		this.button.className = "channel";
		this.button.addEventListener("click", Tab_onClick);
		
		const closeBtn = document.createElement("button");
		closeBtn.textContent = "x";
		closeBtn.value = name;
		closeBtn.className = "x";
		closeBtn.addEventListener("click", tabClose);
		this.button.appendChild(closeBtn);
		
		channels.appendChild(this.button);
		
		this.channel = document.createElement("div");
		this.channel.className = "channelcontent";
		
		const navWrapper = document.createElement("nav");
		this.topic = document.createElement("h3");
		this.topic.textContent = topic || "";
		if (!topic) this.topic.classList.add('no-topic');
		navWrapper.appendChild(this.topic);
		
		this.content = document.createElement("nav");
		navWrapper.appendChild(this.content);
		this.channel.appendChild(navWrapper);
		
		if (createlist) {
			this.userlist = document.createElement("ul");
			this.users = [];
			this.names_end = true;
			this.channel.appendChild(this.userlist);
		}
		
		channelContents.appendChild(this.channel);
		channelMap.set(name, this);
		activeChannel = this;
		Tab_Show(name);
		writeToLog(`[TAB] Tab created: "${name}" | has-userlist: ${!!createlist} | total tabs: ${channelMap.size}`);
	}
}

function tabClose(evt) {
	evt.stopPropagation();
	if (!evt || !evt.currentTarget) return;
	const channelName = evt.currentTarget.value;
	
	if (channelName === "Status") {
		writeToScreen("var(--clr-warning)", "Status频道是系统状态窗口, 不能关闭", statusChannel, "*");
		writeToLog("[WARN] Attempted to close the Status tab — blocked");
		return;
	}
	
	const channel = findChannel(channelName);
	if (channel && channel.isPrivate) {
		writeToLog(`[PM] Closing private chat session: "${channelName}"`);
		channelDestroy(channelName);
		return;
	}
	
	if (isConnected && websocket && websocket.readyState === WebSocket.OPEN) {
		writeToLog(`[PART] Sending PART → ${channelName}`);
		doSend("PART " + channelName);
	} else {
		writeToLog(`[TAB] Not connected — destroying tab locally: "${channelName}"`);
		channelDestroy(channelName);
	}
}
const Tab_Close = tabClose;

function channelDestroy(name) {
	if (!name) return;
	const channel = findChannel(name);
	if (!channel) {
		writeToLog(`[WARN] channelDestroy: tab "${name}" not found`);
		return;
	}
	const wasActive = (activeChannel === channel);
	const actualKey = channel.name;
	channel.button.remove();
	channel.channel.remove();
	if (wasActive) activeChannel = statusChannel;
	channelMap.delete(actualKey);
	writeToLog(`[TAB] Tab destroyed: "${actualKey}" | was-active: ${wasActive} | remaining tabs: ${channelMap.size}`);
	if (activeChannel) tabShow(activeChannel.name);
}
const Channel_Destroy = channelDestroy;

// User list management
function channelInsertUser(nick, channel, prefix) {
	if (!nick || !channel || !channel.userlist) return;
	const user = document.createElement("li");
	const initial = nick.replace(/^[^a-zA-Z0-9]/, '')[0] || nick[0] || '?';
	user.setAttribute('data-initial', initial.toUpperCase());
	
	let tmp = document.createElement("p");
	if (prefix && prefix !== " ") {
		const prefixChar = prefix[0];
		const prefixInfo = DefaultPrefixMap[prefixChar];
		user.setAttribute('data-prefix', prefixChar);
		if (prefixInfo) {
			tmp.textContent = prefixInfo.symbol;
			tmp.title = prefixInfo.name;
		} else tmp.textContent = prefixChar;
	}
	user.appendChild(tmp);
	
	tmp = document.createElement("p");
	tmp.textContent = nick;
	tmp.title = "点击与 " + nick + " 私聊";
	tmp.style.cursor = "pointer";
	tmp.addEventListener("click", e => { e.stopPropagation(); openPrivateChat(nick); });
	user.appendChild(tmp);
	
	let i = 0;
	const newEntry = [prefix || " ", nick];
	for (i; i < channel.users.length; i++) {
		if (channel.users[i] && channel.users[i][1] && sortUserList(newEntry, channel.users[i]) <= 0) break;
	}
	channel.users.splice(i, 0, [prefix || " ", nick]);
	channel.userlist.insertBefore(user, channel.userlist.childNodes[i]);
}
const Channel_InsertUser = channelInsertUser;

function channelRemoveUser(nick, channel) {
	if (!nick || !channel || !channel.userlist) return false;
	for (let i = 0; i < channel.users.length; i++) {
		if (channel.users[i] && channel.users[i][1] === nick) {
			for (let j = 0; j < channel.userlist.children.length; j++) {
				const userItem = channel.userlist.children[j];
				if (!userItem || !userItem.children[1]) continue;
				if (userItem.children[1].textContent === nick) {
					userItem.remove();
					break;
				}
			}
			channel.users.splice(i, 1);
			return true;
		}
	}
	return false;
}
const Channel_RemoveUser = channelRemoveUser;

function channelRenameUser(nick, newnick, channel) {
	if (!nick || !newnick || !channel || !channel.userlist) return;
	for (let i = 0; i < channel.users.length; i++) {
		if (channel.users[i] && channel.users[i][1] == nick) {
			const prefix = channel.users[i][0];
			channelRemoveUser(nick, channel);
			channelInsertUser(newnick, channel, prefix);
			return true;
		}
	}
}
const Channel_RenameUser = channelRenameUser;

function channelUpdateUserPrefix(nick, channel, add, prefix) {
	if (!nick || !channel || !channel.users || !PrefixChars) return;
	for (let i = 0; i < channel.users.length; i++) {
		if (channel.users[i] && channel.users[i][1] == nick) {
			const pos = PrefixChars[0].indexOf(prefix);
			if (pos < 0) return;
			let prefixes = "";
			if (add === true || add === "true") {
				let ii;
				for (ii = 0; ii < channel.users[i][0].length; ii++) {
					if (PrefixChars[1].indexOf(channel.users[i][0][ii]) >= pos) break;
					prefixes += channel.users[i][0][ii];
				}
				prefixes += PrefixChars[1][pos];
				for (; ii < channel.users[i][0].length; ii++) prefixes += channel.users[i][0][ii];
			} else {
				const tmp = channel.users[i][0].indexOf(PrefixChars[1][pos]);
				if (tmp >= 0) prefixes = channel.users[i][0].substring(0, tmp) + channel.users[i][0].substring(tmp + 1);
			}
			if (prefixes == "") prefixes = " ";
			channel.users[i][0] = prefixes;
			channelRenameUser(nick, nick, channel);
			break;
		}
	}
}
const Channel_UpdateUserPrefix = channelUpdateUserPrefix;

function updateUserAwayStatus(nick, channel, isAway) {
	if (!channel || !channel.userlist) return;
	for (const li of channel.userlist.children) {
		const nickEl = li.children[1];
		if (nickEl && nickEl.textContent === nick) {
			if (isAway) {
				li.style.opacity = '0.5';
				li.title = `${nick} (离开中)`;
			} else {
				li.style.opacity = '';
				li.title = '';
			}
			break;
		}
	}
}

// Display functions
function writeToScreen(color, message, channel, username, serverTime) {
	if (!channel || !channel.content) return;
	const renderedMessage = mircAndLinkify(message || "");
	let pre = document.createElement("p");
	pre.style.color = color;
	let displayTime;
	if (serverTime) {
		try {
			const d = new Date(serverTime);
			if (!isNaN(d.getTime())) displayTime = d.toISOString().substr(11, 8);
		} catch (e) {}
	}
	if (!displayTime) {
		const now = new Date();
		displayTime = now.toISOString().substr(11, 8);
	}
	
	if (username && username !== "" && username !== "*" && username !== "-") {
		const nickSpan = document.createElement("span");
		nickSpan.className = "clickable-username";
		nickSpan.title = "点击与 " + username + " 私聊";
		nickSpan.textContent = username;
		nickSpan.addEventListener("click", () => openPrivateChat(username));
		
		const tsSpan = document.createElement("span");
		tsSpan.textContent = displayTime + " ";
		tsSpan.style.cssText = "color:var(--tx-muted);font-size:11px;margin-right:2px;";
		
		const sep = document.createTextNode(" ");
		const msgSpan = document.createElement("span");
		msgSpan.innerHTML = renderedMessage;
		pre.appendChild(tsSpan);
		pre.appendChild(nickSpan);
		pre.appendChild(sep);
		pre.appendChild(msgSpan);
	} else {
		const tsSpan = document.createElement("span");
		tsSpan.textContent = displayTime + " ";
		tsSpan.style.cssText = "color:var(--tx-muted);font-size:11px;";
		const msgSpan = document.createElement("span");
		msgSpan.innerHTML = renderedMessage;
		pre.appendChild(tsSpan);
		pre.appendChild(msgSpan);
	}
	
	const output = channel.content;
	if (output) {
		output.appendChild(pre);
		while (output.children.length > 200) output.removeChild(output.children[0]);
		requestAnimationFrame(() => output.scrollTop = output.scrollHeight);
	}
}

function writeMotdLine(rawText) {
	if (!statusChannel || !statusChannel.content) return;
	const now = new Date();
	const utcTime = now.toISOString().substr(11, 8);
	const p = document.createElement("p");
	p.style.color = "var(--clr-font)";
	p.innerHTML = "[" + utcTime + "] " + mircAndLinkify(rawText);
	const output = statusChannel.content;
	output.appendChild(p);
	while (output.children.length > 500) output.removeChild(output.children[0]);
	requestAnimationFrame(() => output.scrollTop = output.scrollHeight);
}

// Input handling
function updateCharCount() {
	const charCount = document.getElementById('charCount');
	if (!charCount || !input) return;
	const text = input.value;
	const bytes = new TextEncoder().encode(text).length;
	const maxBytes = 512;
	charCount.textContent = `${bytes}`;
	charCount.classList.remove('warning', 'danger');
	if (bytes > maxBytes) {
		charCount.classList.add('danger');
		charCount.textContent = `${bytes}!`;
	} else if (bytes > maxBytes * 0.8) charCount.classList.add('warning');
}

function onKeyDown(e) {
	if (!e) return;
	if (e.key === 'Enter') {
		send();
	} else if (e.key === 'Tab') {
		e.preventDefault();
		handleTabCompletion();
		return false;
	} else if (e.key === 'ArrowUp') {
		e.preventDefault();
		if (historyIndex > 0) {
			historyIndex--;
			input.value = messageHistory[historyIndex];
			updateCharCount();
		} else if (historyIndex === 0) {
			input.value = messageHistory[0] || "";
			updateCharCount();
		}
		return false;
	} else if (e.key === 'ArrowDown') {
		e.preventDefault();
		if (historyIndex < messageHistory.length - 1) {
			historyIndex++;
			input.value = messageHistory[historyIndex];
			updateCharCount();
		} else {
			historyIndex = messageHistory.length;
			input.value = "";
			updateCharCount();
		}
		return false;
	}
}

function handleTabCompletion() {
	if (!input || !activeChannel || !activeChannel.users) return;
	const cursorPos = input.selectionStart;
	const text = input.value.substring(0, cursorPos);
	const words = text.split(' ');
	const lastWord = words[words.length - 1];
	if (!lastWord) return;
	
	const matches = activeChannel.users
		.filter(user => user[1].toLowerCase().startsWith(lastWord.toLowerCase()))
		.sort((a, b) => a[1].localeCompare(b[1]));
	
	if (matches.length === 1) {
		words[words.length - 1] = matches[0][1] + (words.length > 1 ? ' ' : ': ');
		input.value = words.join(' ') + input.value.substring(cursorPos);
		input.setSelectionRange(cursorPos + matches[0][1].length + (words.length > 1 ? 1 : 2), cursorPos + matches[0][1].length + (words.length > 1 ? 1 : 2));
	} else if (matches.length > 1) {
		writeToScreen("var(--clr-info)", `匹配: ${matches.map(m => m[1]).join(', ')}`, activeChannel, "*");
	}
}

function pushHistory(msg) {
	if (messageHistory.length >= 200) messageHistory.shift();
	messageHistory.push(msg);
	historyIndex = messageHistory.length;
}

// Connection management
function validateNickname(nick) {
	if (!nick || nick.trim() === "") return false;
	return /^[a-zA-Z_\\`\[\]{}^|][a-zA-Z0-9_\\`\[\]{}^|-]*$/.test(nick);
}

function validateWsUrl(url) {
	if (!url) return false;
	return /^wss?:\/\/.+/.test(url);
}

function joinChannel() {
	const channelInput = document.getElementById('channelInput');
	if (!channelInput) return;
	let targetChannel = channelInput.value.trim();
	if (!targetChannel) return;
	if (!targetChannel.startsWith('#')) {
		targetChannel = '#' + targetChannel;
		channelInput.value = targetChannel;
	}
	if (isConnected && websocket && websocket.readyState === WebSocket.OPEN) {
		writeToLog(`[IRC] Sending JOIN → ${targetChannel}`);
		doSend("JOIN " + targetChannel);
	} else {
		writeToLog(`[WARN] JOIN requested but not connected — target: ${targetChannel}`);
		writeToScreen("var(--clr-warning)", "未连接, 无法加入频道", statusChannel, "*");
	}
}

function toggleConnection() {
	if (isConnected) {
		writeToLog('[SYSTEM] User requested disconnect — disabling auto-reconnect');
		autoReconnect = false;
		updateAutoReconnectMenuItem();
		isDisconnecting = true;
		if (websocket && websocket.readyState === WebSocket.OPEN) {
			try {
				websocket.send(`QUIT :User disconnected\r\n`);
				writeToLog('[SYSTEM] Sent IRC QUIT to server');
			} catch (e) { writeToLog(`[WARN] Could not send QUIT: ${e.message}`); }
		}
		if (websocket) {
			try {
				if (connectTimeout) { clearTimeout(connectTimeout); connectTimeout = null; }
				writeToLog('[SYSTEM] Closing WebSocket (code 1000 — user disconnected)');
				websocket.close(1000, "User disconnected");
			} catch (e) { writeToLog(`[ERROR] Exception while closing WebSocket: ${e.message}`); }
		}
	} else doConnect();
}

function doConnect(isAutoReconnect) {
	const wsUrlInput = document.getElementById('wsUrl');
	const nickInput = document.getElementById('nickInput');
	const channelInput = document.getElementById('channelInput');
	const reconnectCheckbox = document.getElementById('autoReconnect');
	const connectBtn = document.getElementById('connectBtn');
	
	if (!wsUrlInput || !nickInput || !channelInput || !connectBtn) {
		alert("界面元素加载错误, 请刷新页面重试");
		writeToLog('[ERROR] doConnect: critical UI elements missing');
		return;
	}
	
	wsUrl = wsUrlInput.value.trim();
	nickname = nickInput.value.trim();
	channelName = channelInput.value.trim();
	autoReconnect = reconnectCheckbox ? reconnectCheckbox.checked : false;
	
	const saslAccountInput = document.getElementById('saslAccountInput');
	const saslPasswordInput = document.getElementById('saslPasswordInput');
	saslAccount = saslAccountInput ? saslAccountInput.value.trim() : "";
	saslPassword = saslPasswordInput ? saslPasswordInput.value.trim() : "";
	saslEnabled = !!(saslAccount && saslPassword);
	saslPending = false;
	if (saslEnabled) writeToLog(`[SASL] SASL PLAIN enabled for account: ${saslAccount}`);
	
	// Reset IRCv3 state
	ircv3ActiveCaps.clear();
	capLsBuffer = "";
	ircv3ServerTime = false; ircv3EchoMessage = false; ircv3MessageTags = false;
	ircv3AccountTag = false; ircv3AwayNotify = false; ircv3AccountNotify = false;
	ircv3ExtendedJoin = false; ircv3ChgHost = false; ircv3MultiPrefix = false;
	ircv3UserhostInNames = false; ircv3Batch = false; ircv3LabeledResponse = false;
	ircv3ChatHistory = false; ircv3InviteNotify = false; ircv3Multiline = false;
	ircv3Whox = false;
	
	// Clear batch buffer to prevent memory leaks
	batchBuffer.forEach((batch, ref) => {
		if (batchCleanupTimers.has(ref)) {
			clearTimeout(batchCleanupTimers.get(ref));
			batchCleanupTimers.delete(ref);
		}
	});
	batchBuffer.clear();
	batchCleanupTimers.clear();
	
	if (!validateWsUrl(wsUrl)) {
		writeToLog(`[ERROR] Invalid WebSocket URL: "${wsUrl}"`);
		alert("WebSocket地址格式错误!必须以 ws:// 或 wss:// 开头");
		return;
	}
	
	if (!nickname) {
		nickname = "Guest_" + Math.floor(Math.random() * 9000 + 1000);
		nickInput.value = nickname;
		writeToLog(`[SYSTEM] Nickname was empty — auto-generated: ${nickname}`);
	}
	
	if (!validateNickname(nickname)) {
		writeToLog(`[ERROR] Invalid nickname: "${nickname}"`);
		nickInput.classList.add('input-error');
		nickInput.focus();
		nickInput.select();
		setTimeout(() => nickInput.classList.remove('input-error'), 1200);
		connectBtn.textContent = '连接';
		connectBtn.disabled = false;
		wsUrlInput.disabled = false;
		nickInput.disabled = false;
		return;
	}
	
	if (channelName && !channelName.startsWith('#')) {
		channelName = '#' + channelName;
		writeToLog(`[DEBUG] Channel name auto-prefixed: ${channelName}`);
	}
	
	if (!isAutoReconnect) reconnectAttempts = 0;
	wsUrlInput.disabled = true;
	nickInput.disabled = true;
	connectBtn.textContent = '连接中...';
	connectBtn.disabled = true;
	isDisconnecting = false;
	saveSettings();
	updateConnectionStatus('connecting');
	
	writeToLog(`[SYSTEM] ── Initiating connection ─────────────────`);
	writeToLog(`[SYSTEM] Server  : ${wsUrl}`);
	writeToLog(`[SYSTEM] Nick    : ${nickname}`);
	writeToLog(`[SYSTEM] Channel : ${channelName || '(none)'}`);
	writeToLog(`[SYSTEM] Auto-reconnect: ${autoReconnect} | Attempt: ${reconnectAttempts + 1}`);
	
	statusChannel = null;
	activeChannel = null;
	channels.innerHTML = '';
	channelContents.innerHTML = '';
	channelMap.clear();
	contentsWrapper.classList.remove('hidden');
	contentsWrapper.classList.add('visible');
	if (emptyState) emptyState.style.display = 'none';
	if (input) document.getElementById('inputContainer').style.display = 'flex';
	
	const settingsPanel = document.getElementById('settingsPanel');
	const settingsBtn = document.getElementById('settingsToggleBtn');
	if (settingsPanel) settingsPanel.classList.remove('open');
	if (settingsBtn) settingsBtn.classList.remove('active');
	
	statusChannel = new Tab_Create("Status", "", false);
	writeToLog(`[SYSTEM] Status tab created — calling WebSocket_Connect`);
	WebSocket_Connect(wsUrl);
}

function onDisconnect(reason = "", wasConnected = false) {
	isConnected = false;
	const wsUrlInput = document.getElementById('wsUrl');
	const nickInput = document.getElementById('nickInput');
	const connectBtn = document.getElementById('connectBtn');
	
	if (wsUrlInput) wsUrlInput.disabled = false;
	if (nickInput) nickInput.disabled = false;
	
	if (connectBtn) {
		connectBtn.textContent = '连接';
		connectBtn.disabled = false;
		connectBtn.classList.remove('disconnect');
	}
	
	const joinChannelBtn = document.getElementById('joinChannelBtn');
	if (joinChannelBtn) joinChannelBtn.disabled = true;
	
	const inputContainer = document.getElementById('inputContainer');
	if (inputContainer) inputContainer.style.display = 'none';
	if (channels) channels.innerHTML = '';
	
	updateConnectionStatus('disconnected');
	
	if (typingInputTimer) { clearTimeout(typingInputTimer); typingInputTimer = null; }
	typingLastSent = 0;
	remoteTypingState.clear();
	const typingEl = document.getElementById('typingIndicator');
	if (typingEl) typingEl.textContent = '';
	
	// Reset SASL state
	saslPending = false;
	
	const wasUserDisconnect = isDisconnecting;
	if (isDisconnecting) isDisconnecting = false;
	
	stopKeepAlive();
	writeToLog(`[SYSTEM] ── Disconnect handler ────────────────────`);
	writeToLog(`[SYSTEM] Reason: "${reason || 'normal'}" | was-connected: ${wasConnected}`);
	if (sessionStartTime) {
		writeToLog(`[SYSTEM] Session ended — duration: ${formatSessionDuration(sessionStartTime)} | sent: ${sentCount} | recv: ${recvCount}`);
		sessionStartTime = null;
	}
	
	if (statusChannel) Tab_Show("Status");
	
	let disconnectMessage = "DISCONNECTED";
	let logMessage = "[SYSTEM] Connection closed";
	
	if (reason === "user" || wasUserDisconnect) {
		disconnectMessage = "用户主动断开连接";
		logMessage = "[SYSTEM] User-initiated disconnect";
	} else if (reason === "error") {
		disconnectMessage = "连接异常断开";
		logMessage = "[SYSTEM] Connection dropped abnormally";
	}
	
	writeToScreen("var(--clr-font)", disconnectMessage, statusChannel, "");
	writeToLog(logMessage);
	
	if (wasUserDisconnect) {
		isDisconnecting = false;
		return;
	}
	
	if (autoReconnect && reconnectAttempts < maxReconnectAttempts) {
		reconnectAttempts++;
		const delay = reconnectDelay * reconnectAttempts;
		writeToLog(`[RECONNECT] Attempt ${reconnectAttempts}/${maxReconnectAttempts} scheduled in ${Math.floor(delay / 1000)}s`);
		setTimeout(() => {
			if (!isConnected && autoReconnect) {
				writeToLog(`[RECONNECT] Attempt ${reconnectAttempts}/${maxReconnectAttempts} starting...`);
				doConnect(true);
			} else writeToLog(`[RECONNECT] Skipped — already connected or auto-reconnect cancelled`);
		}, delay);
	} else if (autoReconnect && reconnectAttempts >= maxReconnectAttempts) {
		writeToLog(`[RECONNECT] Max attempts reached — giving up`);
		autoReconnect = false;
		updateAutoReconnectMenuItem();
		alert('自动重连失败, 请检查网络或服务器设置');
	}
	isDisconnecting = false;
}

// WebSocket handling
function WebSocket_Connect(wsUri) {
	if (!wsUri) {
		writeToLog("[ERROR] WebSocket URL is empty");
		return;
	}
	try {
		if (websocket) {
			try {
				websocket.onclose = null;
				websocket.onerror = null;
				websocket.onopen = null;
				websocket.onmessage = null;
				if (websocket.readyState !== WebSocket.CLOSED) {
					writeToLog(`[WebSocket] Cleaning up previous connection (state: ${websocket.readyState})`);
					websocket.close(1000, "Reconnecting");
				}
			} catch (e) { writeToLog(`[WARN] Error cleaning up previous connection: ${e.message}`); }
			websocket = null;
		}
		
		writeToLog(`[WebSocket] Creating new WebSocket → ${wsUri}`);
		websocket = new WebSocket(wsUri);
		websocket.binaryType = 'blob';
		
		if (connectTimeout) clearTimeout(connectTimeout);
		connectTimeout = setTimeout(() => {
			if (websocket && websocket.readyState === WebSocket.CONNECTING) {
				writeToLog(`[ERROR] Connection timeout (30s) — forcing close`);
				try { websocket.close(1006, "Connection timeout"); } catch (e) {}
			}
		}, 30000);
		
		websocket.onclose = evt => {
			if (connectTimeout) { clearTimeout(connectTimeout); connectTimeout = null; }
			onClose(evt);
		};
		websocket.onerror = onError;
		websocket.onopen = evt => {
			if (connectTimeout) { clearTimeout(connectTimeout); connectTimeout = null; }
			onOpen(evt);
		};
		websocket.onmessage = onMessage;
	} catch (e) {
		writeToLog(`[ERROR] WebSocket creation failed: ${e.message}`);
		onDisconnect();
		if (wsUrl && wsUrl.startsWith('wss://')) showSSLWarning(wsUrl);
		alert(`连接失败: ${e.message}\n\n如果是SSL证书错误, 请点击"SSL帮助"查看解决方案`);
	}
}

function onClose(evt) {
	if (websocket) {
		websocket.onclose = null;
		websocket.onerror = null;
		websocket.onopen = null;
		websocket.onmessage = null;
		websocket = null;
	}
	
	const wasConnected = isConnected;
	isConnected = false;
	let reason = evt.reason || 'Connection closed';
	let code = evt.code;
	let isUserDisconnect = false;
	
	if (isDisconnecting) isUserDisconnect = true;
	else if (code === 1000 && reason.includes("User disconnected")) {
		isUserDisconnect = true;
		reason = "User-initiated disconnect";
	} else if (code === 1000) reason = "Normal closure";
	
	let logMsg = `[CLOSE] Code: ${code}`;
	switch (code) {
		case 1000: logMsg += isUserDisconnect ? ' (user-initiated)' : ' (normal)'; break;
		case 1001: logMsg += ' (endpoint going away)'; break;
		case 1002: logMsg += ' (protocol error)'; break;
		case 1003: logMsg += ' (unsupported data)'; break;
		case 1005: logMsg += ' (no status code)'; break;
		case 1006: logMsg += ' (abnormal closure)'; break;
		case 1011: logMsg += ' (server error)'; break;
		case 1015: logMsg += ' (TLS handshake failed)'; break;
		default: if (code >= 4000 && code <= 4999) logMsg += ' (application error)';
	}
	logMsg += ` — reason: "${reason}"`;
	writeToLog(logMsg);
	
	let disconnectReason = "";
	if (isUserDisconnect) disconnectReason = "user";
	else if (code === 1006 || code >= 4000) disconnectReason = "error";
	onDisconnect(disconnectReason, wasConnected);
}

function onError(evt) {
	let errorType = 'WebSocket error';
	if (evt && evt.target) {
		if (evt.target.readyState === WebSocket.CONNECTING) errorType = 'Connection failed';
		else if (evt.target.readyState === WebSocket.OPEN) errorType = 'Message error';
	}
	writeToScreen("var(--clr-red)", `ERROR: ${errorType}`, statusChannel, "");
	writeToLog(`[ERROR] ${errorType}: ${evt.data || 'unknown error'}`);
	if (wsUrl && wsUrl.startsWith('wss://')) showSSLWarning(wsUrl);
}

function onOpen(evt) {
	if (websocket && websocket.readyState === WebSocket.OPEN) {
		isConnected = true;
		reconnectAttempts = 0;
		sessionStartTime = new Date();
		sentCount = 0;
		recvCount = 0;
		writeToScreen("var(--clr-font)", "CONNECTED", statusChannel, "");
		writeToLog(`[OPEN] WebSocket connected: ${wsUrl}`);
		writeToLog(`[SYSTEM] Session started at ${sessionStartTime.toISOString()}`);
		updateConnectionStatus('connected');
		
		const connectBtn = document.getElementById('connectBtn');
		if (connectBtn) {
			connectBtn.textContent = '断开';
			connectBtn.disabled = false;
			connectBtn.classList.add('disconnect');
		}
		
		const joinChannelBtn = document.getElementById('joinChannelBtn');
		if (joinChannelBtn) joinChannelBtn.disabled = false;
		
		doSend("CAP LS 302");
		startKeepAlive();
	} else writeToLog(`[ERROR] onOpen called but WebSocket state abnormal: ${websocket ? websocket.readyState : 'null'}`);
}

function onMessage(evt) {
	if (!evt) return;
	if (!websocket || websocket.readyState !== WebSocket.OPEN) {
		if (isConnected) {
			isConnected = false;
			updateConnectionStatus('disconnected');
		}
		writeToLog(`[WARNING] Message received but WebSocket not connected`);
		return;
	}
	if (!isConnected) {
		isConnected = true;
		updateConnectionStatus('connected');
	}
	
	const rawData = evt.data;
	recvCount++;
	writeToLog(`[SERVER→CLIENT] ${typeof rawData === 'string' ? rawData.trim() : '[binary data]'}`);
	if (rawData instanceof Blob) {
		let fileReader = new FileReader();
		fileReader.onloadend = event => {
			if (!event || !event.target) return;
			const reader = event.target;
			const raw = reader.result;
			writeToLog(`[SERVER→CLIENT] (Blob→Text): ${raw.trim()}`);
			process(raw);
			reader.onloadend = null;
		};
		fileReader.readAsText(rawData);
	} else process(rawData);
}

function doSend(message) {
	if (!message) return;
	if (websocket) {
		if (websocket.readyState === WebSocket.OPEN) {
			if (!isConnected) {
				isConnected = true;
				updateConnectionStatus('connected');
			}
		} else if (websocket.readyState === WebSocket.CLOSED || websocket.readyState === WebSocket.CLOSING) {
			if (isConnected) {
				isConnected = false;
				updateConnectionStatus('disconnected');
			}
			writeToLog(`[ERROR] WebSocket not connected — cannot send: ${message.trim()}`);
			writeToScreen("var(--clr-red)", "未连接, 消息未发送", statusChannel, "");
			return;
		}
	} else {
		if (isConnected) {
			isConnected = false;
			updateConnectionStatus('disconnected');
		}
		writeToLog(`[ERROR] WebSocket is null — cannot send: ${message.trim()}`);
		writeToScreen("var(--clr-red)", "未连接, 消息未发送", statusChannel, "");
		return;
	}
	
	try {
		websocket.send(message);
		if (!message.trim().toUpperCase().startsWith('PING')) sentCount++;
		writeToLog(`[CLIENT→SERVER] ${message.trim()}`);
	} catch (e) {
		writeToLog(`[ERROR] Failed to send message: ${e.message}`);
		writeToScreen("var(--clr-red)", "发送失败: " + e.message, statusChannel, "");
		if (isConnected) {
			isConnected = false;
			updateConnectionStatus('disconnected');
		}
	}
}

function process(rawData) {
	if (!rawData) return;
	const lines = rawData.split('\n');
	for (const line of lines) {
		const trimmedLine = line.replace(/\r$/, '').replace(/\r\n$/, '');
		if (trimmedLine) processLine(trimmedLine);
	}
}

function processLine(rawLine) {
	if (!rawLine) return;
	const { tags: msgTags, rest: lineAfterTags } = extractMsgTags(rawLine);
	
	// Batch handling with memory leak prevention
	if (msgTags.has('batch')) {
		const batchRef = msgTags.get('batch');
		if (batchBuffer.has(batchRef)) {
			batchBuffer.get(batchRef).messages.push(rawLine);
			// Reset cleanup timer on activity
			if (batchCleanupTimers.has(batchRef)) {
				clearTimeout(batchCleanupTimers.get(batchRef));
			}
			batchCleanupTimers.set(batchRef, setTimeout(() => {
				if (batchBuffer.has(batchRef)) {
					writeToLog(`[BATCH] Timeout cleanup for ref=${batchRef}`);
					batchBuffer.delete(batchRef);
					batchCleanupTimers.delete(batchRef);
				}
			}, 60000)); // 60s timeout
			return;
		}
	}
	
	let data = lineAfterTags.split(" ");
	if (!data || data.length < 2) return;
	
	if (data[0] === "PING") {
		const pingToken = data[1] ? data[1].replace(/^:/, '') : 'pong';
		doSend("PONG :" + pingToken.trim());
		writeToLog(`[PING/PONG] PONG ${pingToken}`);
		return;
	}
	if (data[0] === "ERROR") {
		writeToScreen("var(--clr-font)", lineAfterTags, statusChannel, "");
		writeToLog(`[ERROR] ${lineAfterTags}`);
		return;
	}
	
	if (!data[0].startsWith(':')) {
		const bareCommand = data[0].toUpperCase();
		const bareFn = Commands.get(bareCommand);
		if (bareFn) {
			bareFn("", data, msgTags);
			return;
		}
	}
	
	let nick = data[0].substring(1).split("!")[0];
	let command = data[1].toUpperCase();
	let fn = Commands.get(command);
	if (fn) {
		fn(nick, data, msgTags);
		return;
	}
	
	if (!isNaN(parseInt(data[1]))) {
		let text = "";
		if (data.length > 3) {
			let first = data[3];
			if (first.startsWith(':')) first = first.substring(1);
			text = first;
			for (let i = 4; i < data.length; i++) text += " " + data[i];
		}
		writeToScreen("var(--clr-font)", text || data[1], statusChannel, "");
		writeToLog(`[SERVER] ${data[1]}: ${text}`);
	}
}

// IRC Commands
const Commands = new Map();

// WHOIS replies
Commands.set("311", (nick, data) => { // RPL_WHOISUSER
	if (!data || data.length < 6) return;
	const target = data[3], user = data[4], host = data[5];
	const realname = data.slice(7).join(' ').replace(/^:/, '');
	writeToScreen("var(--clr-info)", `[WHOIS] ${target} (${user}@${host}) — 真名: ${realname}`, statusChannel, "*");
});

Commands.set("312", (nick, data) => { // RPL_WHOISSERVER
	if (!data || data.length < 5) return;
	const target = data[3], server = data[4];
	const serverInfo = data.slice(5).join(' ').replace(/^:/, '');
	writeToScreen("var(--clr-info)", `[WHOIS] ${target} 服务器: ${server} (${serverInfo})`, statusChannel, "*");
});

Commands.set("313", (nick, data) => { // RPL_WHOISOPERATOR
	if (!data || data.length < 4) return;
	writeToScreen("var(--clr-gold)", `[WHOIS] ${data[3]} 是 IRC 管理员`, statusChannel, "*");
});

Commands.set("317", (nick, data) => { // RPL_WHOISIDLE
	if (!data || data.length < 5) return;
	const target = data[3], idleSec = parseInt(data[4]) || 0;
	const idleMin = Math.floor(idleSec / 60), idleSecs = idleSec % 60;
	writeToScreen("var(--clr-info)", `[WHOIS] ${target} 已闲置: ${idleMin}分${idleSecs}秒`, statusChannel, "*");
});

Commands.set("318", (nick, data) => { // RPL_ENDOFWHOIS
	if (!data || data.length < 4) return;
	writeToScreen("var(--clr-text-dim)", `[WHOIS] ${data[3]} 的信息结束`, statusChannel, "*");

// CAP negotiation
Commands.set("CAP", (nick, data) => {
	if (!data || data.length < 4) return;
	const target = data[2], subCommand = data[3].toUpperCase();
	
	let isMultiline = false, capsStartIdx = 4;
	if (subCommand === "LS" && data[4] === "*") { isMultiline = true; capsStartIdx = 5; }
	
	let caps = "";
	for (let i = capsStartIdx; i < data.length; i++) {
		if (data[i].startsWith(':')) {
			caps = data[i].substring(1);
			for (let j = i + 1; j < data.length; j++) caps += ' ' + data[j];
			break;
		} else caps += (caps ? ' ' : '') + data[i];
	}
	
	writeToLog(`[CAP] ${subCommand}${isMultiline ? ' (multiline)' : ''}: "${caps}"`);
	
	if (subCommand === "LS") {
		if (caps) capLsBuffer = capLsBuffer ? capLsBuffer + ' ' + caps : caps;
		if (isMultiline) {
			writeToLog(`[CAP] LS multiline chunk — waiting for more...`);
			return;
		}
		const allCaps = capLsBuffer;
		capLsBuffer = "";
		writeToScreen("var(--clr-info)", `服务器支持的能力: ${allCaps}`, statusChannel, "*");
		
		const availableCaps = allCaps.split(' ').map(c => c.trim().split('=')[0].toLowerCase()).filter(c => c);
		const wantedCaps = ["message-tags", "server-time", "sasl", "away-notify", "chghost", "account-tag", "account-notify", "extended-join", "echo-message", "multi-prefix", "userhost-in-names", "cap-notify", "setname", "batch", "labeled-response", "chathistory", "invite-notify", "draft/multiline", "whox"];
		const requestedCaps = wantedCaps.filter(cap => availableCaps.includes(cap.toLowerCase())).join(' ');
		
		if (requestedCaps) {
			writeToLog(`[CAP] Requesting: ${requestedCaps}`);
			doSend("CAP REQ :" + requestedCaps);
		} else {
			writeToLog(`[CAP] No matching capabilities`);
			doSend("CAP END");
			sendRegistration();
		}
	} else if (subCommand === "ACK") {
		const ackedList = (caps || "").split(' ').map(c => c.trim().toLowerCase()).filter(c => c);
		ackedList.forEach(cap => ircv3ActiveCaps.add(cap));
		
		if (ircv3ActiveCaps.has('server-time')) ircv3ServerTime = true;
		if (ircv3ActiveCaps.has('echo-message')) ircv3EchoMessage = true;
		if (ircv3ActiveCaps.has('message-tags')) ircv3MessageTags = true;
		if (ircv3ActiveCaps.has('account-tag')) ircv3AccountTag = true;
		if (ircv3ActiveCaps.has('away-notify')) ircv3AwayNotify = true;
		if (ircv3ActiveCaps.has('account-notify')) ircv3AccountNotify = true;
		if (ircv3ActiveCaps.has('extended-join')) ircv3ExtendedJoin = true;
		if (ircv3ActiveCaps.has('chghost')) ircv3ChgHost = true;
		if (ircv3ActiveCaps.has('multi-prefix')) ircv3MultiPrefix = true;
		if (ircv3ActiveCaps.has('userhost-in-names')) ircv3UserhostInNames = true;
		if (ircv3ActiveCaps.has('batch')) ircv3Batch = true;
		if (ircv3ActiveCaps.has('labeled-response')) ircv3LabeledResponse = true;
		if (ircv3ActiveCaps.has('chathistory')) ircv3ChatHistory = true;
		if (ircv3ActiveCaps.has('invite-notify')) ircv3InviteNotify = true;
		if (ircv3ActiveCaps.has('draft/multiline')) ircv3Multiline = true;
		if (ircv3ActiveCaps.has('whox')) ircv3Whox = true;
		
		writeToScreen("var(--clr-green)", `已启用能力: ${ackedList.join(', ') || '(无)'}`, statusChannel, "*");
		
		if (ircv3ActiveCaps.has('sasl') && saslEnabled && saslAccount && saslPassword) {
			writeToLog(`[SASL] Starting PLAIN auth for: ${saslAccount}`);
			saslPending = true;
			doSend("AUTHENTICATE PLAIN");
		} else {
			doSend("CAP END");
			sendRegistration();
		}
	} else if (subCommand === "NAK") {
		writeToScreen("var(--clr-warning)", `能力被拒绝: ${caps || '(无)'}`, statusChannel, "*");
		doSend("CAP END");
		sendRegistration();
	} else if (subCommand === "LIST") {
		writeToScreen("var(--clr-info)", `当前启用的能力: ${caps || '(无)'}`, statusChannel, "*");
	} else if (subCommand === "NEW") {
		writeToScreen("var(--clr-info)", `服务器新增能力: ${caps}`, statusChannel, "*");
	} else if (subCommand === "DEL") {
		writeToScreen("var(--clr-warning)", `服务器移除能力: ${caps}`, statusChannel, "*");
		caps.split(' ').map(c => c.trim().toLowerCase()).filter(c => c).forEach(cap => ircv3ActiveCaps.delete(cap));
	}
});

// SASL authentication
Commands.set("AUTHENTICATE", (nick, data) => {
	if (!data || data.length < 2) return;
	let payload = "";
	if (data[0].toUpperCase() === "AUTHENTICATE") payload = (data[1] || "").replace(/^:/, '');
	else payload = (data[2] || "").replace(/^:/, '');
	
	if (payload === '+') {
		if (!saslPending || !saslAccount || !saslPassword) {
			writeToLog('[SASL] AUTHENTICATE + received but no pending auth');
			doSend("AUTHENTICATE *");
			return;
		}
		const authStr = `\x00${saslAccount}\x00${saslPassword}`;
		const encoded = btoa(unescape(encodeURIComponent(authStr)));
		writeToLog(`[SASL] Sending PLAIN credentials`);
		doSend("AUTHENTICATE " + encoded);
	} else writeToLog(`[SASL] Unexpected payload: ${payload}`);
});

Commands.set("353", (nick, data) => { // RPL_NAMREPLY
	if (!data || data.length < 6) return;
	let channel = findChannel(data[4]);
	if (!channel) return;
	if (channel.names_end == true) { channel.users = []; channel.names_end = false; }
	data[5] = data[5].substring(1);
	for (let i = 5; i < data.length; i++) {
		let prefix = "", entry = data[i];
		let displayNick = entry;
		if (ircv3UserhostInNames && entry.includes('!')) displayNick = entry.split('!')[0];
		
		let ii = 0;
		while (PrefixChars && PrefixChars[1] && ii < displayNick.length && PrefixChars[1].indexOf(displayNick[ii]) >= 0) {
			prefix += displayNick[ii];
			ii++;
		}
		if (prefix == "") prefix = " ";
		channel.users.push([prefix, displayNick.substring(ii)]);
	}
	writeToLog(`[IRC] RPL_NAMREPLY: ${data[4]} users=${channel.users.length}`);
});

Commands.set("366", (nick, data) => { // RPL_ENDOFNAMES
	if (!data || data.length < 4) return;
	let channel = findChannel(data[3]);
	if (!channel || !channel.userlist) return;
	channel.users.sort(sortUserList);
	
	const frag = document.createDocumentFragment();
	for (let i = 0; i < channel.users.length; i++) {
		const prefix = channel.users[i][0], nickName = channel.users[i][1];
		const userEl = document.createElement("li");
		const initial = nickName.replace(/^[^a-zA-Z0-9]/, '')[0] || nickName[0] || '?';
		userEl.setAttribute('data-initial', initial.toUpperCase());
		const prefixP = document.createElement("p");
		if (prefix && prefix !== " ") {
			const prefixChar = prefix[0], prefixInfo = DefaultPrefixMap[prefixChar];
			userEl.setAttribute('data-prefix', prefixChar);
			prefixP.textContent = prefixInfo ? prefixInfo.symbol : prefixChar;
			if (prefixInfo) prefixP.title = prefixInfo.name;
		}
		userEl.appendChild(prefixP);
		const nickP = document.createElement("p");
		nickP.textContent = nickName;
		nickP.title = "点击与 " + nickName + " 私聊";
		nickP.style.cursor = "pointer";
		nickP.addEventListener("click", ((n) => (e) => { e.stopPropagation(); openPrivateChat(n); })(nickName));
		userEl.appendChild(nickP);
		frag.appendChild(userEl);
	}
	channel.userlist.innerHTML = "";
	channel.userlist.appendChild(frag);
	channel.names_end = true;
	writeToLog(`[IRC] RPL_ENDOFNAMES: ${data[3]} total=${channel.users.length}`);
});

Commands.set("JOIN", (nick, data) => {
	if (!data || data.length < 3) return;
	let serverChannelName = data[2];
	if (serverChannelName[0] == ":") serverChannelName = serverChannelName.substring(1);
	
	const isSelf = data[0].startsWith(":" + nickname + "!") || data[0].toLowerCase().startsWith(":" + nickname.toLowerCase() + "!");
	let joinAccount = null;
	if (ircv3ExtendedJoin && data.length >= 4) joinAccount = data[3] !== '*' ? data[3] : null;
	
	writeToLog(`[IRC] JOIN: nick=${nick}, channel=${serverChannelName}, self=${isSelf}${joinAccount ? ', account='+joinAccount : ''}`);
	
	if (!isSelf) {
		const channel = findChannel(serverChannelName);
		if (!channel) return;
		channelInsertUser(nick, channel, " ");
		if (joinAccount) writeToScreen("var(--clr-green)", `${nick} 加入频道 (账号: ${joinAccount})`, channel, "*");
		else writeToScreen("var(--clr-green)", `${nick} 加入频道`, channel, "*");
	} else {
		let channel = findChannel(serverChannelName);
		if (channel) {
			if (channel.name !== serverChannelName) {
				channelMap.delete(channel.name);
				channel.name = serverChannelName;
				channel.button.textContent = serverChannelName;
				channel.button.value = serverChannelName;
				channel.button.querySelector('.x').value = serverChannelName;
				channelMap.set(serverChannelName, channel);
			}
		} else channel = new Tab_Create(serverChannelName, "", true);
		
		channelName = serverChannelName;
		writeToScreen("var(--clr-green)", `你已加入频道 ${serverChannelName}`, channel, "*");
		setTimeout(() => {
			requestChatHistory(serverChannelName, 50);
			requestWho(serverChannelName);
		}, 300);
	}
});
