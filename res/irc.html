<!DOCTYPE html>
<html lang="zh-CN">

<head>
	<meta charset="UTF-8" version="1.7">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<meta name="description" content="ARKFUTURE-NET IRC">
	<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
	<meta http-equiv="Pragma" content="no-cache">
	<meta http-equiv="Expires" content="0">
	<title>IRC Web Client</title>
	<style>
	:root {
		--c-cyan:    #00e5ff;
		--c-magenta: #e040fb;
		--c-yellow:  #ffd740;
		--c-green:   #69ff47;
		--c-red:     #ff1744;
		--c-orange:  #ff6d00;

		--bg-base:   #0d0d0f;
		--bg-raised: #141418;
		--bg-overlay:#1a1a20;
		--bg-hover:  #202028;
		--bg-active: #252530;

		--bd-subtle:  #242430;
		--bd-default: #2e2e3c;
		--bd-strong:  #3a3a4a;

		--tx-primary:  #e8e8f0;
		--tx-secondary:#9898b0;
		--tx-muted:    #55556a;
		--tx-link:     var(--c-cyan);

		--glow-cyan:    0 0 8px rgba(0,229,255,.5), 0 0 20px rgba(0,229,255,.2);
		--glow-magenta: 0 0 8px rgba(224,64,251,.5), 0 0 20px rgba(224,64,251,.2);
		--glow-green:   0 0 8px rgba(105,255,71,.5), 0 0 20px rgba(105,255,71,.2);
		--glow-red:     0 0 8px rgba(255,23,68,.5),  0 0 20px rgba(255,23,68,.2);

		--sp-1: 4px;
		--sp-2: 8px;
		--sp-3: 12px;
		--sp-4: 16px;
		--sp-5: 20px;
		--sp-6: 24px;

		--font-ui:   -apple-system, 'Segoe UI', system-ui, sans-serif;
		--font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', 'Courier New', monospace;
		--font-size-xs:  10px;
		--font-size-sm:  11px;
		--font-size-md:  13px;
		--font-size-lg:  15px;

		--sidebar-w: 220px;
		--panel-w:   260px;
		--header-h:  48px;
		--tabbar-h:  36px;
		--input-h:   56px;

		--radius-sm: 4px;
		--radius-md: 6px;
		--radius-lg: 10px;
		--transition: all 0.18s cubic-bezier(.4,0,.2,1);

		/* JS colour aliases – DO NOT REMOVE */
		--cyber-primary:   var(--c-cyan);
		--cyber-secondary: var(--c-magenta);
		--cyber-accent:    var(--c-yellow);
		--cyber-green:     var(--c-green);
		--cyber-red:       var(--c-red);
		--cyber-dark:      var(--bg-base);
		--cyber-dark2:     var(--bg-raised);
		--cyber-dark3:     var(--bg-overlay);
		--cyber-border:    var(--bd-default);
		--cyber-text:      var(--tx-primary);
		--cyber-text-dim:  var(--tx-secondary);
		--glow-primary:    var(--glow-cyan);
		--glow-secondary:  var(--glow-magenta);

		--clr-font:       var(--tx-primary);
		--clr-info:       var(--c-cyan);
		--clr-success:    var(--c-green);
		--clr-warning:    var(--c-yellow);
		--clr-error:      var(--c-red);
		--clr-red:        var(--c-red);
		--clr-green:      var(--c-green);
		--clr-blue:       var(--c-cyan);
		--clr-purple:     var(--c-magenta);
		--clr-gold:       var(--c-yellow);
		--clr-brown:      #cd853f;
		--clr-accent:     var(--c-yellow);
		--clr-secondary:  var(--c-magenta);
		--clr-text-dim:   var(--tx-secondary);
	}

	*, *::before, *::after {
		box-sizing: border-box;
		margin: 0; padding: 0;
	}

	button, input, select, textarea, [role="button"],
	.irc-menu__btn, .settings-toggle-btn, .header-menu-item,
	.channel-item, .user-item, .sidebar-header, .tab-btn,
	.irc-header, .irc-sidebar, .irc-tabbar {
		user-select: none;
		-webkit-user-select: none;
	}
	::-webkit-scrollbar { width: 4px; height: 4px; }
	::-webkit-scrollbar-track { background: transparent; }
	::-webkit-scrollbar-thumb { background: var(--bd-strong); border-radius: 99px; }
	::-webkit-scrollbar-thumb:hover { background: var(--c-cyan); }
	* { scrollbar-width: thin; scrollbar-color: var(--bd-strong) transparent; }

	html, body {
		height: 100%; overflow: hidden;
		font-family: var(--font-mono);
		font-size: var(--font-size-md);
		line-height: 1.6;
		background: var(--bg-base);
		color: var(--tx-primary);
		-webkit-font-smoothing: antialiased;
	}

	.irc-app {
		display: flex;
		flex-direction: column;
		height: 100vh;
		overflow: hidden;
	}

	.irc-header {
		flex: 0 0 var(--header-h);
		display: flex;
		align-items: center;
		justify-content: space-between;
		padding: 0 var(--sp-4);
		background: var(--bg-raised);
		border-bottom: 1px solid var(--bd-subtle);
		gap: var(--sp-3);
		z-index: 200;
	}

	.irc-header__left {
		display: flex;
		align-items: center;
		gap: var(--sp-3);
		min-width: 0;
	}

	.irc-header__title {
		font-size: 14px;
		font-weight: 700;
		color: var(--c-cyan);
		letter-spacing: 3px;
		text-transform: uppercase;
		white-space: nowrap;
		text-shadow: 0 0 12px rgba(0,229,255,.6);
	}

	.connection-status {
		display: inline-flex;
		align-items: center;
		gap: 6px;
		padding: 3px 10px;
		background: var(--bg-overlay);
		border: 1px solid var(--bd-default);
		border-radius: 99px;
		font-size: var(--font-size-xs);
		font-family: var(--font-mono);
		letter-spacing: .5px;
		white-space: nowrap;
		transition: var(--transition);
	}
	.connection-status .indicator {
		width: 7px; height: 7px;
		border-radius: 50%;
		background: var(--tx-muted);
		flex-shrink: 0;
		transition: var(--transition);
	}
	.connection-status.connected    { border-color: rgba(105,255,71,.4);  color: var(--c-green);  }
	.connection-status.connecting   { border-color: rgba(255,215,64,.4);  color: var(--c-yellow); animation: pulse 1.2s ease infinite; }
	.connection-status.disconnected { border-color: rgba(255,23,68,.35);  color: var(--c-red);   }
	.connection-status.connected  .indicator { background: var(--c-green);  box-shadow: 0 0 6px var(--c-green); }
	.connection-status.connecting .indicator { background: var(--c-yellow); box-shadow: 0 0 6px var(--c-yellow); animation: pulse 1.2s ease infinite; }
	.connection-status.disconnected .indicator { background: var(--c-red); box-shadow: 0 0 6px var(--c-red); }

	@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
	@keyframes shake {
		0%,100%{transform:translateX(0)}
		20%{transform:translateX(-4px)} 40%{transform:translateX(4px)}
		60%{transform:translateX(-3px)} 80%{transform:translateX(3px)}
	}
	@keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
	@keyframes slideIn { from{transform:translateX(8px);opacity:0} to{transform:translateX(0);opacity:1} }

	.irc-header__right {
		display: flex;
		align-items: center;
		gap: var(--sp-2);
		flex-shrink: 0;
	}

	.irc-menu { position: relative; }

	.irc-menu__btn {
		background: var(--bg-overlay);
		color: var(--tx-secondary);
		border: 1px solid var(--bd-default);
		border-radius: var(--radius-sm);
		padding: 5px 12px;
		cursor: pointer;
		font-size: var(--font-size-sm);
		font-family: var(--font-mono);
		letter-spacing: .5px;
		transition: var(--transition);
		display: flex; align-items: center; gap: 5px;
	}
	.irc-menu__btn:hover {
		background: var(--bg-hover);
		color: var(--c-cyan);
		border-color: rgba(0,229,255,.35);
	}

	.settings-toggle-btn {
		background: var(--bg-overlay);
		color: var(--tx-secondary);
		border: 1px solid var(--bd-default);
		border-radius: var(--radius-sm);
		padding: 5px 12px;
		cursor: pointer;
		font-size: var(--font-size-sm);
		font-family: var(--font-mono);
		letter-spacing: .5px;
		transition: var(--transition);
		display: flex; align-items: center; gap: 5px;
		white-space: nowrap;
	}
	.settings-toggle-btn:hover {
		background: var(--bg-hover);
		color: var(--c-cyan);
		border-color: rgba(0,229,255,.35);
	}
	.settings-toggle-btn.active {
		background: rgba(0,229,255,.1);
		color: var(--c-cyan);
		border-color: rgba(0,229,255,.5);
	}

	.irc-menu__dropdown {
		display: none;
		position: absolute;
		top: calc(100% + 6px);
		right: 0;
		min-width: 160px;
		background: var(--bg-overlay);
		border: 1px solid var(--bd-default);
		border-radius: var(--radius-md);
		box-shadow: 0 8px 32px rgba(0,0,0,.6), 0 0 0 1px rgba(0,229,255,.06);
		z-index: 9999;
		padding: 6px;
		animation: fadeIn .15s ease;
	}
	.irc-menu__dropdown.visible { display: block; }

	.header-menu-item {
		cursor: pointer;
		font-size: var(--font-size-sm);
		font-family: var(--font-mono);
		letter-spacing: .3px;
		padding: 7px 12px;
		color: var(--tx-secondary);
		border-radius: var(--radius-sm);
		transition: var(--transition);
		display: flex; align-items: center; gap: 8px;
	}
	.header-menu-item:hover { background: var(--bg-hover); color: var(--tx-primary); }
	.header-menu-item:nth-child(1):hover { color: var(--c-cyan); }
	.header-menu-item:nth-child(2):hover { color: var(--c-magenta); }
	.header-menu-item:nth-child(3):hover { color: var(--c-yellow); }
	.header-menu-item:nth-child(4):hover { color: var(--c-green); }
	.header-menu-item.active {
		background: rgba(105,255,71,.12);
		color: var(--c-green);
	}
	.header-menu-item.active::before { content:'✓'; margin-right: 2px; }

	.irc-settings {
		flex: 0 0 auto;
		overflow: hidden;
		max-height: 0;
		transition: max-height .3s cubic-bezier(.4,0,.2,1), border-color .3s;
		background: var(--bg-raised);
		border-bottom: 1px solid transparent;
	}
	.irc-settings.open {
		max-height: 200px;
		border-bottom-color: var(--bd-subtle);
	}

	.irc-settings__inner {
		display: flex;
		flex-wrap: wrap;
		align-items: flex-end;
		gap: var(--sp-3) var(--sp-4);
		padding: var(--sp-3) var(--sp-4);
	}

	.settings-group {
		display: flex;
		flex-direction: column;
		gap: 4px;
		flex: 0 0 auto;
	}
	.settings-group label {
		font-size: var(--font-size-xs);
		color: var(--tx-muted);
		text-transform: uppercase;
		letter-spacing: .8px;
		font-family: var(--font-ui);
	}
	.settings-group input[type="text"],
	.settings-group input[type="password"] {
		padding: 6px 10px;
		background: var(--bg-base);
		color: var(--tx-primary);
		border: 1px solid var(--bd-default);
		border-radius: var(--radius-sm);
		font-size: var(--font-size-sm);
		font-family: var(--font-mono);
		width: 170px;
		transition: var(--transition);
	}
	.settings-group input:focus {
		outline: none;
		border-color: rgba(0,229,255,.6);
		box-shadow: 0 0 0 2px rgba(0,229,255,.12);
	}
	.settings-group input.input-error {
		border-color: var(--c-red) !important;
		box-shadow: 0 0 0 2px rgba(255,23,68,.2) !important;
		animation: shake .35s ease;
	}

	.settings-group__row {
		display: flex;
		gap: var(--sp-1);
		align-items: center;
	}
	.settings-group__row input { flex: 1; min-width: 0; }

	.irc-settings__actions {
		display: flex;
		gap: var(--sp-2);
		align-items: center;
		margin-left: auto;
		flex-shrink: 0;
	}

	#saslGroup label, #saslPassGroup label { color: rgba(255,215,64,.7); }

	.btn {
		display: inline-flex;
		align-items: center;
		justify-content: center;
		gap: 5px;
		padding: 6px 14px;
		background: transparent;
		color: var(--c-cyan);
		border: 1px solid rgba(0,229,255,.4);
		border-radius: var(--radius-sm);
		cursor: pointer;
		font-size: var(--font-size-sm);
		font-family: var(--font-mono);
		white-space: nowrap;
		letter-spacing: .3px;
		transition: var(--transition);
	}
	.btn:hover {
		background: rgba(0,229,255,.1);
		border-color: var(--c-cyan);
		color: var(--c-cyan);
		box-shadow: var(--glow-cyan);
	}
	.btn:disabled {
		border-color: var(--bd-default);
		color: var(--tx-muted);
		cursor: not-allowed;
	}
	.btn:disabled:hover { background: transparent; box-shadow: none; }

	.connect-btn {
		color: var(--c-green);
		border-color: rgba(105,255,71,.4);
		background: rgba(105,255,71,.07);
	}
	.connect-btn:hover {
		background: rgba(105,255,71,.18);
		border-color: var(--c-green);
		box-shadow: var(--glow-green);
		color: var(--c-green);
	}
	.connect-btn.disconnect {
		color: var(--c-red);
		border-color: rgba(255,23,68,.4);
		background: rgba(255,23,68,.07);
	}
	.connect-btn.disconnect:hover {
		background: rgba(255,23,68,.18);
		border-color: var(--c-red);
		box-shadow: var(--glow-red);
	}

	.send-btn {
		padding: 6px 18px;
		background: rgba(0,229,255,.15);
		color: var(--c-cyan);
		border: 1px solid rgba(0,229,255,.5);
		border-radius: var(--radius-sm);
		cursor: pointer;
		font-size: var(--font-size-sm);
		font-family: var(--font-mono);
		white-space: nowrap;
		letter-spacing: .5px;
		transition: var(--transition);
		flex-shrink: 0;
	}
	.send-btn:hover {
		background: rgba(0,229,255,.28);
		border-color: var(--c-cyan);
		box-shadow: var(--glow-cyan);
	}
	.send-btn:disabled {
		background: var(--bg-base);
		border-color: var(--bd-default);
		color: var(--tx-muted);
		cursor: not-allowed;
	}

	.ssl-warning {
		display: none;
		position: fixed;
		bottom: 24px; right: 24px;
		max-width: 380px;
		background: var(--bg-overlay);
		border: 1px solid rgba(255,215,64,.5);
		border-radius: var(--radius-md);
		color: var(--tx-primary);
		padding: var(--sp-3) var(--sp-4);
		font-size: 12px;
		line-height: 1.5;
		z-index: 9000;
		box-shadow: 0 8px 32px rgba(0,0,0,.5), 0 0 20px rgba(255,215,64,.1);
	}
	.ssl-warning.visible { display: block; animation: slideIn .2s ease; }
	.ssl-warning a { color: var(--c-cyan); text-decoration: underline; cursor: pointer; }
	.ssl-warning code {
		background: var(--bg-base);
		padding: 1px 5px;
		border: 1px solid var(--bd-default);
		border-radius: 3px;
		font-family: var(--font-mono);
		font-size: 11px;
	}

	.irc-chat {
		flex: 1 1 auto;
		display: flex;
		flex-direction: column;
		overflow: hidden;
		position: relative;
		min-height: 0;
	}

	.log-container {
		display: none;
		position: absolute;
		inset: 0;
		flex-direction: column;
		background: rgba(13,13,15,.97);
		border-bottom: 1px solid rgba(0,229,255,.2);
		backdrop-filter: blur(4px);
		z-index: 100;
	}
	.log-container.visible { display: flex; animation: fadeIn .15s ease; }

	.log-header {
		flex: 0 0 auto;
		display: flex;
		justify-content: space-between;
		align-items: center;
		padding: 8px 14px;
		background: var(--bg-raised);
		border-bottom: 1px solid var(--bd-subtle);
		font-size: var(--font-size-sm);
		font-family: var(--font-mono);
		color: var(--c-cyan);
		letter-spacing: .5px;
	}
	.log-controls { display: flex; gap: 6px; }
	.log-controls button {
		padding: 3px 10px;
		background: transparent;
		border: 1px solid var(--bd-default);
		border-radius: var(--radius-sm);
		color: var(--tx-muted);
		cursor: pointer;
		font-size: var(--font-size-xs);
		font-family: var(--font-mono);
		transition: var(--transition);
	}
	.log-controls button:hover { border-color: var(--c-cyan); color: var(--c-cyan); }

	#logOutput {
		flex: 1 1 auto;
		overflow-y: auto;
		padding: var(--sp-2) var(--sp-3);
		font-size: var(--font-size-sm);
		font-family: var(--font-mono);
		color: var(--tx-secondary);
		word-wrap: break-word;
		line-height: 1.6;
	}
	#logOutput span { display: block; white-space: pre-wrap; }
	#logOutput:empty::before { content:'[ NO LOG DATA ]'; color: var(--tx-muted); font-size: 12px; }

	.channels {
		flex: 0 0 var(--tabbar-h);
		display: flex;
		align-items: center;
		gap: 3px;
		padding: 0 var(--sp-3);
		background: var(--bg-raised);
		border-bottom: 1px solid var(--bd-subtle);
		overflow-x: auto;
		overflow-y: hidden;
		flex-wrap: nowrap;
	}
	.channels::-webkit-scrollbar { height: 2px; }

	.channel {
		display: inline-flex;
		align-items: center;
		gap: 5px;
		padding: 0 12px;
		height: calc(var(--tabbar-h) - 6px);
		background: transparent;
		border: 1px solid transparent;
		border-radius: var(--radius-sm);
		cursor: pointer;
		font-size: var(--font-size-sm);
		font-family: var(--font-mono);
		color: var(--tx-secondary);
		white-space: nowrap;
		position: relative;
		transition: var(--transition);
		letter-spacing: .2px;
	}
	.channel:hover {
		background: var(--bg-hover);
		color: var(--tx-primary);
	}
	.channel.active {
		background: var(--bg-active);
		color: var(--c-cyan);
		border-color: rgba(0,229,255,.2);
		box-shadow: inset 0 -2px 0 var(--c-cyan);
	}
	.channel.private { color: var(--tx-secondary); }
	.channel.private.active { color: var(--c-magenta); border-color: rgba(224,64,251,.2); box-shadow: inset 0 -2px 0 var(--c-magenta); }

	.channel .unread-badge {
		position: absolute;
		top: 2px; right: 2px;
		background: var(--c-red);
		color: #fff;
		font-size: 8px;
		font-weight: 700;
		padding: 0 4px;
		min-width: 14px;
		height: 14px;
		line-height: 14px;
		text-align: center;
		border-radius: 99px;
		box-shadow: 0 0 6px var(--c-red);
	}
	.channel button.x {
		background: none;
		border: none;
		color: inherit;
		cursor: pointer;
		padding: 0 2px;
		font-size: 13px;
		font-weight: 300;
		line-height: 1;
		opacity: 0;
		transition: opacity .15s;
		margin-left: 2px;
	}
	.channel:hover button.x { opacity: .5; }
	.channel.active button.x { opacity: .6; }
	.channel button.x:hover { opacity: 1 !important; color: var(--c-red); }

	.channelcontents-wrapper {
		flex: 1 1 auto;
		display: flex;
		overflow: hidden;
		min-height: 0;
	}
	.channelcontents-wrapper.hidden { display: none; }
	.channelcontents-wrapper.visible { display: flex; }

	.channelcontents {
		display: flex;
		flex-direction: row;
		width: 100%;
		height: 100%;
		min-height: 0;
	}

	.channelcontent {
		display: none;
		flex: 1 1 auto;
		flex-direction: row;
		min-height: 0;
	}
	.channelcontent.active { display: flex; }

	.channelcontent > nav {
		flex: 1 1 auto;
		display: flex;
		flex-direction: column;
		background: var(--bg-base);
		overflow: hidden;
		min-width: 0;
		border-right: 1px solid var(--bd-subtle);
	}

	.channelcontent > nav > h3 {
		flex: 0 0 auto;
		display: flex;
		align-items: center;
		padding: 0 var(--sp-4);
		height: 36px;
		background: var(--bg-raised);
		border-bottom: 1px solid var(--bd-subtle);
		font-size: var(--font-size-sm);
		font-family: var(--font-mono);
		color: var(--tx-secondary);
		font-weight: 400;
		overflow: hidden;
		text-overflow: ellipsis;
		white-space: nowrap;
	}
	.channelcontent > nav > h3::before {
		content: '#';
		color: var(--c-cyan);
		margin-right: 6px;
		font-weight: 700;
		flex-shrink: 0;
	}

	.channelcontent > nav > nav {
		flex: 1 1 auto;
		overflow-y: auto;
		padding: var(--sp-3) var(--sp-4);
		min-height: 0;
	}

	.channelcontent > nav > nav > p {
		margin: 0;
		padding: 1px 0;
		line-height: 1.65;
		word-wrap: break-word;
		word-break: break-word;
		font-size: var(--font-size-md);
		border-radius: 2px;
		transition: background .12s;
	}
	.channelcontent > nav > nav > p:hover {
		background: rgba(255,255,255,.025);
	}

	.channelcontent > ul {
		flex: 0 0 var(--panel-w);
		overflow-y: auto;
		padding: var(--sp-2);
		list-style: none;
		background: var(--bg-raised);
		min-height: 0;
	}

	.channelcontent > ul > li {
		display: flex;
		align-items: center;
		gap: var(--sp-2);
		padding: 5px var(--sp-2);
		border-radius: var(--radius-sm);
		font-size: var(--font-size-sm);
		cursor: pointer;
		transition: var(--transition);
	}
	.channelcontent > ul > li:hover { background: var(--bg-hover); }

	.channelcontent > ul > li::before {
		content: attr(data-initial);
		display: inline-flex;
		align-items: center;
		justify-content: center;
		width: 26px; height: 26px;
		border-radius: 50%;
		background: var(--bd-default);
		color: var(--tx-secondary);
		font-size: 10px;
		font-weight: 700;
		flex-shrink: 0;
		letter-spacing: 0;
		text-transform: uppercase;
	}

	.channelcontent > ul > li > p:first-child {
		width: 14px;
		flex-shrink: 0;
		text-align: center;
		font-weight: 700;
		font-size: 12px;
		margin: 0;
		overflow: hidden;
	}
	.channelcontent > ul > li > p:nth-child(2) {
		flex: 1;
		margin: 0;
		color: var(--tx-primary);
		overflow: hidden;
		text-overflow: ellipsis;
		white-space: nowrap;
		font-size: var(--font-size-sm);
	}
	.channelcontent > ul > li > p:nth-child(2):hover {
		color: var(--c-cyan);
	}

	.channelcontent > ul > li[data-prefix="~"] > p:first-child { color: var(--c-magenta); }
	.channelcontent > ul > li[data-prefix="~"]::before { background: rgba(224,64,251,.2); color: var(--c-magenta); }
	.channelcontent > ul > li[data-prefix="&"] > p:first-child { color: var(--c-red); }
	.channelcontent > ul > li[data-prefix="&"]::before { background: rgba(255,23,68,.2); color: var(--c-red); }
	.channelcontent > ul > li[data-prefix="@"] > p:first-child { color: var(--c-yellow); }
	.channelcontent > ul > li[data-prefix="@"]::before { background: rgba(255,215,64,.2); color: var(--c-yellow); }
	.channelcontent > ul > li[data-prefix="%"] > p:first-child { color: var(--c-green); }
	.channelcontent > ul > li[data-prefix="%"]::before { background: rgba(105,255,71,.2); color: var(--c-green); }
	.channelcontent > ul > li[data-prefix="+"] > p:first-child { color: var(--c-cyan); }
	.channelcontent > ul > li[data-prefix="+"]::before { background: rgba(0,229,255,.15); color: var(--c-cyan); }

	.empty-state {
		display: flex;
		flex-direction: column;
		align-items: center;
		justify-content: center;
		height: 100%;
		color: var(--tx-muted);
		text-align: center;
		padding: var(--sp-6);
		gap: var(--sp-3);
	}
	.empty-state__icon {
		font-size: 48px;
		opacity: .25;
		line-height: 1;
	}
	.empty-state h3 {
		font-size: 16px;
		font-weight: 600;
		color: var(--tx-secondary);
		letter-spacing: .5px;
	}
	.empty-state p { font-size: 12px; color: var(--tx-muted); line-height: 1.6; }
	.empty-state__hint {
		display: flex;
		flex-direction: column;
		gap: 6px;
		margin-top: var(--sp-2);
		padding: var(--sp-3) var(--sp-4);
		background: var(--bg-raised);
		border: 1px solid var(--bd-subtle);
		border-radius: var(--radius-md);
		font-size: var(--font-size-sm);
		color: var(--tx-muted);
		text-align: left;
		min-width: 220px;
	}
	.empty-state__hint span { color: var(--c-cyan); font-weight: 600; }

	.input-container {
		flex: 0 0 auto;
		display: flex;
		flex-direction: column;
		background: var(--bg-raised);
		border-top: 1px solid var(--bd-subtle);
	}

	.typing-indicator {
		flex: 0 0 auto;
		height: 0;
		overflow: hidden;
		padding: 0 var(--sp-4);
		font-size: var(--font-size-xs);
		font-style: italic;
		color: var(--tx-muted);
		background: var(--bg-raised);
		transition: height .2s ease, padding .2s ease;
		display: flex;
		align-items: center;
		gap: 6px;
		white-space: nowrap;
	}
	.typing-indicator:not(:empty) {
		height: 22px;
		padding-top: 4px;
		padding-bottom: 2px;
	}
	.typing-indicator::before {
		content: '';
		display: inline-block;
		width: 6px; height: 6px;
		border-radius: 50%;
		background: var(--c-cyan);
		animation: pulse 1.2s ease infinite;
		flex-shrink: 0;
	}
	.typing-indicator:empty::before { display: none; }

	.input-container__row {
		display: flex;
		align-items: center;
		gap: var(--sp-2);
		padding: var(--sp-2) var(--sp-3);
	}

	.input-prefix {
		flex-shrink: 0;
		color: var(--tx-muted);
		font-family: var(--font-mono);
		font-size: var(--font-size-md);
		user-select: none !important;
	}

	#input {
		flex: 1;
		padding: 8px 12px;
		background: var(--bg-base);
		color: var(--tx-primary);
		border: 1px solid var(--bd-default);
		border-radius: var(--radius-sm);
		font-size: var(--font-size-md);
		font-family: var(--font-mono);
		transition: var(--transition);
		min-width: 0;
	}
	#input:focus {
		outline: none;
		border-color: rgba(0,229,255,.5);
		background: var(--bg-overlay);
		box-shadow: 0 0 0 2px rgba(0,229,255,.1);
	}
	#input::placeholder { color: var(--tx-muted); }

	.char-count {
		flex-shrink: 0;
		font-size: var(--font-size-xs);
		font-family: var(--font-mono);
		color: var(--tx-muted);
		min-width: 52px;
		text-align: right;
		letter-spacing: .2px;
	}
	.char-count.warning { color: var(--c-yellow); }
	.char-count.danger  { color: var(--c-red); }

	.clickable-username {
		cursor: pointer;
		font-weight: 600;
		color: var(--c-cyan);
		transition: color .12s;
	}
	.clickable-username:hover { color: var(--c-magenta); text-decoration: underline; }

	.channelcontent > ul > li.user-away { opacity: .4; }
	.channelcontent > ul > li.user-away > p:nth-child(2) { font-style: italic; }

	@media (max-width: 900px) {
		:root { --panel-w: 180px; }
	}
	@media (max-width: 768px) {
		:root { --panel-w: 0px; }
		.channelcontent > ul {
			flex: 0 0 auto;
			width: 100%;
			height: 18vh;
			min-height: 70px;
			border-left: none;
			border-top: 1px solid var(--bd-subtle);
		}
		.channelcontent { flex-direction: column; }
		.channelcontent > nav { flex: 1 1 0%; min-height: 0; }
		.irc-settings.open .irc-settings__inner { flex-direction: column; gap: var(--sp-2); }
		.settings-group { width: 100%; }
		.settings-group input[type="text"],
		.settings-group input[type="password"] { width: 100%; }
		.irc-chat { padding-bottom: 56px; }
		.input-container {
			position: fixed;
			bottom: 0; left: 0; right: 0;
			z-index: 1000;
		}
		#input { font-size: 16px; }
	}
	@media (max-width: 480px) {
		:root { --header-h: 44px; }
		.irc-header__title { font-size: 12px; letter-spacing: 2px; }
		.connection-status span:last-child { display: none; }
		.channel { font-size: var(--font-size-xs); padding: 0 8px; }
	}
	</style>
</head>

<body>
	<div class="irc-app">

	<header class="irc-header">
		<div class="irc-header__left">
			<h1 class="irc-header__title" id="caption">IRC</h1>
			<div class="connection-status disconnected" id="connectionStatus">
				<span class="indicator"></span>
				<span id="statusText">未连接</span>
			</div>
		</div>

		<div class="irc-header__right">
			<button class="settings-toggle-btn" id="settingsToggleBtn" onclick="toggleSettings()">
				⚙ 设置
			</button>

			<div class="irc-menu">
				<button class="irc-menu__btn header-menu-btn" onclick="toggleHeaderMenu()">≡ 菜单</button>
				<div class="irc-menu__dropdown" id="headerMenuDropdown">
					<div class="header-menu-item" onclick="toggleLog()">📋 调试日志</div>
					<div class="header-menu-item" onclick="showPrivateChatList()">💬 私聊列表</div>
					<div class="header-menu-item" onclick="showSSLWarning()">🔒 SSL 帮助</div>
					<div class="header-menu-item" onclick="toggleAutoReconnect()">🔄 自动重连</div>
				</div>
			</div>
		</div>
	</header>

	<div class="irc-settings" id="settingsPanel">
		<div class="irc-settings__inner">
			<div class="settings-group">
				<label for="wsUrl">WebSocket 服务器</label>
				<input type="text" id="wsUrl" value="wss://irc.arkfuture.top:8097" placeholder="wss://host:port">
			</div>
			<div class="settings-group">
				<label for="nickInput">昵称</label>
				<input type="text" id="nickInput" value="" placeholder="Your nickname">
			</div>
			<div class="settings-group">
				<label for="channelInput">频道</label>
				<div class="settings-group__row">
					<input type="text" id="channelInput" value="#arkfuture_studio" placeholder="#channel">
					<button class="btn" onclick="joinChannel()" id="joinChannelBtn" disabled
						style="padding:5px 10px;font-size:11px;white-space:nowrap;">加入</button>
				</div>
			</div>
			<div class="settings-group" id="saslGroup" title="SASL 认证账号">
				<label for="saslAccountInput">SASL 账号</label>
				<input type="text" id="saslAccountInput" value="" placeholder="账号 (可选)" autocomplete="username">
			</div>
			<div class="settings-group" id="saslPassGroup" title="SASL PLAIN 密码">
				<label for="saslPasswordInput">SASL 密码</label>
				<input type="password" id="saslPasswordInput" value="" placeholder="密码 (可选)" autocomplete="current-password">
			</div>
			<input type="checkbox" id="autoReconnect" style="display:none;">
			<div class="irc-settings__actions">
				<button class="btn connect-btn" id="connectBtn" onclick="toggleConnection()">连接</button>
			</div>
		</div>
	</div>

	<div class="ssl-warning" id="sslWarning">
		<strong>⚠ 浏览器无法忽略 SSL 证书错误</strong><br>
		请使用以下方案：<br>
		1. 改用 <code>ws://</code> 非加密连接<br>
		2. 在浏览器中访问 <a id="sslLink" target="_blank">服务器地址</a> 并手动信任证书
	</div>

	<div class="irc-chat">

		<div class="log-container" id="logContainer">
			<div class="log-header">
				<span>WebSocket 调试日志</span>
				<div class="log-controls">
					<button onclick="clearLog()">清空</button>
					<button onclick="toggleLog()">关闭</button>
				</div>
			</div>
			<div id="logOutput"></div>
		</div>

		<div class="channels" id="channelsContainer"></div>

		<div class="channelcontents-wrapper hidden" id="contentsWrapper">
			<div class="channelcontents" id="channelContents"></div>
		</div>

		<div class="empty-state" id="emptyState">
			<div class="empty-state__icon">⌨</div>
			<h3>IRC Web Client</h3>
			<p>点击右上角 <strong>⚙ 设置</strong> 填写服务器信息后连接</p>
			<div class="empty-state__hint">
				<div>🔗 <span>WebSocket</span> — wss://host:port</div>
				<div>👤 <span>昵称</span> — 设置你的显示名</div>
				<div>📡 <span>频道</span> — #channel 回车加入</div>
				<div>💡 <span>/help</span> — 查看所有命令</div>
			</div>
		</div>

		<div class="input-container" id="inputContainer" style="display:none;">
			<div class="typing-indicator" id="typingIndicator"></div>
			<div class="input-container__row">
				<span class="input-prefix" id="inputPrefix">&gt;</span>
				<input type="text" name="input" id="input"
					placeholder="输入消息，/ 开头为命令，/help 查看帮助…"
					onkeydown="onKeyDown(event)"
					oninput="updateCharCount(); handleTypingInput();">
				<button class="btn send-btn" id="sendBtn" onclick="send()">发送</button>
				<span class="char-count" id="charCount">0</span>
			</div>
		</div>

	</div>
	</div>
</body>

<script>
(function () {
'use strict';
	let nickname = "";
	let channelName = "";
	let wsUrl = "";
	let channels, channelContents, contentsWrapper, emptyState, input;
	let channelMap = new Map();
	let activeChannel = null;
	let statusChannel = null;
	let PrefixChars = ["", ""];
	let websocket = null;
	let isConnected = false;
	let autoReconnect = false;
	let reconnectAttempts = 0;
	const maxReconnectAttempts = 5;
	const reconnectDelay = 3000;
	let keepAliveTimer = null;
	const keepAliveInterval = 90000;
	let inputBlurTimeoutId = null;
	let connectTimeout = null;
	let messageHistory = [];
	let historyIndex = -1;
	let isDisconnecting = false;
	let headerMenuClickListener = null;

	let sessionStartTime = null;
	let sentCount = 0;
	let recvCount = 0;
	let batchBuffer = new Map();
	let labelCounter = 0;
	let pendingLabels = new Map();

	function findChannel(channelName) {
		if (!channelName) return null;
		const lowerName = channelName.toLowerCase();
		
		let channel = channelMap.get(channelName);
		if (channel) return channel;
		
		for (let [key, value] of channelMap) {
			if (key.toLowerCase() === lowerName) {
				return value;
			}
		}
		return null;
	}

	function onLoad() {
		channels = document.getElementById("channelsContainer");
		channelContents = document.getElementById("channelContents");
		contentsWrapper = document.getElementById("contentsWrapper");
		emptyState = document.getElementById("emptyState");
		input = document.getElementById("input");

		loadSettings();

		let url = new URL(document.location);
		if (url.hash) {
			const safeHash = url.hash.replace(/[^\w#&\-]/g, '').substring(0, 64);
			if (safeHash) document.getElementById('channelInput').value = safeHash;
		}
	if (window.frameElement) {
		const captionEl = document.getElementById("caption");
		if (captionEl) captionEl.style.display = "none";
	}
		updateConnectionStatus('disconnected');

		if (input) {
			input.addEventListener('blur', handleInputBlur);
		}
	}
	
	function cleanupEventListeners() {
		removeInputBlurListener();
		
		if (headerMenuClickListener) {
			document.removeEventListener('click', headerMenuClickListener);
			headerMenuClickListener = null;
		}
		
		const menu = document.getElementById('headerMenuDropdown');
		if (menu && menu.classList.contains('menu-attached')) {
			menu.classList.remove('visible');
			menu.classList.remove('menu-attached');
			document.removeEventListener('click', closeHeaderMenuOnClickOutside);
		}
	}

	function saveSettings() {
		try {
			const settings = {
				wsUrl: document.getElementById('wsUrl').value,
				nickname: document.getElementById('nickInput').value,
				channel: document.getElementById('channelInput').value,
				autoReconnect: document.getElementById('autoReconnect').checked,
				saslAccount: document.getElementById('saslAccountInput') ? document.getElementById('saslAccountInput').value : ''
			};
			localStorage.setItem('ircSettings', JSON.stringify(settings));
		} catch (e) {
			writeToLog(`[WARN] Failed to save settings: ${e.message}`);
		}
	}

	function loadSettings() {
		try {
			const settings = JSON.parse(localStorage.getItem('ircSettings') || '{}');
			if (settings.wsUrl) document.getElementById('wsUrl').value = settings.wsUrl;
			if (settings.nickname) document.getElementById('nickInput').value = settings.nickname;
			if (settings.channel) document.getElementById('channelInput').value = settings.channel;
			if (settings.autoReconnect !== undefined) document.getElementById('autoReconnect').checked = settings.autoReconnect;
			if (settings.saslAccount && document.getElementById('saslAccountInput')) {
				document.getElementById('saslAccountInput').value = settings.saslAccount;
			}
		} catch (e) {
			writeToLog(`[WARN] Failed to load settings: ${e.message}`);
		}
	}

	const FOCUS_WHITELIST = '#channelInput, #wsUrl, #nickInput, #joinChannelBtn, .btn, button, a, input, textarea, select';

	function handleInputBlur() {
		if (inputBlurTimeoutId !== null) {
			clearTimeout(inputBlurTimeoutId);
		}
		inputBlurTimeoutId = setTimeout(() => {
			const active = document.activeElement;
			if (active && active !== input && active !== document.body) {
				return;
			}
			// 若设置面板展开中，不抢焦点（让用户能正常操作设置）
			const settingsPanel = document.getElementById('settingsPanel');
			if (settingsPanel && settingsPanel.classList.contains('open')) {
				return;
			}
			// 若菜单展开中，不抢焦点
			const menuDropdown = document.getElementById('headerMenuDropdown');
			if (menuDropdown && menuDropdown.classList.contains('visible')) {
				return;
			}
			if (isConnected && document.hasFocus()) {
				input.focus();
			}
		}, 150);
	}
	
	function removeInputBlurListener() {
		if (input) {
			input.removeEventListener('blur', handleInputBlur);
		}
	}

	window.addEventListener("load", onLoad, false);

	function toggleSettings() {
		const panel = document.getElementById('settingsPanel');
		const btn   = document.getElementById('settingsToggleBtn');
		if (!panel) return;
		const isOpen = panel.classList.toggle('open');
		if (btn) btn.classList.toggle('active', isOpen);
	}

	function toggleHeaderMenu() {
		const menu = document.getElementById('headerMenuDropdown');
		if (!menu) return;
		menu.classList.toggle('visible');
		updateAutoReconnectMenuItem();

		if (headerMenuClickListener) {
			document.removeEventListener('click', headerMenuClickListener);
			headerMenuClickListener = null;
			menu.classList.remove('menu-attached');
		}
		if (menu.classList.contains('visible')) {
			headerMenuClickListener = closeHeaderMenuOnClickOutside;
			menu.classList.add('menu-attached');
			setTimeout(() => { document.addEventListener('click', headerMenuClickListener); }, 0);
		}
	}

	function closeHeaderMenuOnClickOutside(event) {
		const menu = document.getElementById('headerMenuDropdown');
		const menuBtn = document.querySelector('.header-menu-btn');
		if (menu && !menu.contains(event.target) && (!menuBtn || !menuBtn.contains(event.target))) {
			menu.classList.remove('visible');
			menu.classList.remove('menu-attached');
			document.removeEventListener('click', closeHeaderMenuOnClickOutside);
			headerMenuClickListener = null;
		}
	}

	function toggleAutoReconnect() {
		const checkbox = document.getElementById('autoReconnect');
		if (checkbox) {
			checkbox.checked = !checkbox.checked;
			autoReconnect = checkbox.checked;
			updateAutoReconnectMenuItem();
			writeToLog(`[SETTINGS] Auto-reconnect: ${autoReconnect ? 'ENABLED' : 'DISABLED'}`);
			saveSettings();
		}
	}

	function updateAutoReconnectMenuItem() {
		const autoReconnectCheckbox = document.getElementById('autoReconnect');
		// 精确匹配调用 toggleAutoReconnect() 的菜单项，避免硬编码索引
		const menuItem = document.querySelector('.header-menu-item[onclick="toggleAutoReconnect()"]');
		if (menuItem && autoReconnectCheckbox) {
			if (autoReconnectCheckbox.checked) {
				menuItem.classList.add('active');
			} else {
				menuItem.classList.remove('active');
			}
		}
	}

	function showPrivateChatList() {
		const privateChats = [];
		channelMap.forEach((channel, name) => {
			if (channel.isPrivate) {
				privateChats.push(name);
			}
		});

		if (privateChats.length === 0) {
			writeToScreen("var(--clr-info)", "当前没有私聊会话", statusChannel, "*");
		} else {
			writeToScreen("var(--clr-info)", `私聊会话列表 (${privateChats.length}): ${privateChats.join(', ')}`, statusChannel, "*");
		}
		writeToLog(`[PM] Private chat list: ${privateChats.join(', ') || 'none'}`);
	}

	function updateConnectionStatus(status) {
		const statusEl = document.getElementById('connectionStatus');
		const statusText = document.getElementById('statusText');
		if (!statusEl || !statusText) return;

		statusEl.classList.remove('connected', 'connecting', 'disconnected');

		if (status === 'connected') {
			statusEl.classList.add('connected');
			statusText.textContent = `已连接 (${nickname})`;
		} else if (status === 'connecting') {
			statusEl.classList.add('connecting');
			statusText.textContent = '连接中...';
		} else {
			statusEl.classList.add('disconnected');
			statusText.textContent = '未连接';
		}
	}

	function toggleLog() {
		const logContainer = document.getElementById('logContainer');
		if (logContainer) {
			logContainer.classList.toggle('visible');
		if (logContainer.classList.contains('visible')) {
			const logOutput = getLogOutput();
				if (logOutput) {
					requestAnimationFrame(() => { logOutput.scrollTop = logOutput.scrollHeight; });
				}
			}
		}
	}

	function clearLog() {
		const logOutput = document.getElementById('logOutput');
		if (logOutput) {
			logOutput.innerHTML = '';
		}
	}

	// 所有键均为大写,与 writeToLog 中的 tag.toUpperCase() 一致
	const LOG_COLORS = {
		'ERROR':          '#ff0040',
		'WARN':           '#ffff00',

	let _logOutputEl = null;
	function getLogOutput() {
		if (!_logOutputEl) _logOutputEl = document.getElementById('logOutput');
		return _logOutputEl;
	}

	function writeToLog(message) {
		const logOutput = getLogOutput();
		const now = new Date();
		const ts = now.toISOString().replace('T', ' ').substring(0, 23) + 'Z';
		const fullMessage = `[${ts}] ${message}`;

		if (logOutput) {
			const tagMatch = message.match(/^\[([^\]]+)\]/);
			const line = document.createElement('span');
		if (tagMatch) {
			const tag = tagMatch[1].toUpperCase();
			const firstSeg = tag.split(/[\s\/]/)[0];
				line.style.color = LOG_COLORS[tag] || LOG_COLORS[firstSeg] || '#e0e0e0';
			} else {
				line.style.color = '#e0e0e0';
			}
			line.textContent = fullMessage;
			logOutput.appendChild(line);

			while (logOutput.children.length > 500) {
				logOutput.removeChild(logOutput.firstChild);
			}
			requestAnimationFrame(() => { logOutput.scrollTop = logOutput.scrollHeight; });
		}

		console.log(fullMessage);
	}

	function showSSLWarning(url) {
		const warning = document.getElementById('sslWarning');
		const link = document.getElementById('sslLink');
		if (!warning || !link) return;

		let displayUrl = url || document.getElementById('wsUrl')?.value.trim();
		if (displayUrl) {
			link.href = displayUrl.replace('wss://', 'https://').replace('ws://', 'http://');
			link.textContent = link.href;
		} else {
			link.href = '#';
			link.textContent = '请先在WebSocket地址栏输入服务器地址';
		}
		warning.classList.add('visible');
		setTimeout(() => {
			if (warning) warning.classList.remove('visible');
		}, 6000);
	}

	function joinChannel() {
		const channelInput = document.getElementById('channelInput');
		if (!channelInput) return;

		let targetChannel = channelInput.value.trim();
		if (!targetChannel) return;

		if (!targetChannel.startsWith('#')) {
			targetChannel = '#' + targetChannel;
			channelInput.value = targetChannel;
		}

		if (isConnected && websocket && websocket.readyState === WebSocket.OPEN) {
			writeToLog(`[IRC] Sending JOIN → ${targetChannel}`);
			doSend("JOIN " + targetChannel);
		} else {
			writeToLog(`[WARN] JOIN requested but not connected — target: ${targetChannel}`);
			writeToScreen("var(--clr-warning)", "未连接, 无法加入频道", statusChannel, "*");
		}
	}
	
	function toggleConnection() {
		if (isConnected) {
			writeToLog('[SYSTEM] User requested disconnect — disabling auto-reconnect');
			autoReconnect = false;
			updateAutoReconnectMenuItem();
			isDisconnecting = true;
			if (websocket && websocket.readyState === WebSocket.OPEN) {
				try {
					websocket.send(`QUIT :User disconnected\r\n`);
					writeToLog('[SYSTEM] Sent IRC QUIT to server');
				} catch (e) {
					writeToLog(`[WARN] Could not send QUIT: ${e.message}`);
				}
			}
			if (websocket) {
				try {
					if (connectTimeout) {
						clearTimeout(connectTimeout);
						connectTimeout = null;
					}
					writeToLog('[SYSTEM] Closing WebSocket (code 1000 — user disconnected)');
					websocket.close(1000, "User disconnected");
				} catch (e) {
					writeToLog(`[ERROR] Exception while closing WebSocket: ${e.message}`);
				}
			}
		} else {
			doConnect();
		}
	}

	}

	function validateWsUrl(url) {
		if (!url) return false;

	function onDisconnect(reason = "", wasConnected = false) {
		isConnected = false;
		const wsUrlInput = document.getElementById('wsUrl');
		const nickInput = document.getElementById('nickInput');
		const connectBtn = document.getElementById('connectBtn');

		if (wsUrlInput) wsUrlInput.disabled = false;
		if (nickInput) nickInput.disabled = false;

		if (connectBtn) {
			connectBtn.textContent = '连接';
			connectBtn.disabled = false;
			connectBtn.classList.remove('disconnect');
		}

		const joinChannelBtn = document.getElementById('joinChannelBtn');
		if (joinChannelBtn) joinChannelBtn.disabled = true;

		updateConnectionStatus('disconnected');

		if (typingInputTimer) { clearTimeout(typingInputTimer); typingInputTimer = null; }
		typingLastSent = 0;
		remoteTypingState.clear();
		const typingEl = document.getElementById('typingIndicator');
		if (typingEl) typingEl.textContent = '';
		saslPending = false;
		if (isDisconnecting) {
			isDisconnecting = false;
			return;
		}
		isDisconnecting = true;

		stopKeepAlive();
		writeToLog(`[SYSTEM] ── Disconnect handler ────────────────────`);
		writeToLog(`[SYSTEM] Reason: "${reason || 'normal'}" | was-connected: ${wasConnected}`);
		if (sessionStartTime) {
			writeToLog(`[SYSTEM] Session ended — duration: ${formatSessionDuration(sessionStartTime)} | sent: ${sentCount} | recv: ${recvCount}`);
			sessionStartTime = null;
		}

		if (statusChannel) {
			Tab_Show("Status");
		}

		let disconnectMessage = "DISCONNECTED";
		let logMessage = "[SYSTEM] Connection closed";

		if (reason === "user") {
			disconnectMessage = "用户主动断开连接";
			logMessage = "[SYSTEM] User-initiated disconnect";
		} else if (reason === "error") {
			disconnectMessage = "连接异常断开";
			logMessage = "[SYSTEM] Connection dropped abnormally";
		}

		writeToScreen("var(--clr-font)", disconnectMessage, statusChannel, "");
		writeToLog(logMessage);

		if (autoReconnect && reconnectAttempts < maxReconnectAttempts) {
			reconnectAttempts++;
			const delay = reconnectDelay * reconnectAttempts;
			writeToLog(`[RECONNECT] Attempt ${reconnectAttempts}/${maxReconnectAttempts} scheduled in ${Math.floor(delay / 1000)}s — server: ${wsUrl}`);
			setTimeout(() => {
				if (!isConnected && autoReconnect) {
					writeToLog(`[RECONNECT] Attempt ${reconnectAttempts}/${maxReconnectAttempts} starting now...`);
					doConnect(true); 
				} else {
					writeToLog(`[RECONNECT] Skipped — already connected or auto-reconnect cancelled`);
				}
			}, delay);
		} else if (autoReconnect && reconnectAttempts >= maxReconnectAttempts) {
			writeToLog(`[RECONNECT] Max attempts reached (${maxReconnectAttempts}/${maxReconnectAttempts}) — giving up`);
			autoReconnect = false;
			updateAutoReconnectMenuItem();
			alert('自动重连失败, 请检查网络或服务器设置');
		}

		isDisconnecting = false;
	}

	function updateCharCount() {
		const charCount = document.getElementById('charCount');
		if (!charCount || !input) return;

		const text = input.value;
		const bytes = new TextEncoder().encode(text).length;
		const maxBytes = 512;

		charCount.textContent = `${bytes}`;
		charCount.classList.remove('warning', 'danger');

		if (bytes > maxBytes) {
			charCount.classList.add('danger');
			charCount.textContent = `${bytes}!`;
		} else if (bytes > maxBytes * 0.8) {
			charCount.classList.add('warning');
		}
	}

	function onKeyDown(e) {
		if (e && e.key === 'Enter') {
			send();
		} else if (e.key === 'Tab') {
			e.preventDefault();
			handleTabCompletion();
			return false;
	} else if (e.key === 'ArrowUp') {
		e.preventDefault();
		if (historyIndex > 0) {
			historyIndex--;
			input.value = messageHistory[historyIndex];
			updateCharCount();
		} else if (historyIndex === 0) {
			input.value = messageHistory[0] || "";
			updateCharCount();
		}
		return false;
		} else if (e.key === 'ArrowDown') {
			e.preventDefault();
			if (historyIndex < messageHistory.length - 1) {
				historyIndex++;
				input.value = messageHistory[historyIndex];
				updateCharCount();
			} else {
				historyIndex = messageHistory.length;
				input.value = "";
				updateCharCount();
			}
			return false;
		}
	}

	function handleTabCompletion() {
		if (!input || !activeChannel || !activeChannel.users) return;
		const cursorPos = input.selectionStart;
		const text = input.value.substring(0, cursorPos);
		const words = text.split(' ');
		const lastWord = words[words.length - 1];

		if (!lastWord) return;

		const matches = activeChannel.users
			.filter(user => user[1].toLowerCase().startsWith(lastWord.toLowerCase()))
			.sort((a, b) => a[1].localeCompare(b[1]));

		if (matches.length === 1) {
			words[words.length - 1] = matches[0][1] + (words.length > 1 ? ' ' : ': ');
			input.value = words.join(' ') + input.value.substring(cursorPos);
			input.setSelectionRange(cursorPos + matches[0][1].length + (words.length > 1 ? 1 : 2), cursorPos + matches[0][1].length + (words.length > 1 ? 1 : 2));
		} else if (matches.length > 1) {
			writeToScreen("var(--clr-info)", `匹配: ${matches.map(m => m[1]).join(', ')}`, activeChannel, "*");
		}
	}

	function htmlEscape(text) {
		if (!text) return "";
		const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
		return text.replace(/[&<>"']/g, function (m) { return map[m]; });
	}

	function stripMircCodes(text) {
		if (!text) return "";
		return text
			.replace(/\x03(\d{1,2}(,\d{1,2})?)?/g, '')
			.replace(/[\x02\x0F\x16\x1D\x1E\x1F\x11]/g, '');
	}

	const MIRC_COLORS = [
		'#ffffff',
		'#000000',
		'#00007f',
		'#009300',
		'#ff0000',
		'#7f0000',
		'#9c009c',
		'#fc7f00',
		'#ffff00',
		'#00fc00',
		'#009393',
		'#00ffff',
		'#0000fc',

	];

	function mircToHtml(text) {
		if (!text) return "";

		let fg = null, bg = null;
		let bold = false, italic = false, underline = false, strike = false;
		let result = "";
		let spanOpen = false;

		function closeSpan() {
			if (spanOpen) { result += "</span>"; spanOpen = false; }
		}
		function openSpan() {
			const styles = [];
			if (fg !== null) styles.push("color:" + fg);
			if (bg !== null) styles.push("background:" + bg);
			if (bold)        styles.push("font-weight:bold");
			if (italic)      styles.push("font-style:italic");
			if (underline && strike) styles.push("text-decoration:underline line-through");
			else if (underline)      styles.push("text-decoration:underline");
			else if (strike)         styles.push("text-decoration:line-through");
			if (styles.length > 0) {
				result += `<span style="${styles.join(';')}">`;
				spanOpen = true;
			}
		}
		function hasFormat() {
			return fg !== null || bg !== null || bold || italic || underline || strike;
		}
		function resetAll() {
			closeSpan();
			fg = null; bg = null;
			bold = false; italic = false; underline = false; strike = false;
		}
		function applyFormat() {
			closeSpan();
			if (hasFormat()) openSpan();
		}

	const colorRe = /^\x03(\d{1,2})(?:,(\d{1,2}))?/;

		let i = 0;
		while (i < text.length) {
			const ch = text[i];

	if (ch === '\x02') {
		bold = !bold;
		applyFormat();
		i++; continue;
	}
	if (ch === '\x1D') {
		italic = !italic;
		applyFormat();
		i++; continue;
	}
	if (ch === '\x1F') {
		underline = !underline;
		applyFormat();
		i++; continue;
	}
	if (ch === '\x1E') {
		strike = !strike;
		applyFormat();
		i++; continue;
	}
		if (ch === '\x0F') {
			resetAll();
			i++; continue;
		}
		if (ch === '\x16' || ch === '\x11') {
			i++; continue;
		}
		if (ch === '\x03') {
			const sub = text.slice(i);
				const m = colorRe.exec(sub);
				if (m) {
					applyFormat();
					const fgIdx = parseInt(m[1], 10);
					fg = (fgIdx >= 0 && fgIdx < MIRC_COLORS.length) ? MIRC_COLORS[fgIdx] : null;
					if (m[2] !== undefined) {
						const bgIdx = parseInt(m[2], 10);
						bg = (bgIdx >= 0 && bgIdx < MIRC_COLORS.length) ? MIRC_COLORS[bgIdx] : null;
					}
					if (hasFormat()) openSpan();
			i += m[0].length; continue;
		}
		applyFormat();
		fg = null; bg = null;
		if (hasFormat()) openSpan();
		i++; continue;
	}

		if (ch === '&')       { result += '&amp;';  i++; continue; }
			if (ch === '<')       { result += '&lt;';   i++; continue; }
			if (ch === '>')       { result += '&gt;';   i++; continue; }
			if (ch === '"')       { result += '&quot;'; i++; continue; }
			if (ch === "'")       { result += '&#039;'; i++; continue; }
			result += ch;
			i++;
		}
		closeSpan();
		return result;
	}

	function sortUserList(user_a, user_b) {
		if (!user_a || !user_b || user_a.length < 2 || user_b.length < 2) return 0;
		if (user_a[0][0] === user_b[0][0])
			return user_a[1].localeCompare(user_b[1], undefined, { sensitivity: 'accent' });
		if (!PrefixChars || !PrefixChars[1]) return 0;
		let aIndex = PrefixChars[1].indexOf(user_a[0][0]);
		let bIndex = PrefixChars[1].indexOf(user_b[0][0]);
		// indexOf 返回 -1 表示无前缀（普通用户），应排在所有有前缀用户之后
		if (aIndex === -1) aIndex = Infinity;
		if (bIndex === -1) bIndex = Infinity;
		return aIndex - bIndex;
	}

				writeToLog(`[ERROR] Tab_Create failed — name: "${name}", channels: ${!!channels}, contents: ${!!channelContents}`);

			this.button = document.createElement("button");
			this.button.textContent = name;

			writeToLog(`[TAB] Tab created: "${name}" | has-userlist: ${!!createlist} | total tabs: ${channelMap.size}`);

	function tabClose(evt) {
		evt.stopPropagation();
		if (!evt || !evt.currentTarget) return;
		const channelName = evt.currentTarget.value;

		if (channelName === "Status") {
			writeToScreen("var(--clr-warning)", "Status频道是系统状态窗口, 不能关闭", statusChannel, "*");
			writeToLog("[WARN] Attempted to close the Status tab — blocked (system window)");
			return;
		}

		const channel = findChannel(channelName);
		if (channel && channel.isPrivate) {
			writeToLog(`[PM] Closing private chat session: "${channelName}"`);
			channelDestroy(channelName);
			return;
		}

		if (isConnected && websocket && websocket.readyState === WebSocket.OPEN) {
			writeToLog(`[PART] Sending PART → ${channelName}`);
			doSend("PART " + channelName);
		} else {
			writeToLog(`[TAB] Not connected — destroying tab locally: "${channelName}"`);
			channelDestroy(channelName);
		}
	}
	const Tab_Close = tabClose;

	function channelDestroy(name) {
		if (!name) return;
		const channel = findChannel(name);
		if (!channel) {
			writeToLog(`[WARN] channelDestroy: tab "${name}" not found`);
			return;
		}
		const wasActive = (activeChannel === channel);
		const actualKey = channel.name;
		channel.button.remove();
		channel.channel.remove();
		if (wasActive) {
			activeChannel = statusChannel;
		}
		channelMap.delete(actualKey);
		writeToLog(`[TAB] Tab destroyed: "${actualKey}" | was-active: ${wasActive} | remaining tabs: ${channelMap.size}`);
		if (activeChannel) {
			tabShow(activeChannel.name);
		}

	function channelRemoveUser(nick, channel) {
		if (!nick || !channel || !channel.userlist) return false;

		for (let i = 0; i < channel.users.length; i++) {
			if (channel.users[i] && channel.users[i][1] === nick) {
				for (let j = 0; j < channel.userlist.children.length; j++) {
					const userItem = channel.userlist.children[j];
					if (!userItem || !userItem.children[1]) continue;
					if (userItem.children[1].textContent === nick) {
						userItem.remove();
						break;
					}
				}
				channel.users.splice(i, 1);
				return true;
			}
		}
		return false;
	}
	const Channel_RemoveUser = channelRemoveUser;

	function channelRenameUser(nick, newnick, channel) {
		if (!nick || !newnick || !channel) return;
		if (!channel.userlist) return;
		for (let i = 0; i < channel.users.length; i++) {
			if (channel.users[i] && channel.users[i][1] == nick) {
				const prefix = channel.users[i][0];
				channelRemoveUser(nick, channel);
				channelInsertUser(newnick, channel, prefix);
				return true;
			}
		}
	}

	function channelUpdateUserPrefix(nick, channel, add, prefix) {
		if (!nick || !channel || !channel.users || !PrefixChars) return;
		for (let i = 0; i < channel.users.length; i++) {
			if (channel.users[i] && channel.users[i][1] == nick) {
				const pos = PrefixChars[0].indexOf(prefix);
				if (pos < 0) return;

				let prefixes = "";
				if (add === true || add === "true") {
					let ii;
					for (ii = 0; ii < channel.users[i][0].length; ii++) {
						if (PrefixChars[1].indexOf(channel.users[i][0][ii]) >= pos) break;
						prefixes += channel.users[i][0][ii];
					}
					prefixes += PrefixChars[1][pos];
					for (; ii < channel.users[i][0].length; ii++) {
						prefixes += channel.users[i][0][ii];
					}
				} else {
					const tmp = channel.users[i][0].indexOf(PrefixChars[1][pos]);
					if (tmp >= 0) {
						prefixes = channel.users[i][0].substring(0, tmp) + channel.users[i][0].substring(tmp + 1);
					}
				}
				if (prefixes == "") prefixes = " ";
				channel.users[i][0] = prefixes;
				channelRenameUser(nick, nick, channel);
				break;
			}
		}
	}

	function writeToScreen(color, message, channel, username, serverTime) {
		if (!channel || !channel.content) return;

	function sanitizeUrl(url) {
		try {
			const parsed = new URL(url);
		if (parsed.protocol !== 'http:' && parsed.protocol !== 'https:') return null;
		return parsed.href;
		} catch (e) {
			return null;
		}
	}

	function mircAndLinkify(text) {
		if (!text) return "";
		const coloredHtml = mircToHtml(text);
		const mediaMaxWidth = '300px';
		return coloredHtml.replace(/(<[^>]*>)|([^<]+)/g, function (match, tag, txt) {
			if (tag) return tag;
			if (!txt) return "";
			return txt.replace(/https?:\/\/[^\s<>{}|\\^`[\]]+/g, function (escapedUrl) {
				const rawUrl = escapedUrl
					.replace(/&amp;/g, '&').replace(/&lt;/g, '<')
					.replace(/&gt;/g, '>').replace(/&quot;/g, '"')
					.replace(/&#039;/g, "'");
				const safeUrl = sanitizeUrl(rawUrl);
				if (!safeUrl) return escapedUrl;
				const lowerUrl = safeUrl.toLowerCase();
				const safeAttr = HTML_escape(safeUrl);
				const isImage = /\.(jpg|jpeg|png|gif|webp|bmp|svg|ico|tiff|tif|avif|heic|heif|jfif|pjpeg|pjp|apng)(\?.*)?$/i.test(lowerUrl);
				const isAudio = /\.(mp3|wav|ogg|aac|m4a|flac|opus|weba|wma|aiff|au|mid|midi|ra|ram|mka)(\?.*)?$/i.test(lowerUrl);
				const isVideo = /\.(mp4|webm|ogv|mov|avi|mkv|flv|m4v|m3u8|wmv|rmvb|rm|ts|mts|m2ts|3gp|3g2|divx|xvid|asf|vob|mpg|mpeg|mp2|mpe|mpv|m2v|svi|mxf|roq|nsv|f4v|f4p|f4a|f4b)(\?.*)?$/i.test(lowerUrl);
				if (isImage) return `<img src="${safeAttr}" alt="Image" referrerpolicy="no-referrer" crossorigin="anonymous" style="max-width:${mediaMaxWidth};height:auto;border-radius:4px;box-shadow:0 2px 6px rgba(0,0,0,.1);">`;
				if (isAudio) return `<audio controls src="${safeAttr}" referrerpolicy="no-referrer" style="max-width:${mediaMaxWidth};"></audio>`;
				if (isVideo) return `<video controls src="${safeAttr}" referrerpolicy="no-referrer" style="max-width:${mediaMaxWidth};height:auto;border-radius:4px;"></video>`;
				return `<a href="${safeAttr}" target="_blank" rel="noopener noreferrer" style="color:var(--clr-accent);text-decoration:underline;word-break:break-all;">${safeAttr}</a>`;
			});
		});
	}

	function linkify(text) {
		const mediaMaxWidth = '300px';

		return HTML_escape(text).replace(/https?:\/\/[^\s<>{}|\\^`[\]]+/g, function (escapedUrl) {
			const rawUrl = escapedUrl
				.replace(/&amp;/g, '&')
				.replace(/&lt;/g, '<')
				.replace(/&gt;/g, '>')
				.replace(/&quot;/g, '"')
				.replace(/&#039;/g, "'");
			const safeUrl = sanitizeUrl(rawUrl);
			if (!safeUrl) return escapedUrl;

		const lowerUrl = safeUrl.toLowerCase();
		const isImage = /\.(jpg|jpeg|png|gif|webp|bmp|svg|ico|tiff|tif|avif|heic|heif|jfif|pjpeg|pjp|apng)(\?.*)?$/i.test(lowerUrl);
		const isAudio = /\.(mp3|wav|ogg|aac|m4a|flac|opus|weba|wma|aiff|au|mid|midi|ra|ram|mka)(\?.*)?$/i.test(lowerUrl);
		const isVideo = /\.(mp4|webm|ogv|mov|avi|mkv|flv|m4v|m3u8|wmv|rmvb|rm|ts|mts|m2ts|3gp|3g2|divx|xvid|asf|vob|mpg|mpeg|mp2|mpe|mpv|m2v|svi|mxf|roq|nsv|f4v|f4p|f4a|f4b)(\?.*)?$/i.test(lowerUrl);
		const safeAttr = HTML_escape(safeUrl);

		if (isImage) {
			return `<img src="${safeAttr}" alt="Image" referrerpolicy="no-referrer" crossorigin="anonymous" style="max-width:${mediaMaxWidth};height:auto;border-radius:4px;box-shadow:0 2px 6px rgba(0,0,0,.1);">`;
		} else if (isAudio) {
			return `<audio controls src="${safeAttr}" referrerpolicy="no-referrer" style="max-width:${mediaMaxWidth};"></audio>`;
		} else if (isVideo) {
			return `<video controls src="${safeAttr}" referrerpolicy="no-referrer" style="max-width:${mediaMaxWidth};height:auto;border-radius:4px;"></video>`;
		} else {
			return `<a href="${safeAttr}" target="_blank" rel="noopener noreferrer" style="color:var(--clr-accent);text-decoration:underline;word-break:break-all;">${safeAttr}</a>`;
		}
		});
	}

	function linkifyToDom(text) {
		const frag = document.createDocumentFragment();
		const urlRegex = /(https?:\/\/[^\s<>{}|\\^`[\]]+)/g;
		let lastIndex = 0;
		let match;
		while ((match = urlRegex.exec(text)) !== null) {
			if (match.index > lastIndex) {
				frag.appendChild(document.createTextNode(text.slice(lastIndex, match.index)));
			}
			const safeUrl = sanitizeUrl(match[1]);
			if (!safeUrl) {
				frag.appendChild(document.createTextNode(match[1]));
			} else {
			const lowerUrl = safeUrl.toLowerCase();
			const isImage = /\.(jpg|jpeg|png|gif|webp|bmp|svg|ico|tiff|tif|avif|heic|heif|jfif|pjpeg|pjp|apng)(\?.*)?$/i.test(lowerUrl);
			const isAudio = /\.(mp3|wav|ogg|aac|m4a|flac|opus|weba|wma|aiff|au|mid|midi|ra|ram|mka)(\?.*)?$/i.test(lowerUrl);
			const isVideo = /\.(mp4|webm|ogv|mov|avi|mkv|flv|m4v|m3u8|wmv|rmvb|rm|ts|mts|m2ts|3gp|3g2|divx|xvid|asf|vob|mpg|mpeg|mp2|mpe|mpv|m2v|svi|mxf|roq|nsv|f4v|f4p|f4a|f4b)(\?.*)?$/i.test(lowerUrl);
			if (isImage) {
				const img = document.createElement('img');
				img.src = safeUrl; img.alt = 'Image';
				img.referrerPolicy = 'no-referrer';
				img.crossOrigin = 'anonymous';
				img.style.cssText = 'max-width:300px;height:auto;border-radius:4px;box-shadow:0 2px 6px rgba(0,0,0,.1);';
				frag.appendChild(img);
			} else if (isAudio) {
				const audio = document.createElement('audio');
				audio.controls = true; audio.src = safeUrl;
				audio.referrerPolicy = 'no-referrer';
				audio.style.maxWidth = '300px';
				frag.appendChild(audio);
			} else if (isVideo) {
				const video = document.createElement('video');
				video.controls = true; video.src = safeUrl;
				video.referrerPolicy = 'no-referrer';
				video.style.cssText = 'max-width:300px;height:auto;border-radius:4px;';
				frag.appendChild(video);
			} else {
					const a = document.createElement('a');
					a.href = safeUrl; a.target = '_blank';
					a.rel = 'noopener noreferrer';
					a.style.cssText = 'color:var(--clr-accent);text-decoration:underline;word-break:break-all;';
					a.textContent = safeUrl;
					frag.appendChild(a);
				}
			}
			lastIndex = urlRegex.lastIndex;
		}
		if (lastIndex < text.length) {
			frag.appendChild(document.createTextNode(text.slice(lastIndex)));
		}
		return frag;
	}

	function writeMotdLine(rawText) {

	function pushHistory(msg) {
		if (messageHistory.length >= 200) messageHistory.shift();
		messageHistory.push(msg);
		historyIndex = messageHistory.length;
	}

	function send() {
		let text = input ? input.value.trim() : "";
		if (!text || !activeChannel) return;

		if (!isConnected) {
			writeToScreen("var(--clr-warning)", "未连接，无法发送消息", activeChannel || statusChannel, "*");
			return;
		}

		if (text[0] === "/") {
			if (text.indexOf("/me ") === 0) {
				if (activeChannel.name === "Status") {
					writeToScreen("var(--clr-warning)", "Status 是系统状态窗口，无法发送消息。", activeChannel, "*");
					if (input) { input.value = ""; updateCharCount(); }
					return;
				}
				const actionText = text.substring(4);
				const messages = splitIRCMessage("privmsg " + activeChannel.name + " :\x01ACTION " + actionText + "\x01");
				messages.forEach(msg => doSend(msg));
				if (!ircv3EchoMessage) {
					writeToScreen("var(--clr-red)", `${nickname} ${actionText}`, activeChannel, "*");
				}
				pushHistory(text);
			} else if (text.indexOf("/msg ") === 0) {
				const parts = text.substring(5).split(' ');
				if (parts.length >= 2) {
					const targetNick = parts[0];
					const msgText = parts.slice(1).join(' ');
					let pmChannel = findChannel(targetNick);
					if (!pmChannel) {
						pmChannel = new Tab_Create(targetNick, `与 ${targetNick} 的私聊`, false);
						pmChannel.isPrivate = true;
						if (pmChannel.button) {
							pmChannel.button.classList.add('private');
						}
					}
					Tab_Show(targetNick);
					const messages = splitIRCMessage("privmsg " + targetNick + " :" + msgText);
					messages.forEach((msg, index) => {
						doSend(msg);
						if (!ircv3EchoMessage && index === 0) {
							writeToScreen("var(--clr-font)", msgText, pmChannel, nickname);
						}
					});
					writeToLog(`[PM] You → ${targetNick}: ${msgText}`);
					pushHistory(text);
				} else {
					writeToScreen("var(--clr-warning)", "用法: /msg <昵称> <消息>", activeChannel, "*");
				}
			} else if (text.indexOf("/away") === 0) {
				const awayMsg = text.substring(5).trim();
				if (awayMsg) {
					doSend("AWAY :" + awayMsg + "\r\n");
					writeToScreen("var(--clr-warning)", `已设置离开状态: ${awayMsg}`, activeChannel, "*");
				} else {
					doSend("AWAY\r\n");
					writeToScreen("var(--clr-info)", `已取消离开状态`, activeChannel, "*");
				}
				pushHistory(text);
			} else if (text.indexOf("/whois ") === 0) {
				const whoisNick = text.substring(7).trim();
				if (whoisNick) {
					doSend("WHOIS " + whoisNick + "\r\n");
					writeToScreen("var(--clr-info)", `正在查询: ${whoisNick}`, activeChannel, "*");
				} else {
					writeToScreen("var(--clr-warning)", "用法: /whois <昵称>", activeChannel, "*");
				}
				pushHistory(text);
			} else if (text.indexOf("/list") === 0) {
				const listFilter = text.substring(5).trim();
				doSend(listFilter ? `LIST ${listFilter}\r\n` : "LIST\r\n");
				writeToScreen("var(--clr-info)", `正在获取频道列表...`, statusChannel, "*");
				pushHistory(text);
			} else if (text.indexOf("/nick ") === 0) {
				const newNick = text.substring(6).trim();
				if (newNick && validateNickname(newNick)) {
					doSend("NICK " + newNick + "\r\n");
				} else {
					writeToScreen("var(--clr-warning)", "用法: /nick <新昵称> (只能包含字母、数字和 _ ` [ ] { } ^ | - )", activeChannel, "*");
				}
				pushHistory(text);
			} else if (text.indexOf("/topic") === 0) {
				const topicText = text.substring(6).trim();
				const topicTarget = activeChannel.name !== 'Status' ? activeChannel.name : null;
				if (!topicTarget) {
					writeToScreen("var(--clr-warning)", "请在频道窗口中使用 /topic", activeChannel, "*");
				} else if (topicText) {
					doSend(`TOPIC ${topicTarget} :${topicText}\r\n`);
				} else {
					doSend(`TOPIC ${topicTarget}\r\n`);
					writeToScreen("var(--clr-info)", `正在查询 ${topicTarget} 的主题...`, activeChannel, "*");
				}
				pushHistory(text);
			} else if (text.indexOf("/kick ") === 0) {
				const kickParts = text.substring(6).split(' ');
				const kickNick = kickParts[0];
				const kickReason = kickParts.slice(1).join(' ') || '无原因';
				const kickChannel = activeChannel.name;
				if (kickChannel.startsWith('#') && kickNick) {
					doSend(`KICK ${kickChannel} ${kickNick} :${kickReason}\r\n`);

	function byteLength(str) {
		return new TextEncoder().encode(str).length;
	}

	function splitIRCMessage(message) {
		const MAX_BYTES = 512;

		const isPrivmsg = message.startsWith("privmsg ");
		const fullMessage = message + "\r\n";
		if (!isPrivmsg || byteLength(fullMessage) <= MAX_BYTES) {
			return [fullMessage];
		}

		const colonIndex = message.indexOf(':');
		if (colonIndex === -1) {
			return [fullMessage];
		}

		const baseCommand = message.substring(0, colonIndex + 1);
		const messageContent = message.substring(colonIndex + 1);
		const baseBytes = byteLength(baseCommand) + 2;
		const maxContentBytes = MAX_BYTES - baseBytes;

		if (byteLength(messageContent) <= maxContentBytes) {
			return [fullMessage];
		}

		const encoder = new TextEncoder();
		const contentBytes = encoder.encode(messageContent);
		const messages = [];
		let offset = 0;
		while (offset < contentBytes.length) {
			let end = Math.min(offset + maxContentBytes, contentBytes.length);
			while (end > offset && (contentBytes[end] & 0xC0) === 0x80) end--;
			const chunk = new TextDecoder().decode(contentBytes.slice(offset, end));
			messages.push(baseCommand + chunk + "\r\n");
			offset = end;
		}
		return messages;
	}

	function WebSocket_Connect(wsUri) {
		if (!wsUri) {
			writeToLog("[ERROR] WebSocket URL is empty — aborting connection");
			return;
		}
		try {
			if (websocket) {
				try {
					websocket.onclose = null;
					websocket.onerror = null;
					websocket.onopen = null;
					websocket.onmessage = null;
					if (websocket.readyState !== WebSocket.CLOSED) {
						writeToLog(`[WebSocket] Cleaning up previous connection (state: ${websocket.readyState})`);
						websocket.close(1000, "Reconnecting");
					}
				} catch (e) {
					writeToLog(`[WARN] Error cleaning up previous connection: ${e.message}`);
				}
				websocket = null;
			}
			writeToLog(`[WebSocket] Creating new WebSocket → ${wsUri}`);
			websocket = new WebSocket(wsUri);
			websocket.binaryType = 'blob';

			if (connectTimeout) {
				clearTimeout(connectTimeout);
			}
			connectTimeout = setTimeout(() => {
				if (websocket && websocket.readyState === WebSocket.CONNECTING) {
					writeToLog(`[ERROR] Connection timeout (30s) — forcing close → ${wsUri}`);
					try {
						websocket.close(1006, "Connection timeout");
					} catch (e) {
						writeToLog(`[ERROR] Failed to close timed-out WebSocket: ${e.message}`);
					}
				}
			}, 30000);

			websocket.onclose = function handleOnClose(evt) {
				if (connectTimeout) {
					clearTimeout(connectTimeout);
					connectTimeout = null;
				}
				onClose(evt);
			};
			websocket.onerror = function handleOnError(evt) {
				onError(evt);
			};
			websocket.onopen = function handleOnOpen(evt) {
				if (connectTimeout) {
					clearTimeout(connectTimeout);
					connectTimeout = null;
				}
				onOpen(evt);
			};
			websocket.onmessage = function handleOnMessage(evt) {
				onMessage(evt);
			};
		} catch (e) {
			writeToLog(`[ERROR] WebSocket creation failed: ${e.message}`);
			onDisconnect();
			if (wsUrl && wsUrl.startsWith('wss://')) {
				showSSLWarning(wsUrl);
			}
			alert(`连接失败: ${e.message}\n\n如果是SSL证书错误, 请点击"SSL帮助"查看解决方案`);
		}
	}

		if (connectTimeout !== null) {
			clearTimeout(connectTimeout);
			connectTimeout = null;

			websocket.onclose = null;
			websocket.onerror = null;
			websocket.onopen = null;
			websocket.onmessage = null;
			if (websocket.readyState === WebSocket.OPEN) {
				websocket.close(1000, "Page unload");
			}
		}

	function onClose(evt) {
		if (websocket) {
			websocket.onclose = null;
			websocket.onerror = null;
			websocket.onopen = null;
			websocket.onmessage = null;
			websocket = null;
		}

	const wasConnected = isConnected;
	isConnected = false;
	let reason = evt.reason || 'Connection closed';
		let code = evt.code;

		let isUserDisconnect = false;

		if (isDisconnecting) {
			isUserDisconnect = true;
		} else if (code === 1000 && reason.includes("User disconnected")) {
			isUserDisconnect = true;
			reason = "User-initiated disconnect";
		} else if (code === 1000) {
			reason = "Normal closure";
		}

		let logMsg = `[CLOSE] Code: ${code}`;

		switch (code) {
			case 1000: logMsg += isUserDisconnect ? ' (user-initiated)' : ' (normal closure)'; break;
			case 1001: logMsg += ' (endpoint going away)'; break;
			case 1002: logMsg += ' (protocol error)'; break;
			case 1003: logMsg += ' (unsupported data type)'; break;
			case 1005: logMsg += ' (no status code)'; break;
			case 1006: logMsg += ' (abnormal closure — possible network issue)'; break;
			case 1011: logMsg += ' (server internal error)'; break;
			case 1015: logMsg += ' (TLS handshake failed)'; break;
			default: if (code >= 4000 && code <= 4999) { logMsg += ' (application-level error)'; }
		}
		logMsg += ` — reason: "${reason}"`;

		writeToLog(logMsg);

		let disconnectReason = "";
		if (isUserDisconnect) {
			disconnectReason = "user";
		} else if (code === 1006 || code >= 4000) {
			disconnectReason = "error";
		}
		onDisconnect(disconnectReason, wasConnected);
	}

	function onError(evt) {
		let errorType = 'WebSocket error';
		if (evt && evt.target) {
			if (evt.target.readyState === WebSocket.CONNECTING) {
				errorType = 'Connection failed';
			} else if (evt.target.readyState === WebSocket.OPEN) {
				errorType = 'Message error';
			}
		}
		writeToScreen("var(--clr-red)", `ERROR: ${errorType}`, statusChannel, "");
		writeToLog(`[ERROR] ${errorType}: ${evt.data || 'unknown error'}`);
		if (wsUrl && wsUrl.startsWith('wss://')) {
			showSSLWarning(wsUrl);
		}
	}

	function onOpen(evt) {
		if (websocket && websocket.readyState === WebSocket.OPEN) {
			isConnected = true;
			reconnectAttempts = 0;
			sessionStartTime = new Date();
			sentCount = 0;
			recvCount = 0;
			writeToScreen("var(--clr-font)", "CONNECTED", statusChannel, "");
			writeToLog(`[OPEN] WebSocket connected: ${wsUrl}`);
			writeToLog(`[SYSTEM] Session started at ${sessionStartTime.toISOString()}`);
			updateConnectionStatus('connected');

			const connectBtn = document.getElementById('connectBtn');
			if (connectBtn) {
				connectBtn.textContent = '断开';
				connectBtn.disabled = false;
				connectBtn.classList.add('disconnect');
			}

			const joinChannelBtn = document.getElementById('joinChannelBtn');
			if (joinChannelBtn) joinChannelBtn.disabled = false;

			doSend("CAP LS 302");

			startKeepAlive();
		} else {
			writeToLog(`[ERROR] onOpen called but WebSocket state is abnormal: ${websocket ? websocket.readyState : 'null'}`);
		}
	}

	function onMessage(evt) {
		if (!evt) return;
		
		if (!websocket || websocket.readyState !== WebSocket.OPEN) {
			if (isConnected) {
				isConnected = false;
				updateConnectionStatus('disconnected');
			}
			writeToLog(`[WARNING] Message received but WebSocket is not connected — ignored`);
			return;
		}
		
		if (!isConnected) {
			isConnected = true;
			updateConnectionStatus('connected');
		}
		
		const rawData = evt.data;
		recvCount++;
		writeToLog(`[SERVER→CLIENT] ${typeof rawData === 'string' ? rawData.trim() : '[binary data]'}`);
		if (rawData instanceof Blob) {
			let fileReader = new FileReader();
			fileReader.onloadend = function handleLoadEnd(event) {
				if (!event || !event.target) return;
				const reader = event.target;
				const raw = reader.result;
				writeToLog(`[SERVER→CLIENT] (Blob→Text): ${raw.trim()}`);
				process(raw);
				reader.onloadend = null;
			};
			fileReader.readAsText(rawData);
		} else {
			process(rawData);
		}
	}

	function doSend(message) {
		if (!message) return;

		if (websocket) {
			if (websocket.readyState === WebSocket.OPEN) {
				if (!isConnected) {
					isConnected = true;
					updateConnectionStatus('connected');
				}
			} else if (websocket.readyState === WebSocket.CLOSED || websocket.readyState === WebSocket.CLOSING) {
				if (isConnected) {
					isConnected = false;
					updateConnectionStatus('disconnected');
				}
				writeToLog(`[ERROR] WebSocket not connected — cannot send: ${message.trim()}`);
				writeToScreen("var(--clr-red)", "未连接, 消息未发送", statusChannel, "");
				return;
			}
		} else {
			if (isConnected) {
				isConnected = false;
				updateConnectionStatus('disconnected');
			}
			writeToLog(`[ERROR] WebSocket is null — cannot send: ${message.trim()}`);
			writeToScreen("var(--clr-red)", "未连接, 消息未发送", statusChannel, "");
			return;
		}

		try {
			websocket.send(message);
			if (!message.trim().toUpperCase().startsWith('PING')) sentCount++;
			writeToLog(`[CLIENT→SERVER] ${message.trim()}`);
		} catch (e) {
			writeToLog(`[ERROR] Failed to send message: ${e.message}`);
			writeToScreen("var(--clr-red)", "发送失败: " + e.message, statusChannel, "");
			if (isConnected) {
				isConnected = false;
				updateConnectionStatus('disconnected');
			}
		}
	}

	/**
	 * @param {string} val 
	 * @returns {string} 
	 */
	function unescapeTagValue(val) {
		if (!val) return "";
		return val
			.replace(/\\:/g, ';')
			.replace(/\\s/g, ' ')
			.replace(/\\\\/g, '\x00')
			.replace(/\\r/g, '\r')
			.replace(/\\n/g, '\n')
			.replace(/\x00/g, '\\')
			.replace(/\\./g, '');
	}

	/**
	 * 解析 IRCv3 消息标签字符串（@号后面的部分，分号分隔）
	 * @param {string} tagStr 标签字符串，如 "time=2024-01-01T00:00:00Z;account=Alice"
	 * @returns {Map<string, string|boolean>} 标签 Map，无值标签的 value 为 true
	 */
	function parseMsgTags(tagStr) {
		const tags = new Map();
		if (!tagStr) return tags;
		const parts = tagStr.split(';');
		for (const part of parts) {
			if (!part) continue;
			const eqIdx = part.indexOf('=');
			if (eqIdx === -1) {
				tags.set(part, true);
			} else {
				const key = part.substring(0, eqIdx);
				const val = unescapeTagValue(part.substring(eqIdx + 1));
				tags.set(key, val);
			}
		}
		return tags;
	}

	/**
	 * @param {string} rawLine 
	 * @returns {{ tags: Map<string, string|boolean>, rest: string }}
	 */
	function extractMsgTags(rawLine) {
		if (!rawLine || rawLine[0] !== '@') {
			return { tags: new Map(), rest: rawLine };
		}
		const spaceIdx = rawLine.indexOf(' ');
		if (spaceIdx === -1) {
			return { tags: parseMsgTags(rawLine.substring(1)), rest: "" };
		}
		const tagStr = rawLine.substring(1, spaceIdx);
		const rest = rawLine.substring(spaceIdx + 1);
		const tags = parseMsgTags(tagStr);
		writeToLog(`[MSGTAG] Parsed ${tags.size} tag(s): ${tagStr.substring(0, 80)}`);
		return { tags, rest };
	}

		const target = data[3];
