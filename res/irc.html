		writeToScreen("var(--clr-green)", `[WHOIS] ${target} 已登录账号: ${account}`, statusChannel, "*");
	});
	// 338 RPL_WHOISACTUALLY (actual IP)
	Commands.set("338", function (nick, data) {
		if (!data || data.length < 5) return;
		const target = data[3];
		const actualHost = data.slice(4).join(' ').replace(/^:/, '');
		writeToScreen("var(--clr-info)", `[WHOIS] ${target} 实际地址: ${actualHost}`, statusChannel, "*");
	});
	// 671 RPL_WHOISSECURE (using SSL)
	Commands.set("671", function (nick, data) {
		if (!data || data.length < 4) return;
		const target = data[3];
		writeToScreen("var(--clr-green)", `[WHOIS] ${target} 使用 SSL/TLS 加密连接`, statusChannel, "*");
	});

	// 321 RPL_LISTSTART
	Commands.set("321", function (nick, data) {
		writeToScreen("var(--clr-info)", `频道列表:`, statusChannel, "*");
		writeToLog(`[IRC] RPL_LISTSTART (321)`);
	});
	// 322 RPL_LIST: 单个频道信息
	Commands.set("322", function (nick, data) {
		if (!data || data.length < 6) return;
		const chanName   = data[3];
		const userCount  = data[4];
		const topic      = data.slice(5).join(' ').replace(/^:/, '');
		writeToScreen("var(--clr-font)", `  ${chanName} [${userCount}人] ${topic}`, statusChannel, "*");
	});
	// 323 RPL_LISTEND
	Commands.set("323", function (nick, data) {
		writeToScreen("var(--clr-text-dim)", `频道列表结束`, statusChannel, "*");
		writeToLog(`[IRC] RPL_LISTEND (323)`);
	});

	// IRCv3 spec: https://ircv3.net/specs/extensions/monitor
	// MONITOR + nick — 添加监控; MONITOR - nick — 取消; MONITOR l — 列表

	// 730 RPL_MONONLINE: 被监控用户上线
	Commands.set("730", function (nick, data) {
		if (!data || data.length < 4) return;
		const targets = data.slice(3).join(' ').replace(/^:/, '');
		writeToScreen("var(--clr-green)", `[MONITOR] 上线: ${targets}`, statusChannel, "*");
		writeToLog(`[MONITOR] RPL_MONONLINE: ${targets}`);
	});
	// 731 RPL_MONOFFLINE: 被监控用户下线
	Commands.set("731", function (nick, data) {
		if (!data || data.length < 4) return;
		const targets = data.slice(3).join(' ').replace(/^:/, '');
		writeToScreen("var(--clr-text-dim)", `[MONITOR] 下线: ${targets}`, statusChannel, "*");
		writeToLog(`[MONITOR] RPL_MONOFFLINE: ${targets}`);
	});
	// 732 RPL_MONLIST
	Commands.set("732", function (nick, data) {
		if (!data || data.length < 4) return;
		const targets = data.slice(3).join(' ').replace(/^:/, '');
		writeToScreen("var(--clr-info)", `[MONITOR] 监控列表: ${targets}`, statusChannel, "*");
	});
	// 733 RPL_ENDOFMONLIST
	Commands.set("733", function (nick, data) {
		writeToScreen("var(--clr-text-dim)", `[MONITOR] 监控列表结束`, statusChannel, "*");
	});
	// 734 ERR_MONLISTFULL
	Commands.set("734", function (nick, data) {
		if (!data || data.length < 4) return;
		const msg = data.slice(3).join(' ').replace(/^:/, '');
		writeToScreen("var(--clr-red)", `[MONITOR] 监控列表已满: ${msg}`, statusChannel, "*");
	});

	Commands.set("CAP", function (nick, data) {
		if (!data || data.length < 4) return;

		const target = data[2];
		const subCommand = data[3].toUpperCase();

		// CAP LS 302 支持多段回复（服务器用 * 标记还有更多段）
		// 格式: CAP * LS * :cap1 cap2...  (有 * 表示还有更多)
		//       CAP * LS :cap1 cap2...    (无 * 表示最后一段)
		// subCommand 后面如果紧跟 * 则是多段标记，不是能力列表

		// 判断是否为多段标记：data[4] === "*" 表示还有后续
		let isMultiline = false;
		let capsStartIdx = 4;
		if (subCommand === "LS" && data[4] === "*") {
			isMultiline = true;
			capsStartIdx = 5;
		}

		let caps = "";
		for (let i = capsStartIdx; i < data.length; i++) {
			if (data[i].startsWith(':')) {
				caps = data[i].substring(1);
				for (let j = i + 1; j < data.length; j++) {
					caps += ' ' + data[j];
				}
				break;
			} else {
				caps += (caps ? ' ' : '') + data[i];
			}
		}

		writeToLog(`[CAP] Received: target=${target}, subcommand=${subCommand}${isMultiline ? ' (multiline)' : ''}, caps="${caps}"`);

		if (subCommand === "LS") {
			// 累积能力列表（支持 CAP LS 302 的多段回复）
			if (caps) {
				capLsBuffer = capLsBuffer ? capLsBuffer + ' ' + caps : caps;
			}

			if (isMultiline) {
				// 还有更多段，继续等待
				writeToLog(`[CAP] LS multiline chunk received — waiting for more...`);
				return;
			}

			// 最后一段（或单段），开始处理完整的能力列表
			const allCaps = capLsBuffer;
			capLsBuffer = ""; // 清空缓冲
			writeToScreen("var(--clr-info)", `服务器支持的能力: ${allCaps}`, statusChannel, "*");

			const availableCaps = allCaps.split(' ').map(c => c.trim().split('=')[0].toLowerCase()).filter(c => c);

		// 能力列表优先级排列: 先请求核心能力，再请求功能性能力
		const wantedCaps = [
			"message-tags",        // 功能1基础: 消息标签支持 (必须优先请求)
			"server-time",         // 功能2: 服务器时间戳
			"sasl",                // 功能3: SASL 认证
			"away-notify",         // 功能4: 离开状态实时通知
			"chghost",             // 功能5: 主机名变更通知
			"account-tag",         // 功能6: 消息携带账号信息
			"account-notify",      // 功能6: 账号变更通知
			"extended-join",       // 功能6: JOIN含账号信息
			"echo-message",        // 功能7: 服务器回显消息
			"multi-prefix",        // 用户前缀支持
			"userhost-in-names",   // NAMES含完整主机
			"cap-notify",          // 能力变更通知
			"setname",             // 用户真名变更支持
			"batch",               // 批量消息支持（chathistory依赖）
			"labeled-response",    // 请求-响应标签匹配
			"chathistory",         // 频道历史消息
			"invite-notify",       // 邀请通知
			"draft/multiline",     // 多行消息支持
			"whox",                // 扩展 WHO 查询
		];

			const requestedCaps = wantedCaps
				.filter(cap => availableCaps.includes(cap.toLowerCase()))
				.join(' ');

			if (requestedCaps) {
				writeToLog(`[CAP] Requesting capabilities: ${requestedCaps}`);
				doSend("CAP REQ :" + requestedCaps);
			} else {
				writeToLog(`[CAP] No matching capabilities — ending CAP negotiation`);
				doSend("CAP END");
				sendRegistration();
			}

		} else if (subCommand === "ACK") {
			const ackedCaps = caps || "(none)";
			writeToScreen("var(--clr-green)", `已启用能力: ${ackedCaps}`, statusChannel, "*");
			writeToLog(`[CAP] Capabilities acknowledged (ACK): ${ackedCaps}`);

			const ackedList = ackedCaps.split(' ').map(c => c.trim().toLowerCase()).filter(c => c);
			for (const cap of ackedList) {
				ircv3ActiveCaps.add(cap);
			}
		// 按能力名称激活对应功能开关
		if (ircv3ActiveCaps.has('server-time'))        ircv3ServerTime      = true;
		if (ircv3ActiveCaps.has('echo-message'))        ircv3EchoMessage     = true;
		if (ircv3ActiveCaps.has('message-tags'))        ircv3MessageTags     = true;
		if (ircv3ActiveCaps.has('account-tag'))         ircv3AccountTag      = true;
		if (ircv3ActiveCaps.has('away-notify'))         ircv3AwayNotify      = true;
		if (ircv3ActiveCaps.has('account-notify'))      ircv3AccountNotify   = true;
		if (ircv3ActiveCaps.has('extended-join'))       ircv3ExtendedJoin    = true;
		if (ircv3ActiveCaps.has('chghost'))             ircv3ChgHost         = true;
		if (ircv3ActiveCaps.has('multi-prefix'))        ircv3MultiPrefix     = true;
		if (ircv3ActiveCaps.has('userhost-in-names'))   ircv3UserhostInNames = true;
		if (ircv3ActiveCaps.has('batch'))               ircv3Batch           = true;
		if (ircv3ActiveCaps.has('labeled-response'))    ircv3LabeledResponse = true;
		if (ircv3ActiveCaps.has('chathistory'))         ircv3ChatHistory     = true;
		if (ircv3ActiveCaps.has('invite-notify'))       ircv3InviteNotify    = true;
		if (ircv3ActiveCaps.has('draft/multiline'))     ircv3Multiline       = true;
		if (ircv3ActiveCaps.has('whox'))                ircv3Whox            = true;

			writeToLog(`[CAP] Active caps: ${[...ircv3ActiveCaps].join(', ')}`);

			// 如果 SASL 已启用且需要认证，先进行 SASL 认证再发送 CAP END
			if (ircv3ActiveCaps.has('sasl') && saslEnabled && saslAccount && saslPassword) {
				writeToLog(`[SASL] Starting SASL PLAIN authentication for: ${saslAccount}`);
				saslPending = true;
				doSend("AUTHENTICATE PLAIN");
				// 不立即发送 CAP END，等 SASL 完成后再发
			} else {
				doSend("CAP END");
				sendRegistration();
			}



		} else if (subCommand === "NAK") {
			const rejectedCaps = caps || "(none)";
			writeToScreen("var(--clr-warning)", `能力被拒绝: ${rejectedCaps}`, statusChannel, "*");
			writeToLog(`[CAP] Capabilities rejected (NAK): ${rejectedCaps}`);
			// NAK 表示服务器拒绝了所有请求的能力，结束协商后发 NICK/USER 完成注册
			doSend("CAP END");
			sendRegistration();

		} else if (subCommand === "LIST") {
			const activeCaps = caps || "(none)";
			writeToScreen("var(--clr-info)", `当前启用的能力: ${activeCaps}`, statusChannel, "*");
		} else if (subCommand === "NEW") {
			writeToScreen("var(--clr-info)", `服务器新增能力: ${caps}`, statusChannel, "*");
			writeToLog(`[CAP] cap-notify NEW: ${caps}`);
		} else if (subCommand === "DEL") {
			writeToScreen("var(--clr-warning)", `服务器移除能力: ${caps}`, statusChannel, "*");
			writeToLog(`[CAP] cap-notify DEL: ${caps}`);
			// 更新本地能力状态
			const delList = caps.split(' ').map(c => c.trim().toLowerCase()).filter(c => c);
			for (const cap of delList) {
				ircv3ActiveCaps.delete(cap);
			}
		}
	});

	// IRCv3 spec: https://ircv3.net/specs/extensions/sasl-3.1
	// 流程: CAP REQ sasl → CAP ACK sasl → AUTHENTICATE PLAIN →
	//        服务器: AUTHENTICATE + → 客户端发 Base64(authzid\0user\0pass) →
	//        服务器: 900 (RPL_LOGGEDIN) + 903 (RPL_SASLSUCCESS) → CAP END → 注册

	Commands.set("AUTHENTICATE", function (nick, data) {
		if (!data || data.length < 2) return;
		// 服务器发送 AUTHENTICATE 时可能带前缀 (:server AUTHENTICATE +)
		// 此时 data[0]=":server", data[1]="AUTHENTICATE", data[2]="+"
		// 也可能无前缀 (AUTHENTICATE +): data[0]="AUTHENTICATE", data[1]="+"
		// 统一处理：找到 payload（非命令名的那个参数）
		let payload = "";
		if (data[0].toUpperCase() === "AUTHENTICATE") {
			// 无前缀形式: data[0]=AUTHENTICATE, data[1]=payload
			payload = (data[1] || "").replace(/^:/, '');
		} else {
			// 有前缀形式: data[0]=:server, data[1]=AUTHENTICATE, data[2]=payload
			payload = (data[2] || "").replace(/^:/, '');
		}

		if (payload === '+') {
			// 服务器发送空挑战，客户端开始发送认证数据
			if (!saslPending || !saslAccount || !saslPassword) {
				writeToLog('[SASL] AUTHENTICATE + received but no pending SASL auth — aborting');
				doSend("AUTHENTICATE *");
				return;
			}
			// PLAIN 格式: authzid\0authcid\0passwd (authzid 为空则使用 authcid)
			const authStr = `\x00${saslAccount}\x00${saslPassword}`;
			const encoded = btoa(unescape(encodeURIComponent(authStr)));
			writeToLog(`[SASL] Sending PLAIN credentials for: ${saslAccount}`);
			doSend("AUTHENTICATE " + encoded);
		} else {
			writeToLog(`[SASL] Unexpected AUTHENTICATE payload: ${payload}`);
		}
	});

	// 900 RPL_LOGGEDIN: SASL 登录成功
	Commands.set("900", function (nick, data) {
		if (!data || data.length < 4) return;
		// 格式: :server 900 nick nick!user@host accountname :message
		// data[3]=nick!user@host, data[4]=accountname(才是账号名)
		const accountName = data.length >= 5 ? data[4].replace(/^:/, '') : (data[3] || '');
		writeToScreen("var(--clr-green)", `已登录账号: ${accountName}`, statusChannel, "*");
		writeToLog(`[SASL] RPL_LOGGEDIN (900): logged in as ${accountName}`);
		// 更新本地账号信息（用真实账号名，不是 nick!user@host）
		if (accountName && accountName !== '*') {
			saslAccount = accountName;
		}
	});

	// 901 RPL_LOGGEDOUT: 退出账号
	Commands.set("901", function (nick, data) {
		writeToScreen("var(--clr-warning)", `账号已登出`, statusChannel, "*");
		writeToLog(`[SASL] RPL_LOGGEDOUT (901)`);
	});

	// 902 ERR_NICKLOCKED: 昵称被锁定
	Commands.set("902", function (nick, data) {
		const msg = data && data.length >= 4 ? data.slice(3).join(' ').replace(/^:/, '') : 'Nick locked';
		writeToScreen("var(--clr-red)", `SASL 错误: 昵称已锁定 — ${msg}`, statusChannel, "*");
		writeToLog(`[SASL] ERR_NICKLOCKED (902): ${msg}`);
		saslPending = false;
		doSend("CAP END");
		sendRegistration();
	});

	// 903 RPL_SASLSUCCESS: SASL 认证成功
	Commands.set("903", function (nick, data) {
		writeToScreen("var(--clr-green)", `SASL 认证成功!`, statusChannel, "*");
		writeToLog(`[SASL] RPL_SASLSUCCESS (903)`);
		saslPending = false;
		doSend("CAP END");
		sendRegistration();
	});

	// 904 ERR_SASLFAIL: SASL 认证失败
	Commands.set("904", function (nick, data) {
		const msg = data && data.length >= 4 ? data.slice(3).join(' ').replace(/^:/, '') : 'Authentication failed';
		writeToScreen("var(--clr-red)", `SASL 认证失败: ${msg}`, statusChannel, "*");
		writeToLog(`[SASL] ERR_SASLFAIL (904): ${msg}`);
		saslPending = false;
		// 认证失败后仍然继续连接（不携带账号）
		doSend("CAP END");
		sendRegistration();
	});

	// 905 ERR_SASLTOLONG: 认证数据过长
	Commands.set("905", function (nick, data) {
		writeToScreen("var(--clr-red)", `SASL 数据过长`, statusChannel, "*");
		writeToLog(`[SASL] ERR_SASLTOLONG (905)`);
		saslPending = false;
		doSend("CAP END");
		sendRegistration();
	});

	// 906 ERR_SASLABORTED: SASL 被中止
	Commands.set("906", function (nick, data) {
		writeToScreen("var(--clr-warning)", `SASL 认证已中止`, statusChannel, "*");
		writeToLog(`[SASL] ERR_SASLABORTED (906)`);
		saslPending = false;
	});

	// 907 ERR_SASLALREADY: 已经认证
	Commands.set("907", function (nick, data) {
		writeToScreen("var(--clr-warning)", `已经完成 SASL 认证`, statusChannel, "*");
		writeToLog(`[SASL] ERR_SASLALREADY (907)`);
	});

	// 908 RPL_SASLMECHS: 支持的 SASL 机制列表
	Commands.set("908", function (nick, data) {
		const mechs = data && data.length >= 4 ? data.slice(3).join(' ').replace(/^:/, '') : '';
		writeToScreen("var(--clr-info)", `支持的 SASL 机制: ${mechs}`, statusChannel, "*");
		writeToLog(`[SASL] RPL_SASLMECHS (908): ${mechs}`);
	});

	// IRCv3 spec: https://ircv3.net/specs/extensions/chghost
	// 当用户的 ident 或 hostname 变更时，服务器推送 CHGHOST 通知
	// 格式: :nick!oldident@oldhost CHGHOST newident newhost

	Commands.set("CHGHOST", function (nick, data) {
		if (!data || data.length < 4) return;
		const newIdent = data[2];
		const newHost  = data[3].replace(/^:/, '');
		const isSelf   = (nick === nickname);

		if (isSelf) {
			writeToScreen("var(--clr-info)", `你的主机信息已更新: ${newIdent}@${newHost}`, statusChannel, "*");
		} else {
			// 在所有包含该用户的频道通知
			channelMap.forEach(function (channel) {
				if (!channel.users) return;
				const hasUser = channel.users.some(u => u[1] === nick);
				if (hasUser) {
					writeToScreen("var(--clr-text-dim)", `${nick} 的主机已变更为 ${newIdent}@${newHost}`, channel, "*");
				}
			});
		}
		writeToLog(`[CHGHOST] ${nick}: new ident=${newIdent} host=${newHost}`);
	});

	// ── IRCv3 功能6: account-notify + account-tag + extended-join ─────────
	// IRCv3 specs:
	//   https://ircv3.net/specs/extensions/account-notify
	//   https://ircv3.net/specs/extensions/account-tag
	//   https://ircv3.net/specs/extensions/extended-join
	//
	// ACCOUNT: 用户登录/退出账号时通知
	// 格式: :nick!user@host ACCOUNT accountname  (*=退出)
	// extended-join: JOIN 消息包含账号和真名
	// 格式: :nick!user@host JOIN #chan accountname :realname

	Commands.set("ACCOUNT", function (nick, data) {
		if (!data || data.length < 3) return;
		const accountName = data[2].replace(/^:/, '');
		const isSelf = (nick === nickname);

		if (accountName === '*') {
			// 用户退出账号
			if (isSelf) {
				writeToScreen("var(--clr-warning)", `你已退出账号登录`, statusChannel, "*");
			} else {
				channelMap.forEach(function (channel) {
					if (!channel.users) return;
					if (channel.users.some(u => u[1] === nick)) {
						writeToScreen("var(--clr-text-dim)", `${nick} 已退出账号`, channel, "*");
					}
				});
			}
			writeToLog(`[ACCOUNT] ${nick}: logged out`);
		} else {
			// 用户登录到账号
			if (isSelf) {
				writeToScreen("var(--clr-green)", `你已登录账号: ${accountName}`, statusChannel, "*");
			} else {
				channelMap.forEach(function (channel) {
					if (!channel.users) return;
					if (channel.users.some(u => u[1] === nick)) {
						writeToScreen("var(--clr-info)", `${nick} 已登录账号: ${accountName}`, channel, "*");
					}
				});
			}
			writeToLog(`[ACCOUNT] ${nick}: logged in as ${accountName}`);
		}
	});

	// SETNAME: 用户更新真名 (IRCv3 setname 扩展)
	// 格式: :nick!user@host SETNAME :new real name
	Commands.set("SETNAME", function (nick, data) {
		if (!data || data.length < 3) return;
		const newRealname = data.slice(2).join(' ').replace(/^:/, '');
		const isSelf = (nick === nickname);
		if (isSelf) {
			writeToScreen("var(--clr-info)", `你的真名已更新为: ${newRealname}`, statusChannel, "*");
		} else {
			channelMap.forEach(function (channel) {
				if (!channel.users) return;
				if (channel.users.some(u => u[1] === nick)) {
					writeToScreen("var(--clr-text-dim)", `${nick} 更新了真名: ${newRealname}`, channel, "*");
				}
			});
		}
		writeToLog(`[ACCOUNT] SETNAME: ${nick} → "${newRealname}"`);
	});
	// IRCv3 spec: https://ircv3.net/specs/extensions/away-notify
	// 当用户设置或取消 AWAY 状态时，服务器向所有共同在线的用户推送 AWAY 消息
	// 格式: :nick!user@host AWAY [:reason]  (有原因=设置, 无原因=取消)

	Commands.set("AWAY", function (nick, data) {
		const isSelf = (nick === nickname);

		// 提取 AWAY 原因（如果有）
		let reason = "";
		if (data && data.length >= 3) {
			reason = data.slice(2).join(' ');
			if (reason.startsWith(':')) reason = reason.substring(1);
		}

		const isSettingAway = reason.length > 0;

		if (isSelf) {
			if (isSettingAway) {
				writeToScreen("var(--clr-warning)", `你已设置离开状态: ${reason}`, statusChannel, "*");
			} else {
				writeToScreen("var(--clr-info)", `你已取消离开状态`, statusChannel, "*");
			}
		} else {
			channelMap.forEach(function (channel) {
				if (!channel.userlist || !channel.users) return;
				// 检查该用户是否在此频道
				const userEntry = channel.users.find(u => u[1] === nick);
				if (!userEntry) return;

				if (isSettingAway) {
					writeToScreen("var(--clr-text-dim)", `${nick} 离开 (${reason || '忙碌'})`, channel, "*");
				} else {
					writeToScreen("var(--clr-info)", `${nick} 回来了`, channel, "*");
				}
				// 在用户列表项上标记离开状态
				updateUserAwayStatus(nick, channel, isSettingAway);
			});
		}
		writeToLog(`[AWAY] ${nick}: ${isSettingAway ? `away (${reason})` : 'back'}`);
	});

	/**

	Commands.set("353", function (nick, data) {

		}
		data[5] = data[5].substring(1);
		for (let i = 5; i < data.length; i++) {
			let prefix = "";
			let entry = data[i];

			// 若启用了 userhost-in-names，NAMES 中的昵称格式为 nick!user@host
			// 或带前缀: @nick!user@host，需要剥离 !user@host 部分存储显示名
			let displayNick = entry;
			if (ircv3UserhostInNames && entry.includes('!')) {
				displayNick = entry.split('!')[0]; // 仅保留 nick 部分（含前缀字符）
			}

			// multi-prefix 支持：连续提取所有前缀字符（如 @+nick 有两个前缀）
			let ii = 0;
			while (PrefixChars && PrefixChars[1] && ii < displayNick.length && PrefixChars[1].indexOf(displayNick[ii]) >= 0) {

				ii++;

			userEl.setAttribute('data-initial', initial.toUpperCase());
			const prefixP = document.createElement("p");

				const prefixInfo = DefaultPrefixMap[prefixChar];
				userEl.setAttribute('data-prefix', prefixChar);
				prefixP.textContent = prefixInfo ? prefixInfo.symbol : prefixChar;
				if (prefixInfo) prefixP.title = prefixInfo.name;

			nickP.addEventListener("click", (function(n) { return function(e) { e.stopPropagation(); openPrivateChat(n); }; })(nickName));
			userEl.appendChild(nickP);
			frag.appendChild(userEl);
		}
		channel.userlist.innerHTML = "";
		channel.userlist.appendChild(frag);

	Commands.set("MODE", function (nick, data) {
		if (!data || data.length < 4) return;
		let channel = findChannel(data[2]);
		if (!channel) return;

		let text = data[3];
		for (let i = 4; i < data.length; i++) {
			text += " " + data[i];
		}
		writeToScreen("var(--clr-blue)", `${nick} 设置模式: ${text}`, channel, "*");

		if (!PrefixChars || !PrefixChars[0] || data[3].length < 1) return;

		// 遍历 mode 字符串，按顺序与参数对应
		// 前缀相关 mode（o/v/h/a 等）需要消耗一个参数（目标昵称）
		const modeString = data[3];
		let paramIndex = 4;
		let adding = true;

		for (let i = 0; i < modeString.length; i++) {
			const ch = modeString[i];
			if (ch === '+') { adding = true; continue; }
			if (ch === '-') { adding = false; continue; }

			// 检查此 mode 字符是否是前缀 mode（需要参数）
			const posInModes = PrefixChars[0].indexOf(ch);
			if (posInModes >= 0 && paramIndex < data.length) {
				let targetNick = data[paramIndex].replace(/^:/, '');
				paramIndex++;
				Channel_UpdateUserPrefix(targetNick, channel, adding, ch);
			} else if (posInModes < 0 && paramIndex < data.length) {
				// 其他带参数的 mode（如 +k key, +l limit 等），跳过参数
				// +b/+e/+I（ban/except/invite）也带参数，不影响用户列表
				if (adding && (ch === 'k' || ch === 'l' || ch === 'b' || ch === 'e' || ch === 'I')) {
					paramIndex++;
				} else if (!adding && (ch === 'k' || ch === 'b' || ch === 'e' || ch === 'I')) {
					paramIndex++;
				}
			}
		}
		writeToLog(`[IRC] MODE: channel=${data[2]} mode="${text}" by ${nick}`);
	});

	Commands.set("PRIVMSG", function (nick, data, msgTags) {
		if (!data || data.length < 4) return;
		let target = data[2];
		let text = data[3].substring(1);
		for (let i = 4; i < data.length; i++) {
			text += " " + data[i];
		}
		nick = data[0].substring(1).split("!")[0];

		const serverTime = msgTags && msgTags.get('time') || null;
		const accountName = msgTags && msgTags.get('account') || null;
		const msgId = msgTags && msgTags.get('msgid') || null;
		const replyTo = msgTags && msgTags.get('+reply') || null;

		const isPrivateMessage = !/^[#&+!]/.test(target) && target.toLowerCase() === nickname.toLowerCase();

		let channel;
		if (isPrivateMessage) {
			channel = findChannel(nick);
			if (!channel) {
				channel = new Tab_Create(nick, `与 ${nick} 的私聊`, false);
				channel.isPrivate = true;
				if (channel.button) {
					channel.button.classList.add('private');
				}
				writeToLog(`[PM] Incoming PM from ${nick} — auto-creating PM tab`);
			}
		} else {
			channel = findChannel(target);
			if (!channel) channel = statusChannel;
		}

		// 如果是服务器回显自己发送的消息，且 echo-message 已启用，则正常显示
		// （因为 send() 已不再本地显示，这里是唯一的显示时机）
		// 注意: ircv3EchoMessage=true 时自己的消息也走这里正常显示

	if (text[0] == "\x01") {
		if (text.indexOf("\x01ACTION ") == 0) {
			let actionText = text.substring(8);
			if (actionText.endsWith("\x01")) actionText = actionText.slice(0, -1);
			writeToScreen("var(--clr-red)", `${nick} ${actionText}`, channel, "*", serverTime);
		} else {
			writeToScreen("var(--clr-red)", `${nick} ${text}`, channel, "*", serverTime);
		}
		if (channel && channel !== activeChannel && channel !== statusChannel) {
			addUnreadBadge(channel);
		}
	} else {
		let displayNick = nick;
		// 若有 +reply 标签，在消息前加 "↩ 回复" 前缀
		let displayText = text;
		if (replyTo) {
			displayText = `↩ ${text}`;
		}
		writeToScreen("var(--clr-font)", displayText, channel, displayNick, serverTime);
		if (channel && channel !== activeChannel && channel !== statusChannel) {
			addUnreadBadge(channel);
		}
	}

		if (isPrivateMessage) {
			writeToLog(`[PM] ${nick} → you: ${text}`);
		}
	});

	function process(rawData) {
		if (!rawData) return;

		const lines = rawData.split('\n');
		for (const line of lines) {
			const trimmedLine = line.replace(/\r$/, '').replace(/\r\n$/, '');
			if (trimmedLine) processLine(trimmedLine);
		}
	}

	function processLine(rawLine) {
		if (!rawLine) return;

		const { tags: msgTags, rest: lineAfterTags } = extractMsgTags(rawLine);
		// msgTags 现在包含所有 @key=value 标签
		// lineAfterTags 是去掉标签部分的消息正文

		// batch 支持：如果消息带有 batch= 标签，且对应 batch 还在缓冲中，先缓冲
		if (msgTags.has('batch')) {
			const batchRef = msgTags.get('batch');
			if (batchBuffer && batchBuffer.has(batchRef)) {
				batchBuffer.get(batchRef).messages.push(rawLine);
				return; // 暂存，等 BATCH -ref 时统一处理
			}
		}

		let data = lineAfterTags.split(" ");
		if (!data || data.length < 2) {
			return;
		}

	if (data[0] === "PING") {
		const pingToken = data[1] ? data[1].replace(/^:/, '') : 'pong';
		const pongResponse = "PONG :" + pingToken.trim();
		doSend(pongResponse);
		writeToLog(`[PING/PONG] ${pongResponse}`);
		return;
	}
	if (data[0] === "ERROR") {
		writeToScreen("var(--clr-font)", lineAfterTags, statusChannel, "");
		writeToLog(`[ERROR] ${lineAfterTags}`);
		return;
	}

	// IRC 协议中部分服务器消息没有 ":server" 前缀，data[0] 直接就是命令
	// 这类消息：data[0] 不以 ":" 开头，且不是已经处理过的 PING/ERROR
	if (!data[0].startsWith(':')) {
		const bareCommand = data[0].toUpperCase();
		const bareFn = Commands.get(bareCommand);
		if (bareFn) {
			// 构造 data 使处理函数能正常访问参数：
			// data[0] = "" (空前缀), data[1] = 命令, data[2...] = 参数
			// 但现有 AUTHENTICATE 处理器用 data[1] 作为 payload，需要对齐
			// 所以这里把原始 data 整体右移一位，data[0]="" 作为虚拟前缀
			bareFn("", data, msgTags);
			return;
		}
	}

	let nick = data[0].substring(1).split("!")[0];
	let command = data[1].toUpperCase();
	let fn = Commands.get(command);
	if (fn) {
		fn(nick, data, msgTags);
		return;
	}

		if (!isNaN(parseInt(data[1]))) {
			let text = "";
			if (data.length > 3) {
				let first = data[3];
				if (first.startsWith(':')) first = first.substring(1);
				text = first;
				for (let i = 4; i < data.length; i++) {
					text += " " + data[i];
				}
			}
			writeToScreen("var(--clr-font)", text || data[1], statusChannel, "");
			writeToLog(`[SERVER] ${data[1]}: ${text}`);
			return;
		}
	}

	// IRCv3 spec: https://ircv3.net/specs/client-tags/typing
	// 需要 message-tags 能力
	// 发送: TAGMSG 目标 :  (带 +typing=active/paused/done 标签)
	// 接收: 来自其他用户的 TAGMSG 消息，解析 +typing 标签
	//
	// 节流规则: 连续 active 通知间隔 ≥ 3秒
	// 超时规则: active → 6秒无续发视为停止; paused → 30秒无续发视为停止

	let typingLastSent = 0;          // 上次发送 typing active 的时间戳
	const TYPING_THROTTLE_MS = 3000; // 节流间隔 3秒
	let typingInputTimer = null;     // 输入暂停检测定时器
	const TYPING_PAUSE_DELAY = 4000; // 输入停止 4秒后发送 paused

	// 其他用户输入状态追踪: Map<目标, Map<nick, {status, timer}>>
	let remoteTypingState = new Map();

	/**
	 * 发送 typing 状态通知 (TAGMSG + +typing 标签)
	 * @param {'active'|'paused'|'done'} status 输入状态
	 * @param {string} target 目标频道或昵称
	 */
	function sendTypingStatus(status, target) {
		if (!ircv3MessageTags || !isConnected || !target || target === 'Status') return;
		doSend(`@+typing=${status} TAGMSG ${target}\r\n`);
		writeToLog(`[TYPING] Sent: target=${target} status=${status}`);
	}

	/**
	 * 当用户在输入框中输入时调用，处理 typing active/paused 状态发送
	 */
	function handleTypingInput() {
		if (!ircv3MessageTags || !activeChannel || activeChannel.name === 'Status') return;
		const target = activeChannel.name;
		const now = Date.now();

		// 节流: 距离上次发送 active 超过 3秒才重新发送
		if (now - typingLastSent >= TYPING_THROTTLE_MS) {
			sendTypingStatus('active', target);
			typingLastSent = now;
		}

		// 重置暂停检测定时器
		if (typingInputTimer) clearTimeout(typingInputTimer);
		typingInputTimer = setTimeout(() => {
			// 用户停止输入但未清空输入框 → paused
			if (input && input.value.trim().length > 0) {
				sendTypingStatus('paused', target);
			}
			typingInputTimer = null;
		}, TYPING_PAUSE_DELAY);
	}

	/**
	 * 当用户发送消息后，发送 done 状态并重置定时器
	 */
	function sendTypingDone(target) {
		if (!ircv3MessageTags || !target || target === 'Status') return;
		if (typingInputTimer) { clearTimeout(typingInputTimer); typingInputTimer = null; }
		typingLastSent = 0;
		sendTypingStatus('done', target);
	}

	/**
	 * 更新 typing 指示器 UI
	 * @param {string} target 当前活跃频道/会话名
	 */
	function updateTypingIndicatorUI(target) {
		const el = document.getElementById('typingIndicator');
		if (!el) return;
		const channelTyping = remoteTypingState.get(target);
		if (!channelTyping || channelTyping.size === 0) {
			el.textContent = '';
			return;
		}
		const activeTypers = [];
		channelTyping.forEach((state, nick) => {
			if (state.status === 'active' || state.status === 'paused') {
				activeTypers.push(nick);
			}
		});
		if (activeTypers.length === 0) {
			el.textContent = '';
		} else if (activeTypers.length === 1) {
			el.textContent = `✎ ${activeTypers[0]} 正在输入...`;
		} else if (activeTypers.length <= 3) {
			el.textContent = `✎ ${activeTypers.join('、')} 正在输入...`;
		} else {
			el.textContent = `✎ ${activeTypers.length} 人正在输入...`;
		}
	}

	/**
	 * 设置远程用户的输入状态，并启动超时清理
	 */
	function setRemoteTypingState(nick, target, status) {
		if (!remoteTypingState.has(target)) {
			remoteTypingState.set(target, new Map());
		}
		const channelTyping = remoteTypingState.get(target);

		// 清除已有的超时定时器
		if (channelTyping.has(nick)) {
			const prev = channelTyping.get(nick);
			if (prev.timer) clearTimeout(prev.timer);
		}

		if (status === 'done') {
			channelTyping.delete(nick);
		} else {
			const timeoutMs = status === 'active' ? 6000 : 30000;
			const timer = setTimeout(() => {
				const ct = remoteTypingState.get(target);
				if (ct) { ct.delete(nick); updateTypingIndicatorUI(target); }
			}, timeoutMs);
			channelTyping.set(nick, { status, timer });
		}

		// 只有当前活跃频道才更新 UI
		if (activeChannel && activeChannel.name === target) {
			updateTypingIndicatorUI(target);
		}
	}

	// TAGMSG 命令处理器: 接收其他用户的 typing 通知
	Commands.set("TAGMSG", function (nick, data, msgTags) {
		if (!data || data.length < 3) return;
		nick = data[0].substring(1).split("!")[0];
		const target = data[2];

		if (msgTags && msgTags.has('+typing')) {
			const typingStatus = msgTags.get('+typing');
			// TAGMSG 的目标是频道时，在该频道显示; 目标是自己时，在 PM 对话显示
			let displayTarget = target;
			if (!target.startsWith('#') && target.toLowerCase() === nickname.toLowerCase()) {
				// 这是发给自己的 TAGMSG（PM 场景），显示在对方的 PM tab 中
				displayTarget = nick;
			}
			writeToLog(`[TYPING] Received: ${nick} → ${displayTarget} = ${typingStatus}`);
			setRemoteTypingState(nick, displayTarget, typingStatus);
		}

		// +react client-tag: 消息表情反应
		if (msgTags && msgTags.has('+react')) {
			const reaction = msgTags.get('+react');
			const replyTo  = msgTags.get('+reply') || '';
			let displayTarget = target;
			if (!/^[#&+!]/.test(target) && target.toLowerCase() === nickname.toLowerCase()) {
				displayTarget = nick;
			}
			const channel = findChannel(displayTarget) || statusChannel;
			if (channel) {
				writeToScreen("var(--clr-text-dim)", `${nick} 对消息回应了 ${reaction}${replyTo ? ' (msgid:'+replyTo+')' : ''}`, channel, "*");
			}
			writeToLog(`[REACT] ${nick} → ${displayTarget}: ${reaction}`);
		}
	});

	// ── IRCv3: BATCH 批量消息支持 ──────────────────────────────────────────
	// 规范: https://ircv3.net/specs/extensions/batch
	// BATCH +ref type [params...]  开始批次
	// BATCH -ref                   结束批次
	// 批次内消息带 batch=ref 标签

	Commands.set("BATCH", function (nick, data) {
		if (!data || data.length < 2) return;
		const refStr = data[1] || '';
		if (refStr.startsWith('+')) {
			const ref  = refStr.substring(1);
			const type = data[2] ? data[2].toUpperCase() : '';
			const params = data.slice(3).map(p => p.replace(/^:/, ''));
			batchBuffer.set(ref, { type, params, messages: [] });
			writeToLog(`[BATCH] Start: ref=${ref} type=${type} params=${params.join(',')}`);
		} else if (refStr.startsWith('-')) {
			const ref = refStr.substring(1);
			const batch = batchBuffer.get(ref);
			if (!batch) return;
			batchBuffer.delete(ref);
			writeToLog(`[BATCH] End: ref=${ref} type=${batch.type} msgs=${batch.messages.length}`);
			// 处理已缓冲的批次消息
			processBatch(ref, batch);
		}
	});

	function processBatch(ref, batch) {
		const type = batch.type;
		if (type === 'CHATHISTORY' || type === 'chathistory') {
			// 历史消息批次: 按顺序显示
			const channelName = batch.params[0] || '';
			const ch = findChannel(channelName);
			if (ch) {
				writeToScreen("var(--clr-text-dim)", `── 频道历史消息 (${batch.messages.length}条) ──`, ch, "*");
			}
			for (const msg of batch.messages) {
				processLine(msg);
			}
		} else if (type === 'LABELED-RESPONSE' || type === 'labeled-response') {
			// labeled-response 批次：顺序处理
			for (const msg of batch.messages) {
				processLine(msg);
			}
		} else {
			// 通用批次：顺序处理
			for (const msg of batch.messages) {
				processLine(msg);
			}
		}
	}

	// ── IRCv3: labeled-response ──────────────────────────────────────────
	// 规范: https://ircv3.net/specs/extensions/labeled-response
	// 给发出的命令打 label 标签，服务器回复带相同 label，实现请求-响应配对

	function doSendLabeled(message, description) {
		if (!ircv3LabeledResponse) {
			doSend(message);
			return null;
		}
		const label = 'lbl' + (++labelCounter);
		pendingLabels.set(label, { description: description || message.trim(), ts: Date.now() });
		// 发送带 label 标签的消息
		const tagged = `@label=${label} ${message}`;
		doSend(tagged.endsWith('\r\n') ? tagged : tagged + '\r\n');
		writeToLog(`[LABELED] Sent label=${label}: ${message.trim()}`);
		// 30秒超时清理
		setTimeout(() => {
			if (pendingLabels.has(label)) {
				pendingLabels.delete(label);
				writeToLog(`[LABELED] Label ${label} timed out`);
			}
		}, 30000);
		return label;
	}

	// ── IRCv3: chathistory ──────────────────────────────────────────────
	// 规范: https://ircv3.net/specs/extensions/chathistory
	// 加入频道后请求最近历史消息

	function requestChatHistory(channelName, limit) {
		if (!ircv3ChatHistory) return;
		limit = limit || 50;
		// CHATHISTORY LATEST #chan * count
		doSend(`CHATHISTORY LATEST ${channelName} * ${limit}\r\n`);
		writeToLog(`[CHATHISTORY] Requesting last ${limit} messages for ${channelName}`);
	}

	// 收到 CHATHISTORY 错误回复
	Commands.set("FAIL", function (nick, data) {
		if (!data || data.length < 3) return;
		const command = data[2] || '';
		const code    = data[3] || '';
		const msg     = data.slice(4).join(' ').replace(/^:/, '');
		writeToScreen("var(--clr-warning)", `[${command}] 失败 (${code}): ${msg}`, statusChannel, "*");
		writeToLog(`[FAIL] command=${command} code=${code}: ${msg}`);
	});

	// ── IRCv3: invite-notify + INVITE 命令处理 ──────────────────────────
	// 规范: https://ircv3.net/specs/extensions/invite-notify
	// 服务器推送 INVITE 通知：:op!u@h INVITE targetNick #channel
	// 有 invite-notify 时：其他用户被邀请时我们也能看到

	Commands.set("INVITE", function (nick, data) {
		if (!data || data.length < 4) return;
		const invitedNick  = data[2];
		const inviteChannel = data[3].replace(/^:/, '');
		const isSelf = invitedNick.toLowerCase() === nickname.toLowerCase();

		if (isSelf) {
			// 我被邀请加入某频道
			const targetCh = findChannel(inviteChannel);
			const displayCh = targetCh || statusChannel;
			writeToScreen("var(--clr-green)", `🔔 ${nick} 邀请你加入 ${inviteChannel}，输入 /join ${inviteChannel} 加入`, displayCh, "*");
			// 在状态栏也显示一次
			if (displayCh !== statusChannel) {
				writeToScreen("var(--clr-green)", `🔔 ${nick} 邀请你加入 ${inviteChannel}`, statusChannel, "*");
			}
			writeToLog(`[INVITE] You were invited to ${inviteChannel} by ${nick}`);
		} else {
			// invite-notify: 其他用户被邀请，显示在相关频道
			const ch = findChannel(inviteChannel) || statusChannel;
			writeToScreen("var(--clr-text-dim)", `${nick} 邀请 ${invitedNick} 加入 ${inviteChannel}`, ch, "*");
			writeToLog(`[INVITE] ${nick} invited ${invitedNick} to ${inviteChannel}`);
		}
	});

	// 341 RPL_INVITING: 服务器确认邀请已发送
	Commands.set("341", function (nick, data) {
		if (!data || data.length < 4) return;
		const invitedNick  = data[3];
		const inviteChannel = data.length >= 5 ? data[4].replace(/^:/, '') : '';
		writeToScreen("var(--clr-info)", `已向 ${invitedNick} 发送邀请${inviteChannel ? ' 加入 ' + inviteChannel : ''}`, statusChannel, "*");
		writeToLog(`[INVITE] RPL_INVITING (341): invited ${invitedNick} to ${inviteChannel}`);
	});

	// /invite 命令: /invite nick [#channel]
	// 在 send() 函数中注册这个命令在 help 中（处理逻辑在 send() 里）

	// ── IRCv3: draft/multiline ──────────────────────────────────────────
	// 规范: https://ircv3.net/specs/extensions/multiline
	// 服务器推送多行消息时带 draft/multiline batch 类型
	// 客户端发送时暂不实现 (UI 层需要额外改动)

	// 多行消息接收处理：在 processBatch 中已包含；
	// 多行消息 batch 类型为 "draft/multiline" 或 "multiline"
	// 消息内容在 batch.messages 中，按行连接显示

	// ── IRCv3: WHOX 扩展 WHO 查询 ──────────────────────────────────────
	// 规范: https://ircv3.net/specs/extensions/whox
	// 使用 WHO #chan %tunhfa,1 可以批量获取用户信息（含账号名、away状态）
	// 字段固定返回顺序: t(token) u(user) h(host) n(nick) f(flags) a(account)
	// 352 RPL_WHOREPLY (标准), 354 RPL_WHOSPCRPL (whox扩展)

	// 加入频道后请求 WHO 信息（含账号和 away 状态）
	function requestWho(channelName) {
		if (!isConnected) return;
		if (ircv3Whox) {
		// WHOX: 请求 querytype、user、host、nick、flags、account、realname
		// 注意：去掉 i(ip) 字段，避免服务器实现差异导致字段偏移不稳定
		doSend(`WHO ${channelName} %tunhfa,1\r\n`);
			writeToLog(`[WHOX] Requesting WHO for ${channelName}`);
		} else {
			doSend(`WHO ${channelName}\r\n`);
			writeToLog(`[IRC] Requesting WHO for ${channelName}`);
		}
	}

	// 352 RPL_WHOREPLY: 标准 WHO 回复
	// :server 352 me #chan user host server nick H/G [0 realname]
	Commands.set("352", function (nick, data) {
		if (!data || data.length < 8) return;
		const channel    = data[3];
		const whoNick    = data[7];
		const flags      = data[8] || '';
		const isAway     = flags.startsWith('G'); // G=Gone(away), H=Here
		const ch = findChannel(channel);
		if (ch && ch.userlist) {
			updateUserAwayStatus(whoNick, ch, isAway);
		}
		writeToLog(`[IRC] RPL_WHOREPLY (352): ${whoNick} in ${channel} flags=${flags}`);
	});

	// 354 RPL_WHOSPCRPL: WHOX 扩展回复（含账号信息）
	// 我们请求的字段标志: %tunhfa,1
	// WHOX 回复按固定顺序: t(token) u(user) h(host) n(nick) f(flags) a(account)
	// :server 354 me 1(t) user(u) host(h) nick(n) flags(f) account(a)
	// data:   [0]  [1][2] [3]     [4]     [5]     [6]      [7]       [8]
	// 注：WHOX 回复字段按固定顺序（ircv3.net/specs/extensions/whox），只返回请求的字段
	Commands.set("354", function (nick, data) {
		if (!data || data.length < 8) return;
		// data[3]=token(1), data[4]=user, data[5]=host, data[6]=nick, data[7]=flags, data[8]=account
		const whoNick  = data[6] || '';
		const flags    = data[7] || '';
		const account  = data[8] ? data[8].replace(/^:/, '') : '';
		const isAway   = flags.startsWith('G'); // G=Gone(away), H=Here
		// 在所有含此用户的频道更新 away 状态
		channelMap.forEach(function (ch) {
			if (!ch.users) return;
			if (ch.users.some(u => u[1] === whoNick)) {
				updateUserAwayStatus(whoNick, ch, isAway);
			}
		});
		writeToLog(`[WHOX] RPL_WHOSPCRPL (354): ${whoNick} flags=${flags} account=${account}`);
	});

	// 315 RPL_ENDOFWHO
	Commands.set("315", function (nick, data) {
		if (!data || data.length < 4) return;
		const target = data[3];
		writeToLog(`[IRC] RPL_ENDOFWHO (315): ${target}`);
	});

	// ── +reply client-tag: 消息引用回复 ────────────────────────────────
	// 规范: https://ircv3.net/specs/client-tags/reply
	// 发送带 +reply=<msgid> 标签的 PRIVMSG/NOTICE
	// 客户端在 PRIVMSG 处理时检测并显示引用信息

	// 在 PRIVMSG 处理中已通过 msgTags 支持显示；
	// 发送端通过 sendWithReply() 函数支持

	function sendWithReply(replyToMsgid, targetChannel, text) {
		if (!replyToMsgid || !ircv3MessageTags) {
			// 不支持时直接发普通消息
			const msgs = splitIRCMessage('privmsg ' + targetChannel + ' :' + text);
			msgs.forEach(m => doSend(m));
			return;
		}
		// 发送带 +reply 标签的消息
		const msgs = splitIRCMessage('privmsg ' + targetChannel + ' :' + text);
		msgs.forEach((m, idx) => {
			if (idx === 0) {
				// 首条带 reply 标签
				const tagged = `@+reply=${replyToMsgid} ${m.trim()}\r\n`;
				doSend(tagged);
			} else {
				doSend(m);
			}
		});
		writeToLog(`[REPLY] Sent reply to msgid=${replyToMsgid}`);
	}


	function startKeepAlive() {
		stopKeepAlive();
		keepAliveTimer = setInterval(() => {
			if (isConnected && websocket && websocket.readyState === WebSocket.OPEN) {
				writeToLog(`[KEEP-ALIVE] Sending PING keepalive | session: ${formatSessionDuration(sessionStartTime)} | sent: ${sentCount} | recv: ${recvCount}`);
				doSend("PING :" + wsUrl);
			}
		}, keepAliveInterval);
	}

	function stopKeepAlive() {
		if (keepAliveTimer) {
			clearInterval(keepAliveTimer);
			keepAliveTimer = null;
		}
	}

	function formatSessionDuration(startTime) {
		if (!startTime) return 'N/A';
		const secs = Math.floor((Date.now() - startTime.getTime()) / 1000);
		const h = Math.floor(secs / 3600);
		const m = Math.floor((secs % 3600) / 60);
		const s = secs % 60;
		if (h > 0) return `${h}h ${m}m ${s}s`;
		if (m > 0) return `${m}m ${s}s`;
		return `${s}s`;
	}

	function sendRegistration() {
		doSend("NICK " + nickname);
		doSend("USER websocket * * :WebSocket User");
		writeToLog(`[IRC] Sending registration: NICK=${nickname}, USER=websocket`);
	}

	window.toggleConnection      = toggleConnection;
	window.toggleHeaderMenu      = toggleHeaderMenu;
	window.toggleSettings        = toggleSettings;
	window.toggleLog             = toggleLog;
	window.clearLog              = clearLog;
	window.showPrivateChatList   = showPrivateChatList;
	window.showSSLWarning        = showSSLWarning;
	window.toggleAutoReconnect   = toggleAutoReconnect;
	window.joinChannel           = joinChannel;
	window.send                  = send;
	window.onKeyDown             = onKeyDown;
	window.updateCharCount       = updateCharCount;
	window.openPrivateChat       = openPrivateChat;
	window.handleTypingInput     = handleTypingInput;
	window.sendWithReply         = sendWithReply;
	window.doSendLabeled         = doSendLabeled;
	window.requestChatHistory    = requestChatHistory;
	window.requestWho            = requestWho;

}());
</script>

</html>
