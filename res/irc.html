	if (!channel) return;
	
	let text = data[3];
	for (let i = 4; i < data.length; i++) text += " " + data[i];
	writeToScreen("var(--clr-blue)", `${nick} 设置模式: ${text}`, channel, "*");
	
	if (!PrefixChars || !PrefixChars[0] || data[3].length < 1) return;
	
	const modeString = data[3];
	let paramIndex = 4, adding = true;
	
	for (let i = 0; i < modeString.length; i++) {
		const ch = modeString[i];
		if (ch === '+') { adding = true; continue; }
		if (ch === '-') { adding = false; continue; }
		
		const posInModes = PrefixChars[0].indexOf(ch);
		if (posInModes >= 0 && paramIndex < data.length) {
			let targetNick = data[paramIndex].replace(/^:/, '');
			paramIndex++;
			Channel_UpdateUserPrefix(targetNick, channel, adding, ch);
		} else if (posInModes < 0 && paramIndex < data.length) {
			if ((adding && (ch === 'k' || ch === 'l' || ch === 'b' || ch === 'e' || ch === 'I')) || (!adding && (ch === 'k' || ch === 'b' || ch === 'e' || ch === 'I'))) {
				paramIndex++;
			}
		}
	}
	writeToLog(`[IRC] MODE: ${data[2]} mode="${text}" by ${nick}`);
});

Commands.set("NICK", (nick, data) => {
	if (!data || data.length < 3) return;
	let newnick = data[2].replace(/^:/, '');
	const isSelf = (nick == nickname);
	if (isSelf) nickname = newnick;
	channelMap.forEach((channel, name) => {
		if (Channel_RenameUser(nick, newnick, channel)) {
			if (isSelf) writeToScreen("var(--clr-green)", `你现在的新昵称是 ${newnick}`, channel, "*");
			else writeToScreen("var(--clr-green)", `${nick} 更名为 ${newnick}`, channel, "*");
		}
	});
	writeToLog(`[IRC] NICK: ${nick} → ${newnick}${isSelf ? ' (self)' : ''}`);
});

Commands.set("PART", (nick, data) => {
	if (!data || data.length < 3) return;
	let partChannel = data[2];
	if (partChannel[0] == ":") partChannel = partChannel.substring(1);
	let channel = findChannel(partChannel);
	if (!channel) {
		writeToLog(`[WARN] PART for unknown channel: "${partChannel}"`);
		return;
	}
	let partReason = "";
	if (data.length >= 4) partReason = data.slice(3).join(' ').replace(/^:/, '').trim();
	
	const isSelf = data[0].startsWith(":" + nickname + "!") || data[0].toLowerCase().startsWith(":" + nickname.toLowerCase() + "!");
	
	if (isSelf) {
		Channel_Destroy(channel.name);
		writeToScreen("var(--clr-green)", `你已离开频道 ${channel.name}${partReason ? ' (' + partReason + ')' : ''}`, statusChannel, "");
		writeToLog(`[IRC] Self parted: ${partChannel}${partReason ? ' reason: ' + partReason : ''}`);
	} else {
		if (Channel_RemoveUser(nick, channel)) writeToScreen("var(--clr-green)", `${nick} 离开频道${partReason ? ' (' + partReason + ')' : ''}`, channel, "*");
		writeToLog(`[IRC] User parted: ${nick} ← ${partChannel}${partReason ? ' reason: ' + partReason : ''}`);
	}
});

Commands.set("TOPIC", (nick, data) => {
	if (!data || data.length < 4) return;
	let channel = findChannel(data[2]);
	if (!channel || !channel.topic) return;
	let text = data[3].substring(1);
	for (let i = 4; i < data.length; i++) text += " " + data[i];
	channel.topic.textContent = text || "No topic set";
	writeToScreen("var(--clr-blue)", `${nick} 设置主题为: ${text}`, channel, "*");
	writeToLog(`[IRC] TOPIC: ${data[2]} topic="${text}" by ${nick}`);
});

Commands.set("QUIT", (nick, data) => {
	let quitReason = "";
	if (data && data.length >= 3) quitReason = data.slice(2).join(' ').replace(/^:/, '').trim();
	channelMap.forEach((channel, name) => {
		if (Channel_RemoveUser(nick, channel)) writeToScreen("var(--clr-purple)", `${nick} 退出IRC${quitReason ? ' (' + quitReason + ')' : ''}`, channel, "*");
	});
	writeToLog(`[IRC] QUIT: ${nick}${quitReason ? ' reason: ' + quitReason : ''}`);
});

// Messages
Commands.set("PRIVMSG", (nick, data, msgTags) => {
	if (!data || data.length < 4) return;
	let target = data[2], text = data[3].substring(1);
	for (let i = 4; i < data.length; i++) text += " " + data[i];
	nick = data[0].substring(1).split("!")[0];
	
	const serverTime = msgTags && msgTags.get('time') || null;
	const replyTo = msgTags && msgTags.get('+reply') || null;
	const isPrivateMessage = !/^[#&+!]/.test(target) && target.toLowerCase() === nickname.toLowerCase();
	
	let channel;
	if (isPrivateMessage) {
		channel = findChannel(nick);
		if (!channel) {
			channel = new Tab_Create(nick, `与 ${nick} 的私聊`, false);
			channel.isPrivate = true;
			if (channel.button) channel.button.classList.add('private');
			writeToLog(`[PM] Incoming PM from ${nick}`);
		}
	} else {
		channel = findChannel(target);
		if (!channel) channel = statusChannel;
	}
	
	if (text[0] == "\x01") {
		if (text.indexOf("\x01ACTION ") == 0) {
			let actionText = text.substring(8);
			if (actionText.endsWith("\x01")) actionText = actionText.slice(0, -1);
			writeToScreen("var(--clr-red)", `${nick} ${actionText}`, channel, "*", serverTime);
		} else writeToScreen("var(--clr-red)", `${nick} ${text}`, channel, "*", serverTime);
		if (channel && channel !== activeChannel && channel !== statusChannel) addUnreadBadge(channel);
	} else {
		let displayText = text;
		if (replyTo) displayText = `↩ ${text}`;
		writeToScreen("var(--clr-font)", displayText, channel, nick, serverTime);
		if (channel && channel !== activeChannel && channel !== statusChannel) addUnreadBadge(channel);
	}
	if (isPrivateMessage) writeToLog(`[PM] ${nick} → you: ${text}`);
});

Commands.set("NOTICE", (nick, data, msgTags) => {
	if (!data || data.length < 4) return;
	let channel = findChannel(data[2]);
	if (!channel) channel = statusChannel;
	let text = data[3].substring(1);
	for (let i = 4; i < data.length; i++) text += " " + data[i];
	nick = data[0].substring(1).split("!")[0];
	const serverTime = msgTags && msgTags.get('time') || null;
	writeToScreen("var(--clr-blue)", `通知 ${nick}: ${text}`, channel, "-", serverTime);
	writeToLog(`[NOTICE] ${nick}: ${text}`);
});

// TAGMSG (typing indicators, reactions)
Commands.set("TAGMSG", (nick, data, msgTags) => {
	if (!data || data.length < 3) return;
	nick = data[0].substring(1).split("!")[0];
	const target = data[2];
	let displayTarget = target;
	if (!target.startsWith('#') && target.toLowerCase() === nickname.toLowerCase()) displayTarget = nick;
	
	if (msgTags && msgTags.has('+typing')) {
		const typingStatus = msgTags.get('+typing');
		writeToLog(`[TYPING] ${nick} → ${displayTarget} = ${typingStatus}`);
		setRemoteTypingState(nick, displayTarget, typingStatus);
	}
	
	if (msgTags && msgTags.has('+react')) {
		const reaction = msgTags.get('+react'), replyTo = msgTags.get('+reply') || '';
		const channel = findChannel(displayTarget) || statusChannel;
		if (channel) writeToScreen("var(--clr-text-dim)", `${nick} 回应了 ${reaction}${replyTo ? ' (msgid:'+replyTo+')' : ''}`, channel, "*");
		writeToLog(`[REACT] ${nick} → ${displayTarget}: ${reaction}`);
	}
});

// BATCH handling with cleanup
Commands.set("BATCH", (nick, data) => {
	if (!data || data.length < 2) return;
	const refStr = data[1] || '';
	if (refStr.startsWith('+')) {
		const ref = refStr.substring(1), type = data[2] ? data[2].toUpperCase() : '';
		const params = data.slice(3).map(p => p.replace(/^:/, ''));
		
		// Set cleanup timer
		const timer = setTimeout(() => {
			if (batchBuffer.has(ref)) {
				writeToLog(`[BATCH] Timeout cleanup for ref=${ref}`);
				batchBuffer.delete(ref);
				batchCleanupTimers.delete(ref);
			}
		}, 60000);
		
		batchBuffer.set(ref, { type, params, messages: [] });
		batchCleanupTimers.set(ref, timer);
		writeToLog(`[BATCH] Start: ref=${ref} type=${type}`);
	} else if (refStr.startsWith('-')) {
		const ref = refStr.substring(1), batch = batchBuffer.get(ref);
		if (!batch) return;
		
		// Clear cleanup timer
		if (batchCleanupTimers.has(ref)) {
			clearTimeout(batchCleanupTimers.get(ref));
			batchCleanupTimers.delete(ref);
		}
		
		batchBuffer.delete(ref);
		writeToLog(`[BATCH] End: ref=${ref} msgs=${batch.messages.length}`);
		processBatch(ref, batch);
	}
});

function processBatch(ref, batch) {
	if (batch.type === 'CHATHISTORY' || batch.type === 'chathistory') {
		const channelName = batch.params[0] || '', ch = findChannel(channelName);
		if (ch) writeToScreen("var(--clr-text-dim)", `── 历史消息 (${batch.messages.length}条) ──`, ch, "*");
		for (const msg of batch.messages) processLine(msg);
	} else {
		for (const msg of batch.messages) processLine(msg);
	}
}

Commands.set("FAIL", (nick, data) => { // Error responses

// Typing indicators
function sendTypingStatus(status, target) {
	if (!ircv3MessageTags || !isConnected || !target || target === 'Status') return;
	doSend(`@+typing=${status} TAGMSG ${target}\r\n`);
	writeToLog(`[TYPING] Sent: ${target} = ${status}`);
}

function handleTypingInput() {
	if (!ircv3MessageTags || !activeChannel || activeChannel.name === 'Status') return;
	const target = activeChannel.name, now = Date.now();
	if (now - typingLastSent >= TYPING_THROTTLE_MS) {
		sendTypingStatus('active', target);
		typingLastSent = now;
	}
	if (typingInputTimer) clearTimeout(typingInputTimer);
	typingInputTimer = setTimeout(() => {
		if (input && input.value.trim().length > 0) sendTypingStatus('paused', target);
		typingInputTimer = null;
	}, TYPING_PAUSE_DELAY);
}

function sendTypingDone(target) {
	if (!ircv3MessageTags || !target || target === 'Status') return;
	if (typingInputTimer) { clearTimeout(typingInputTimer); typingInputTimer = null; }
	typingLastSent = 0;
	sendTypingStatus('done', target);
}

function updateTypingIndicatorUI(target) {
	const el = document.getElementById('typingIndicator');
	if (!el) return;
	const channelTyping = remoteTypingState.get(target);
	if (!channelTyping || channelTyping.size === 0) {
		el.textContent = '';
		return;
	}
	const activeTypers = [];
	channelTyping.forEach((state, nick) => {
		if (state.status === 'active' || state.status === 'paused') activeTypers.push(nick);
	});
	if (activeTypers.length === 0) el.textContent = '';
	else if (activeTypers.length === 1) el.textContent = `✎ ${activeTypers[0]} 正在输入...`;
	else if (activeTypers.length <= 3) el.textContent = `✎ ${activeTypers.join('、')} 正在输入...`;
	else el.textContent = `✎ ${activeTypers.length} 人正在输入...`;
}

function setRemoteTypingState(nick, target, status) {
	if (!remoteTypingState.has(target)) remoteTypingState.set(target, new Map());
	const channelTyping = remoteTypingState.get(target);
	if (channelTyping.has(nick)) {
		const prev = channelTyping.get(nick);
		if (prev.timer) clearTimeout(prev.timer);
	}
	if (status === 'done') {
		channelTyping.delete(nick);
	} else {
		const timeoutMs = status === 'active' ? 6000 : 30000;
		const timer = setTimeout(() => {
			const ct = remoteTypingState.get(target);
			if (ct) { ct.delete(nick); updateTypingIndicatorUI(target); }
		}, timeoutMs);
		channelTyping.set(nick, { status, timer });
	}
	if (activeChannel && activeChannel.name === target) updateTypingIndicatorUI(target);
}

// IRCv3 advanced features
function doSendLabeled(message, description) {
	if (!ircv3LabeledResponse) {
		doSend(message);
		return null;
	}
	const label = 'lbl' + (++labelCounter);
	pendingLabels.set(label, { description: description || message.trim(), ts: Date.now() });
	const tagged = `@label=${label} ${message}`;
	doSend(tagged.endsWith('\r\n') ? tagged : tagged + '\r\n');
	writeToLog(`[LABELED] Sent label=${label}`);
	setTimeout(() => {
		if (pendingLabels.has(label)) {
			pendingLabels.delete(label);
			writeToLog(`[LABELED] Label ${label} timed out`);
		}
	}, 30000);
	return label;
}

function requestChatHistory(channelName, limit) {
	if (!ircv3ChatHistory) return;
	limit = limit || 50;
	doSend(`CHATHISTORY LATEST ${channelName} * ${limit}\r\n`);
	writeToLog(`[CHATHISTORY] Requesting last ${limit} messages for ${channelName}`);
}

function requestWho(channelName) {
	if (!isConnected) return;
	if (ircv3Whox) {
		doSend(`WHO ${channelName} %tunhfa,1\r\n`);
		writeToLog(`[WHOX] Requesting WHO for ${channelName}`);
	} else {
		doSend(`WHO ${channelName}\r\n`);
		writeToLog(`[IRC] Requesting WHO for ${channelName}`);
	}
}

function sendWithReply(replyToMsgid, targetChannel, text) {
	if (!replyToMsgid || !ircv3MessageTags) {
		const msgs = splitIRCMessage('PRIVMSG ' + targetChannel + ' :' + text);
		msgs.forEach(m => doSend(m));
		return;
	}
	const msgs = splitIRCMessage('PRIVMSG ' + targetChannel + ' :' + text);
	msgs.forEach((m, idx) => {
		if (idx === 0) doSend(`@+reply=${replyToMsgid} ${m.trim()}\r\n`);
		else doSend(m);
	});
	writeToLog(`[REPLY] Sent reply to msgid=${replyToMsgid}`);
}

// Keep-alive
function startKeepAlive() {
	stopKeepAlive();
	keepAliveTimer = setInterval(() => {
		if (isConnected && websocket && websocket.readyState === WebSocket.OPEN) {
			writeToLog(`[KEEP-ALIVE] PING | session: ${formatSessionDuration(sessionStartTime)} | sent: ${sentCount} | recv: ${recvCount}`);
			doSend("PING :" + wsUrl);
		}
	}, keepAliveInterval);
}

function stopKeepAlive() {
	if (keepAliveTimer) {
		clearInterval(keepAliveTimer);
		keepAliveTimer = null;
	}
}

function formatSessionDuration(startTime) {
	if (!startTime) return 'N/A';
	const secs = Math.floor((Date.now() - startTime.getTime()) / 1000);
	const h = Math.floor(secs / 3600), m = Math.floor((secs % 3600) / 60), s = secs % 60;
	if (h > 0) return `${h}h ${m}m ${s}s`;
	if (m > 0) return `${m}m ${s}s`;
	return `${s}s`;
}

function sendRegistration() {
	doSend("NICK " + nickname);
	doSend("USER websocket * * :WebSocket User");
	writeToLog(`[IRC] Registration: NICK=${nickname}`);
}

// Input focus management
function handleInputBlur() {
	if (inputBlurTimeoutId !== null) clearTimeout(inputBlurTimeoutId);
	inputBlurTimeoutId = setTimeout(() => {
		const active = document.activeElement;
		if (active && active !== input && active !== document.body) return;
		const settingsPanel = document.getElementById('settingsPanel');
		if (settingsPanel && settingsPanel.classList.contains('open')) return;
		const menuDropdown = document.getElementById('headerMenuDropdown');
		if (menuDropdown && menuDropdown.classList.contains('visible')) return;
		if (isConnected && document.hasFocus()) input.focus();
	}, 300); // Increased delay to reduce aggression
}

function removeInputBlurListener() {
	if (input) input.removeEventListener('blur', handleInputBlur);
}

function cleanupEventListeners() {
	removeInputBlurListener();
	if (headerMenuClickListener) {
		document.removeEventListener('click', headerMenuClickListener);
		headerMenuClickListener = null;
	}
	const menu = document.getElementById('headerMenuDropdown');
	if (menu && menu.classList.contains('menu-attached')) {
		menu.classList.remove('visible');
		menu.classList.remove('menu-attached');
		document.removeEventListener('click', closeHeaderMenuOnClickOutside);
	}
}

// Send message handler
function send() {
	let text = input ? input.value.trim() : "";
	if (!text || !activeChannel) return;
	if (!isConnected) {
		writeToScreen("var(--clr-warning)", "未连接，无法发送消息", activeChannel || statusChannel, "*");
		return;
	}
	
	if (text[0] === "/") {
		// Command handling
		if (text.indexOf("/me ") === 0) {
			if (activeChannel.name === "Status") {
				writeToScreen("var(--clr-warning)", "Status 是系统状态窗口，无法发送消息。", activeChannel, "*");
				if (input) { input.value = ""; updateCharCount(); }
				return;
			}
			const actionText = text.substring(4);
			const messages = splitIRCMessage("PRIVMSG " + activeChannel.name + " :\x01ACTION " + actionText + "\x01");
			messages.forEach(msg => doSend(msg));
			if (!ircv3EchoMessage) writeToScreen("var(--clr-red)", `${nickname} ${actionText}`, activeChannel, "*");
			pushHistory(text);
		} else if (text.indexOf("/msg ") === 0) {
			const parts = text.substring(5).split(' ');
			if (parts.length >= 2) {
				const targetNick = parts[0], msgText = parts.slice(1).join(' ');
				let pmChannel = findChannel(targetNick);
				if (!pmChannel) {
					pmChannel = new Tab_Create(targetNick, `与 ${targetNick} 的私聊`, false);
					pmChannel.isPrivate = true;
					if (pmChannel.button) pmChannel.button.classList.add('private');
				}
				Tab_Show(targetNick);
				const messages = splitIRCMessage("PRIVMSG " + targetNick + " :" + msgText);
				messages.forEach((msg, index) => {
					doSend(msg);
					if (!ircv3EchoMessage && index === 0) writeToScreen("var(--clr-font)", msgText, pmChannel, nickname);
				});
				writeToLog(`[PM] You → ${targetNick}: ${msgText}`);
				pushHistory(text);
			} else writeToScreen("var(--clr-warning)", "用法: /msg <昵称> <消息>", activeChannel, "*");
		} else if (text.indexOf("/away") === 0) {
			const awayMsg = text.substring(5).trim();
			if (awayMsg) {
				doSend("AWAY :" + awayMsg + "\r\n");
				writeToScreen("var(--clr-warning)", `已设置离开状态: ${awayMsg}`, activeChannel, "*");
			} else {
				doSend("AWAY\r\n");
				writeToScreen("var(--clr-info)", `已取消离开状态`, activeChannel, "*");
			}
			pushHistory(text);
		} else if (text.indexOf("/whois ") === 0) {
			const whoisNick = text.substring(7).trim();
			if (whoisNick) {
				doSend("WHOIS " + whoisNick + "\r\n");
				writeToScreen("var(--clr-info)", `正在查询: ${whoisNick}`, activeChannel, "*");
			} else writeToScreen("var(--clr-warning)", "用法: /whois <昵称>", activeChannel, "*");
			pushHistory(text);
		} else if (text.indexOf("/list") === 0) {
			const listFilter = text.substring(5).trim();
			doSend(listFilter ? `LIST ${listFilter}\r\n` : "LIST\r\n");
			writeToScreen("var(--clr-info)", `正在获取频道列表...`, statusChannel, "*");
			pushHistory(text);
		} else if (text.indexOf("/nick ") === 0) {
			const newNick = text.substring(6).trim();
			if (newNick && validateNickname(newNick)) doSend("NICK " + newNick + "\r\n");
			else writeToScreen("var(--clr-warning)", "用法: /nick <新昵称>", activeChannel, "*");
			pushHistory(text);
		} else if (text.indexOf("/topic") === 0) {
			const topicText = text.substring(6).trim();
			const topicTarget = activeChannel.name !== 'Status' ? activeChannel.name : null;
			if (!topicTarget) writeToScreen("var(--clr-warning)", "请在频道窗口中使用 /topic", activeChannel, "*");
			else if (topicText) doSend(`TOPIC ${topicTarget} :${topicText}\r\n`);
			else {
				doSend(`TOPIC ${topicTarget}\r\n`);
				writeToScreen("var(--clr-info)", `正在查询 ${topicTarget} 的主题...`, activeChannel, "*");
			}
			pushHistory(text);
		} else if (text.indexOf("/kick ") === 0) {
			const kickParts = text.substring(6).split(' ');
			const kickNick = kickParts[0], kickReason = kickParts.slice(1).join(' ') || '无原因';
			const kickChannel = activeChannel.name;
			if (kickChannel.startsWith('#') && kickNick) doSend(`KICK ${kickChannel} ${kickNick} :${kickReason}\r\n`);
			else writeToScreen("var(--clr-warning)", "用法: /kick <昵称> [原因]", activeChannel, "*");
			pushHistory(text);
		} else if (text.indexOf("/mode ") === 0) {
			const modeArgs = text.substring(6).trim();
			doSend(`MODE ${modeArgs}\r\n`);
			writeToScreen("var(--clr-info)", `发送: MODE ${modeArgs}`, activeChannel, "*");
			pushHistory(text);
		} else if (text.indexOf("/join ") === 0) {
			let joinTarget = text.substring(6).trim();
			if (joinTarget && !joinTarget.startsWith('#')) joinTarget = '#' + joinTarget;
			if (joinTarget) doSend("JOIN " + joinTarget + "\r\n");
			else writeToScreen("var(--clr-warning)", "用法: /join <#频道名>", activeChannel, "*");
			pushHistory(text);
		} else if (text.indexOf("/part") === 0) {
			const partArgs = text.substring(5).trim();
			const partTarget = partArgs.startsWith('#') ? partArgs.split(' ')[0] : activeChannel.name;
			const partMsg = partArgs.startsWith('#') ? partArgs.substring(partTarget.length).trim() : partArgs;
			if (partTarget && partTarget.startsWith('#')) doSend(`PART ${partTarget}${partMsg ? ' :' + partMsg : ''}\r\n`);
			else writeToScreen("var(--clr-warning)", "请在频道窗口中使用 /part", activeChannel, "*");
			pushHistory(text);
		} else if (text.indexOf("/quit") === 0) {
			const quitMsg = text.substring(5).trim() || 'Bye!';
			doSend(`QUIT :${quitMsg}\r\n`);
			pushHistory(text);
		} else if (text.indexOf("/monitor ") === 0) {
			const monArgs = text.substring(9).trim();
			doSend(`MONITOR ${monArgs}\r\n`);
			writeToScreen("var(--clr-info)", `MONITOR: ${monArgs}`, activeChannel, "*");
			pushHistory(text);
		} else if (text.indexOf("/invite ") === 0) {
			const invArgs = text.substring(8).trim().split(' ');
			const invNick = invArgs[0], invChannel = invArgs[1] || (activeChannel && activeChannel.name !== 'Status' ? activeChannel.name : '');
			if (invNick && invChannel) {
				doSend(`INVITE ${invNick} ${invChannel}\r\n`);
				writeToScreen("var(--clr-info)", `向 ${invNick} 发送邀请加入 ${invChannel}...`, activeChannel, "*");
			} else writeToScreen("var(--clr-warning)", "用法: /invite <昵称> [#频道]", activeChannel, "*");
			pushHistory(text);
		} else if (text.indexOf("/chathistory") === 0) {
			const chArgs = text.substring(12).trim().split(' ');
			let chTarget = chArgs[0], chCount = parseInt(chArgs[1]) || 50;
			if (!chTarget && activeChannel && activeChannel.name !== 'Status') chTarget = activeChannel.name;
			if (chTarget) {
				requestChatHistory(chTarget, chCount);
				writeToScreen("var(--clr-info)", `正在拉取 ${chTarget} 的历史消息 (${chCount}条)...`, activeChannel, "*");
			} else writeToScreen("var(--clr-warning)", "用法: /chathistory [#频道] [数量]", activeChannel, "*");
			pushHistory(text);
		} else if (text === "/caps") {
			writeToScreen("var(--clr-info)", `已启用的 IRCv3 能力: ${[...ircv3ActiveCaps].join(', ') || '(无)'}`, activeChannel, "*");
		} else if (text === "/help") {
			const helpMsg = [
				"== 可用命令 ==",
				"/me <动作> — 发送动作消息",
				"/msg <nick> <消息> — 私聊消息",
				"/away [原因] — 设置/取消离开状态",
				"/whois <nick> — 查询用户信息",
				"/nick <新昵称> — 更改昵称",
				"/join <#频道> — 加入频道",
				"/part [#频道] — 离开当前或指定频道",
				"/topic [主题] — 查询或设置频道主题",
				"/kick <nick> [原因] — 踢出用户",
				"/mode <参数> — 设置模式",
				"/list [过滤] — 获取频道列表",
				"/invite <nick> [#频道] — 邀请用户加入频道",
				"/monitor + nick — 监控用户上下线",
				"/monitor - nick — 取消监控",
				"/monitor l — 查看监控列表",
				"/chathistory [#频道] [数量] — 拉取历史消息",
				"/caps — 查看已启用的 IRCv3 能力",
				"/quit [消息] — 退出 IRC",
			].join('<br>');
			writeToScreen("var(--clr-info)", helpMsg, activeChannel, "*");
		} else {
			writeToScreen("var(--clr-font)", text, activeChannel, "");
			const messages = splitIRCMessage(text.substring(1));
			messages.forEach(msg => doSend(msg));
			pushHistory(text);
		}
	} else {
		// Regular message
		const target = activeChannel.name;
		if (target === "Status") {
			writeToScreen("var(--clr-warning)", "Status 是系统状态窗口，无法发送消息。请使用 /join #频道 加入频道，或使用 /msg 昵称 内容 与用户私聊。", activeChannel, "*");
			if (input) { input.value = ""; updateCharCount(); }
			return;
		}
		const messages = splitIRCMessage("PRIVMSG " + target + " :" + text);
		messages.forEach((msg, index) => {
			doSend(msg);
			if (!ircv3EchoMessage && index === 0) writeToScreen("var(--clr-font)", text, activeChannel, nickname);
		});
		if (activeChannel.isPrivate) writeToLog(`[PM] You → ${target}: ${text}`);
		pushHistory(text);
	}
	if (input) {
		if (activeChannel && activeChannel.name !== 'Status') sendTypingDone(activeChannel.name);
		input.value = "";
		updateCharCount();
	}
}

// Initialization
function onLoad() {
	channels = document.getElementById("channelsContainer");
	channelContents = document.getElementById("channelContents");
	contentsWrapper = document.getElementById("contentsWrapper");
	emptyState = document.getElementById("emptyState");
	input = document.getElementById("input");
	
	loadSettings();
	
	let url = new URL(document.location);
	if (url.hash) {
		const safeHash = url.hash.replace(/[^\w#&\-]/g, '').substring(0, 64);
		if (safeHash) document.getElementById('channelInput').value = safeHash;
	}
	if (window.frameElement) {
		const captionEl = document.getElementById("caption");
		if (captionEl) captionEl.style.display = "none";
	}
	updateConnectionStatus('disconnected');
	if (input) input.addEventListener('blur', handleInputBlur);
}

window.addEventListener("load", onLoad, false);
window.addEventListener('beforeunload', () => {
	cleanupEventListeners();
	stopKeepAlive();
	if (inputBlurTimeoutId !== null) clearTimeout(inputBlurTimeoutId);
	if (connectTimeout !== null) {
		clearTimeout(connectTimeout);
		connectTimeout = null;
	}
	// Cleanup batch timers
	batchCleanupTimers.forEach(timer => clearTimeout(timer));
	batchCleanupTimers.clear();
	if (websocket) {
		websocket.onclose = null;
		websocket.onerror = null;
		websocket.onopen = null;
		websocket.onmessage = null;
		if (websocket.readyState === WebSocket.OPEN) websocket.close(1000, "Page unload");
	}
});

// Expose functions to window
window.toggleConnection = toggleConnection;
window.toggleHeaderMenu = toggleHeaderMenu;
window.toggleSettings = toggleSettings;
window.toggleLog = toggleLog;
window.clearLog = clearLog;
window.showPrivateChatList = showPrivateChatList;
window.showSSLWarning = showSSLWarning;
window.toggleAutoReconnect = toggleAutoReconnect;
window.joinChannel = joinChannel;
window.send = send;
window.onKeyDown = onKeyDown;
window.updateCharCount = updateCharCount;
window.openPrivateChat = openPrivateChat;
window.handleTypingInput = handleTypingInput;
window.sendWithReply = sendWithReply;
window.doSendLabeled = doSendLabeled;
window.requestChatHistory = requestChatHistory;
window.requestWho = requestWho;

})();
</script>
