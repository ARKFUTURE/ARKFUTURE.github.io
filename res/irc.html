<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8" version="1.7">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<meta name="description" content="ARKFUTURE-NET IRC">
	<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
	<meta http-equiv="Pragma" content="no-cache">
	<meta http-equiv="Expires" content="0">
	<title>IRC Web Client</title>
	<style>
	/* ── Variables ─────────────────────────────────────── */
	:root {
		--cyber-primary:   #00f0ff;
		--cyber-secondary: #ff00ff;
		--cyber-accent:    #ffff00;
		--cyber-green:     #00ff00;
		--cyber-red:       #ff0040;
		--cyber-dark:      #0a0a0a;
		--cyber-dark2:     #111111;
		--cyber-dark3:     #1a1a1a;
		--cyber-border:    #333333;
		--cyber-text:      #e0e0e0;
		--cyber-text-dim:  #888888;

		--glow-primary:   0 0 10px #00f0ff, 0 0 20px #00f0ff40, 0 0 30px #00f0ff20;
		--glow-secondary: 0 0 10px #ff00ff, 0 0 20px #ff00ff40, 0 0 30px #ff00ff20;
		--glow-red:       0 0 10px #ff0040, 0 0 20px #ff004040;

		--sp-xs: 4px;
		--sp-sm: 8px;
		--sp-md: 12px;
		--sp-lg: 16px;

		--transition: all 0.15s ease-out;
		--font-mono: 'Courier New', 'Consolas', 'Monaco', monospace;

		/* semantic colour aliases used by JS writeToScreen() */
		--clr-font:    var(--cyber-text);
		--clr-info:    var(--cyber-primary);
		--clr-success: var(--cyber-green);
		--clr-warning: var(--cyber-accent);
		--clr-error:   var(--cyber-red);
		--clr-red:     var(--cyber-red);
		--clr-green:   var(--cyber-green);
		--clr-blue:    var(--cyber-primary);
		--clr-purple:  var(--cyber-secondary);
		--clr-gold:    var(--cyber-accent);
		--clr-brown:   #cd853f;
		--clr-accent:     var(--cyber-accent);
		--clr-secondary:  var(--cyber-secondary);
	}

	/* ── Reset ─────────────────────────────────────────── */
	*, *::before, *::after {
		box-sizing: border-box;
		margin: 0;
		padding: 0;
		user-select: text !important;
		-webkit-user-select: text !important;
		scrollbar-width: thin;
		scrollbar-color: var(--cyber-border) var(--cyber-dark2);
	}

	::-webkit-scrollbar { width: 6px; height: 6px; }
	::-webkit-scrollbar-track { background: var(--cyber-dark2); }
	::-webkit-scrollbar-thumb { background: var(--cyber-border); }
	::-webkit-scrollbar-thumb:hover { background: var(--cyber-primary); box-shadow: var(--glow-primary); }

	html, body {
		height: 100%;
		overflow: hidden;
		font-family: var(--font-mono);
		font-size: 13px;
		line-height: 1.5;
		background-color: var(--cyber-dark);
		color: var(--cyber-text);
	}

	/* ── App shell ─────────────────────────────────────── */
	.irc-app {
		display: flex;
		flex-direction: column;
		height: 100vh;
		overflow: hidden;
	}

	/* ── Header ────────────────────────────────────────── */
	.irc-header {
		flex: 0 0 auto;
		display: flex;
		justify-content: space-between;
		align-items: center;
		padding: var(--sp-sm) var(--sp-lg);
		background: var(--cyber-dark2);
		border-bottom: 1px solid var(--cyber-border);
	}

	.irc-header__title {
		font-size: 16px;
		font-weight: 600;
		color: var(--cyber-primary);
		text-transform: uppercase;
		letter-spacing: 2px;
		text-shadow: var(--glow-primary);
	}

	/* ── Header dropdown menu ──────────────────────────── */
	.irc-menu {
		position: relative;
	}

	.irc-menu__btn {
		background: transparent;
		color: var(--cyber-primary);
		border: none;
		padding: var(--sp-sm) var(--sp-md);
		cursor: pointer;
		font-size: 11px;
		font-family: var(--font-mono);
		text-transform: uppercase;
		letter-spacing: 1px;
		transition: var(--transition);
	}
	.irc-menu__btn:hover {
		color: var(--cyber-secondary);
		text-shadow: var(--glow-secondary);
	}

	.irc-menu__dropdown {
		display: none;
		position: absolute;
		top: calc(100% + 5px);
		right: 0;
		min-width: 150px;
		background: var(--cyber-dark2);
		border: 1px solid var(--cyber-border);
		box-shadow: 0 0 30px rgba(0, 240, 255, 0.1);
		z-index: 9999;
	}
	.irc-menu__dropdown::before {
		content: '';
		position: absolute;
		top: -6px; right: 10px;
		width: 10px; height: 10px;
		background: var(--cyber-dark2);
		border: 1px solid var(--cyber-border);
		border-bottom: none; border-right: none;
		transform: rotate(45deg);
	}
	.irc-menu__dropdown.visible { display: block; }

	/* keep class names aligned with JS: .header-menu-item */
	.header-menu-item {
		padding: var(--sp-sm) var(--sp-md);
		cursor: pointer;
		font-size: 11px;
		font-family: var(--font-mono);
		text-transform: uppercase;
		letter-spacing: 0.5px;
		color: var(--cyber-text);
		border-bottom: 1px solid var(--cyber-dark3);
		transition: var(--transition);
	}
	.header-menu-item:last-child { border-bottom: none; }
	.header-menu-item:hover {
		background: var(--cyber-primary);
		color: var(--cyber-dark);
		box-shadow: var(--glow-primary);
	}
	.header-menu-item.active {
		background: var(--cyber-green);
		color: var(--cyber-dark);
	}

	/* ── Settings bar ──────────────────────────────────── */
	.irc-settings {
		flex: 0 0 auto;
		display: flex;
		flex-wrap: wrap;
		gap: var(--sp-md);
		padding: var(--sp-md) var(--sp-lg);
		background: var(--cyber-dark2);
		border-bottom: 1px solid var(--cyber-border);
		align-items: center;
	}

	.irc-settings__inputs {
		display: flex;
		flex-wrap: wrap;
		gap: var(--sp-md);
		align-items: center;
		flex: 1;
		min-width: 0;
	}

	.irc-settings__actions {
		display: flex;
		gap: var(--sp-md);
		align-items: center;
		flex: 0 0 auto;
	}

	/* field group */
	.settings-group {
		display: flex;
		flex-direction: column;
		gap: var(--sp-xs);
		flex: 0 0 auto;
		min-width: 140px;
		max-width: 250px;
	}
	.settings-group label {
		font-size: 10px;
		color: var(--cyber-text-dim);
		text-transform: uppercase;
		letter-spacing: 1px;
		white-space: nowrap;
	}
	.settings-group input[type="text"],
	.settings-group input[type="password"] {
		padding: var(--sp-sm) var(--sp-md);
		background: var(--cyber-dark);
		color: var(--cyber-text);
		border: 1px solid var(--cyber-border);
		font-size: 12px;
		font-family: var(--font-mono);
		min-width: 140px;
		max-width: 200px;
		transition: var(--transition);
	}
	.settings-group input[type="text"]:focus,
	.settings-group input[type="password"]:focus {
		outline: none;
		border-color: var(--cyber-primary);
		box-shadow: var(--glow-primary);
	}

	/* channel row: input + join btn side by side */
	.settings-group__row {
		display: flex;
		gap: var(--sp-xs);
		align-items: center;
	}
	.settings-group__row input {
		flex: 1;
		min-width: 0;
	}

	/* ── Buttons ───────────────────────────────────────── */
	.btn {
		padding: var(--sp-sm) var(--sp-lg);
		background: transparent;
		color: var(--cyber-primary);
		border: 1px solid var(--cyber-primary);
		cursor: pointer;
		font-size: 11px;
		font-family: var(--font-mono);
		white-space: nowrap;
		text-transform: uppercase;
		letter-spacing: 1px;
		transition: var(--transition);
	}
	.btn:hover {
		background: var(--cyber-primary);
		color: var(--cyber-dark);
		box-shadow: var(--glow-primary);
	}
	.btn:disabled {
		border-color: var(--cyber-border);
		color: var(--cyber-text-dim);
		cursor: not-allowed;
	}
	.btn:disabled:hover { background: transparent; box-shadow: none; }

	.connect-btn { border-color: var(--cyber-green); color: var(--cyber-green); }
	.connect-btn:hover { background: var(--cyber-green); box-shadow: 0 0 10px #00ff00, 0 0 20px #00ff0040; }
	.connect-btn.disconnect { border-color: var(--cyber-red); color: var(--cyber-red); }
	.connect-btn.disconnect:hover { background: var(--cyber-red); box-shadow: var(--glow-red); }

	.send-btn {
		padding: var(--sp-sm) var(--sp-lg);
		background: var(--cyber-primary);
		color: var(--cyber-dark);
		border: 1px solid var(--cyber-primary);
		cursor: pointer;
		font-size: 11px;
		font-family: var(--font-mono);
		white-space: nowrap;
		text-transform: uppercase;
		letter-spacing: 1px;
		min-width: 60px;
		transition: var(--transition);
	}
	.send-btn:hover { background: var(--cyber-secondary); border-color: var(--cyber-secondary); box-shadow: var(--glow-secondary); }
	.send-btn:disabled { background: var(--cyber-dark); border-color: var(--cyber-border); color: var(--cyber-text-dim); cursor: not-allowed; }

	/* ── Connection status badge ───────────────────────── */
	.connection-status {
		display: inline-flex;
		align-items: center;
		gap: var(--sp-sm);
		padding: var(--sp-sm) var(--sp-lg);
		background: var(--cyber-dark3);
		border: 1px solid var(--cyber-border);
		font-size: 10px;
		text-transform: uppercase;
		letter-spacing: 1px;
		min-height: 32px;
		flex: 0 0 auto;
		transition: var(--transition);
	}
	.connection-status .indicator {
		width: 8px; height: 8px;
		border-radius: 50%;
		background: var(--cyber-border);
		transition: var(--transition);
	}
	.connection-status.connected  { border-color: var(--cyber-green);  color: var(--cyber-green);  box-shadow: 0 0 10px #00ff0040; }
	.connection-status.connecting { border-color: var(--cyber-accent);  color: var(--cyber-accent); animation: pulse 1s ease-in-out infinite; }
	.connection-status.disconnected { border-color: var(--cyber-red);   color: var(--cyber-red); }
	.connection-status.connected  .indicator { background: var(--cyber-green);  box-shadow: 0 0 10px #00ff00; }
	.connection-status.connecting .indicator { background: var(--cyber-accent); box-shadow: 0 0 10px #ffff00; animation: pulse 1s ease-in-out infinite; }
	.connection-status.disconnected .indicator { background: var(--cyber-red);  box-shadow: 0 0 10px #ff0040; }

	@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

	/* ── SSL warning toast ─────────────────────────────── */
	.ssl-warning {
		display: none;
		position: fixed;
		bottom: 20px; right: 20px;
		max-width: 380px;
		background: var(--cyber-dark2);
		border: 1px solid var(--cyber-accent);
		color: var(--cyber-text);
		padding: var(--sp-md);
		font-size: 12px;
		line-height: 1.4;
		z-index: 9000;
		box-shadow: 0 0 20px rgba(255, 255, 0, 0.2);
	}
	.ssl-warning.visible { display: block; }
	.ssl-warning a { color: var(--cyber-primary); text-decoration: underline; cursor: pointer; }
	.ssl-warning code { background: var(--cyber-dark3); padding: 2px 4px; border: 1px solid var(--cyber-border); font-family: var(--font-mono); }

	/* ── Chat area (fills remaining height) ────────────── */
	.irc-chat {
		flex: 1 1 auto;
		display: flex;
		flex-direction: column;
		overflow: hidden;
		position: relative;
		min-height: 0;
	}

	/* ── Log overlay ───────────────────────────────────── */
	.log-container {
		display: none;
		position: absolute;
		inset: 0;
		flex-direction: column;
		background: var(--cyber-dark2);
		border-bottom: 1px solid var(--cyber-primary);
		box-shadow: 0 0 30px rgba(0, 240, 255, 0.15);
		z-index: 100;
	}
	.log-container.visible { display: flex; }

	.log-header {
		flex: 0 0 auto;
		display: flex;
		justify-content: space-between;
		align-items: center;
		padding: var(--sp-sm) var(--sp-md);
		background: var(--cyber-dark3);
		border-bottom: 1px solid var(--cyber-border);
		font-size: 11px;
		text-transform: uppercase;
		letter-spacing: 1px;
		color: var(--cyber-primary);
		min-height: 30px;
	}
	.log-controls { display: flex; gap: var(--sp-xs); }
	.log-controls button {
		padding: 3px 8px;
		background: transparent;
		border: 1px solid var(--cyber-border);
		color: var(--cyber-text-dim);
		cursor: pointer;
		font-size: 10px;
		font-family: var(--font-mono);
		text-transform: uppercase;
		letter-spacing: 0.5px;
		transition: var(--transition);
	}
	.log-controls button:hover {
		border-color: var(--cyber-primary);
		color: var(--cyber-primary);
		box-shadow: var(--glow-primary);
	}

	#logOutput {
		flex: 1 1 auto;
		overflow-y: auto;
		padding: var(--sp-sm);
		font-size: 11px;
		font-family: var(--font-mono);
		background: var(--cyber-dark3);
		color: var(--cyber-text);
		word-wrap: break-word;
		line-height: 1.5;
	}
	#logOutput span {
		display: block;
		white-space: pre-wrap;
	}
	#logOutput:empty::before { content: '[ NO DATA ]'; color: var(--cyber-text-dim); }

	/* ── Tab bar ───────────────────────────────────────── */
	.channels {
		flex: 0 0 auto;
		display: flex;
		align-items: center;
		gap: var(--sp-sm);
		padding: var(--sp-xs) var(--sp-sm);
		background: var(--cyber-dark2);
		border-bottom: 1px solid var(--cyber-border);
		overflow-x: auto;
		flex-wrap: nowrap;
	}
	.channels::-webkit-scrollbar { height: 3px; }

	.channel {
		display: inline-flex;
		align-items: center;
		gap: var(--sp-xs);
		padding: var(--sp-xs) var(--sp-md);
		background: var(--cyber-dark3);
		border: 1px solid var(--cyber-border);
		cursor: pointer;
		font-size: 11px;
		font-family: var(--font-mono);
		text-transform: uppercase;
		letter-spacing: 0.5px;
		white-space: nowrap;
		position: relative;
		transition: var(--transition);
	}
	.channel:hover { border-color: var(--cyber-primary); }
	.channel.active {
		background: var(--cyber-primary);
		color: var(--cyber-dark);
		border-color: var(--cyber-primary);
		box-shadow: var(--glow-primary);
	}
	.channel .unread-badge {
		position: absolute;
		top: -4px; right: -4px;
		background: var(--cyber-red);
		color: var(--cyber-dark);
		font-size: 9px;
		font-weight: 700;
		padding: 1px 4px;
		min-width: 14px;
		text-align: center;
		box-shadow: var(--glow-red);
	}
	.channel button.x {
		background: none;
		border: none;
		color: inherit;
		cursor: pointer;
		padding: 2px 4px;
		font-size: 12px;
		font-weight: bold;
		line-height: 1;
		opacity: 0.7;
		transition: var(--transition);
	}
	.channel button.x:hover { opacity: 1; }
	.channel:not(.active) button.x { opacity: 0; }
	.channel:not(.active):hover button.x { opacity: 0.5; }

	/* ── Channel contents wrapper ──────────────────────── */
	.channelcontents-wrapper {
		flex: 1 1 auto;
		display: flex;
		overflow: hidden;
		min-height: 0;
	}
	.channelcontents-wrapper.hidden { display: none; }
	.channelcontents-wrapper.visible { display: flex; }

	.channelcontents {
		display: flex;
		flex-direction: row;
		width: 100%;
		height: 100%;
		min-height: 0;
	}

	/* ── Single channel pane ───────────────────────────── */
	.channelcontent {
		display: none;
		flex: 1 1 auto;
		flex-direction: row;
		min-height: 0;
	}
	.channelcontent.active { display: flex; }

	/*
	 * JS (Tab_Create) creates:
	 *   div.channelcontent
	 *     nav.ch-panel          ← navWrapper  (flex column, message area)
	 *       h3                  ← this.topic
	 *       nav.ch-messages     ← this.content (scrollable messages)
	 *     ul.ch-userlist        ← this.userlist
	 *
	 * We target via descendant selectors from .channelcontent to avoid globals.
	 */

	/* message panel */
	.channelcontent > nav {
		flex: 1 1 auto;
		display: flex;
		flex-direction: column;
		background: var(--cyber-dark3);
		border: 1px solid var(--cyber-border);
		overflow: hidden;
		min-width: 0;
	}

	/* topic bar */
	.channelcontent > nav > h3 {
		flex: 0 0 auto;
		display: flex;
		align-items: center;
		padding: var(--sp-sm) var(--sp-md);
		background: var(--cyber-dark2);
		border-bottom: 1px solid var(--cyber-border);
		font-size: 12px;
		min-height: 35px;
		text-transform: uppercase;
		letter-spacing: 1px;
		color: var(--cyber-primary);
		font-weight: 600;
	}

	/* message scroll area */
	.channelcontent > nav > nav {
		flex: 1 1 auto;
		overflow-y: auto;
		padding: var(--sp-sm) var(--sp-md);
		min-height: 0;
	}

	/* each message line */
	.channelcontent > nav > nav > p {
		margin: 0;
		padding: 2px 0;
		line-height: 1.5;
		word-wrap: break-word;
	}

	/* user list */
	.channelcontent > ul {
		flex: 0 0 200px;
		overflow-y: auto;
		padding: var(--sp-sm);
		list-style: none;
		background: var(--cyber-dark2);
		border-left: 1px solid var(--cyber-border);
		min-height: 0;
	}

	/* user list item */
	.channelcontent > ul > li {
		display: flex;
		align-items: center;
		gap: var(--sp-sm);
		padding: var(--sp-xs) var(--sp-sm);
		margin: 1px 0;
		font-size: 11px;
		cursor: pointer;
		transition: var(--transition);
	}
	.channelcontent > ul > li:hover { background: var(--cyber-dark3); }

	/* prefix column */
	.channelcontent > ul > li > p:first-child {
		width: 18px;
		flex-shrink: 0;
		text-align: center;
		font-weight: bold;
		color: var(--cyber-secondary);
		margin: 0;
		overflow: hidden;
		text-overflow: ellipsis;
		white-space: nowrap;
	}

	/* nick column */
	.channelcontent > ul > li > p:nth-child(2) {
		flex: 1;
		margin: 0;
		color: var(--cyber-text);
		overflow: hidden;
		text-overflow: ellipsis;
		white-space: nowrap;
		cursor: pointer;
	}
	.channelcontent > ul > li > p:nth-child(2):hover {
		color: var(--cyber-primary);
		text-decoration: underline;
	}

	/* ── Empty state ───────────────────────────────────── */
	.empty-state {
		display: flex;
		flex-direction: column;
		align-items: center;
		justify-content: center;
		height: 100%;
		color: var(--cyber-text-dim);
		text-align: center;
		padding: var(--sp-lg);
	}
	.empty-state h3 {
		margin: 0 0 8px;
		font-size: 14px;
		text-transform: uppercase;
		letter-spacing: 1px;
		color: var(--cyber-primary);
	}
	.empty-state p { margin: 0; font-size: 12px; }

	/* ── Input bar ─────────────────────────────────────── */
	.input-container {
		flex: 0 0 auto;
		display: flex;
		align-items: center;
		gap: var(--sp-sm);
		padding: var(--sp-sm);
		background: var(--cyber-dark3);
		border-top: 1px solid var(--cyber-border);
	}

	#input {
		flex: 1;
		padding: var(--sp-sm) var(--sp-md);
		background: var(--cyber-dark);
		color: var(--cyber-text);
		border: 1px solid var(--cyber-border);
		font-size: 13px;
		font-family: var(--font-mono);
		transition: var(--transition);
	}
	#input:focus {
		outline: none;
		border-color: var(--cyber-primary);
		box-shadow: var(--glow-primary);
	}
	#input::placeholder { color: var(--cyber-text-dim); }

	.char-count {
		flex: 0 0 auto;
		padding: var(--sp-xs) var(--sp-sm);
		font-size: 11px;
		font-family: var(--font-mono);
		color: var(--cyber-text-dim);
		background: var(--cyber-dark);
		border: 1px solid var(--cyber-border);
		min-width: 60px;
		text-align: center;
		transition: var(--transition);
	}
	.char-count.warning { color: var(--cyber-accent); border-color: var(--cyber-accent); }
	.char-count.danger  { color: var(--cyber-red);    border-color: var(--cyber-red);    box-shadow: var(--glow-red); }

	/* ── Responsive: tablet ────────────────────────────── */
	@media (max-width: 768px) {
		.irc-settings {
			flex-direction: column;
			gap: var(--sp-sm);
			padding: var(--sp-sm) var(--sp-md);
		}
		.irc-settings__inputs {
			flex-direction: column;
			width: 100%;
		}
		.irc-settings__actions { width: 100%; justify-content: space-between; }
		.settings-group {
			width: 100%;
			min-width: unset;
			max-width: unset;
		}
		.settings-group input[type="text"],
		.settings-group input[type="password"] {
			width: 100%;
			min-width: unset;
			max-width: unset;
		}

		.irc-header__title { font-size: 14px; }
		.irc-menu__btn { font-size: 10px; padding: var(--sp-xs) var(--sp-sm); }

		.connection-status { padding: 4px 8px; font-size: 9px; }
		.connection-status span:last-child { display: none; }

		.irc-chat { padding-bottom: 56px; }
		.input-container {
			position: fixed;
			bottom: 0; left: 0; right: 0;
			z-index: 1000;
			display: flex !important;
		}
		#input { font-size: 16px; }

		.channelcontent { flex-direction: column; }
		.channelcontent > nav { flex: 1 1 0%; overflow-y: auto; min-height: 0; }
		.channelcontent > ul {
			flex: 0 0 auto;
			height: 20vh;
			min-height: 80px;
			border-left: none;
			border-top: 1px solid var(--cyber-border);
		}

		.channel { font-size: 10px; padding: 4px 10px; }
		.channel .unread-badge { top: -3px; right: -3px; font-size: 8px; padding: 1px 4px; min-width: 12px; }
	}

	/* ── Responsive: phone ─────────────────────────────── */
	@media (max-width: 480px) {
		.irc-header__title { font-size: 12px; }
		.channelcontent > ul { flex: 0 0 100px; height: 100px; }
		.log-header { padding: var(--sp-sm); }
		.btn { padding: 6px 10px; font-size: 10px; }
	}

	@media (max-width: 360px) {
		.channel { padding: 3px 6px; }
	}
	</style>
</head>

<body>
	<div class="irc-app">

		<!-- ── Top header ─────────────────────────────── -->
		<header class="irc-header">
			<h1 class="irc-header__title" id="caption">IRC Client</h1>
			<div class="irc-menu">
				<button class="irc-menu__btn header-menu-btn" onclick="toggleHeaderMenu()">菜单</button>
				<div class="irc-menu__dropdown" id="headerMenuDropdown">
					<div class="header-menu-item" onclick="toggleLog()">查看日志</div>
					<div class="header-menu-item" onclick="showPrivateChatList()">私聊列表</div>
					<div class="header-menu-item" onclick="showSSLWarning()">SSL帮助</div>
					<div class="header-menu-item" onclick="toggleAutoReconnect()">自动重连</div>
				</div>
			</div>
		</header>

		<!-- ── Settings / connection bar ─────────────── -->
		<div class="irc-settings">
			<div class="irc-settings__inputs">
				<div class="settings-group">
					<label for="wsUrl">WebSocket</label>
					<input type="text" id="wsUrl" value="wss://irc.arkfuture.top:8097" placeholder="wss://irc.example.com:port/">
				</div>
				<div class="settings-group">
					<label for="nickInput">昵称</label>
					<input type="text" id="nickInput" value="" placeholder="输入昵称">
				</div>
				<div class="settings-group">
					<label for="channelInput">频道</label>
					<div class="settings-group__row">
						<input type="text" id="channelInput" value="#arkfuture_studio" placeholder="#channel">
						<button class="btn" onclick="joinChannel()" id="joinChannelBtn" disabled
							style="padding: var(--sp-xs) var(--sp-sm); font-size: 10px; min-width: 50px;">加入</button>
					</div>
				</div>
				<!-- hidden checkbox; toggled via JS -->
				<input type="checkbox" id="autoReconnect" style="display:none;">
			</div>
			<div class="irc-settings__actions">
				<button class="btn connect-btn" id="connectBtn" onclick="toggleConnection()">连接</button>
				<div class="connection-status disconnected" id="connectionStatus">
					<span class="indicator"></span>
					<span id="statusText">未连接</span>
				</div>
			</div>
		</div>

		<!-- ── SSL warning toast (fixed) ─────────────── -->
		<div class="ssl-warning" id="sslWarning">
			<strong>浏览器无法忽略SSL证书错误!</strong> 请使用以下方案:<br>
			1. 改用 <code>ws://</code> 非加密连接（如果浏览器支持）<br>
			2. 在浏览器中访问 <a id="sslLink" target="_blank">服务器URL</a> 并手动信任证书
		</div>

		<!-- ── Main chat area ─────────────────────────── -->
		<div class="irc-chat">

			<!-- Log overlay (hidden by default) -->
			<div class="log-container" id="logContainer">
				<div class="log-header">
					<span>WebSocket 日志</span>
					<div class="log-controls">
						<button onclick="clearLog()">清空</button>
						<button onclick="toggleLog()">关闭</button>
					</div>
				</div>
				<div id="logOutput"></div>
			</div>

			<!-- Tab bar -->
			<div class="channels" id="channelsContainer"></div>

			<!-- Channel panes -->
			<div class="channelcontents-wrapper hidden" id="contentsWrapper">
				<div class="channelcontents" id="channelContents"></div>
			</div>

			<!-- Empty / welcome state -->
			<div class="empty-state" id="emptyState">
				<h3>欢迎使用 IRC 客户端</h3>
				<p>请先填写服务器信息并点击连接</p>
			</div>

			<!-- Message input -->
			<div class="input-container" id="inputContainer" style="display:none;">
				<input type="text" name="input" id="input" placeholder="输入消息..."
					onkeydown="onKeyDown(event)" oninput="updateCharCount()">
				<button class="btn send-btn" id="sendBtn" onclick="send()">发送</button>
				<div class="char-count" id="charCount">0/512</div>
			</div>

		</div><!-- /.irc-chat -->
	</div><!-- /.irc-app -->
</body>

<script>
	let nickname = "";
	let channelName = "";
	let wsUrl = "";
	let channels, channelContents, contentsWrapper, emptyState, input;
	let channelMap = new Map();
	let activeChannel = null;
	let statusChannel = null;
	let PrefixChars = ["", ""];
	let websocket = null;
	let isConnected = false;
	let autoReconnect = false;
	let reconnectAttempts = 0;
	const maxReconnectAttempts = 5;
	const reconnectDelay = 3000;
	let keepAliveTimer = null;
	const keepAliveInterval = 90000;
	let inputBlurTimeoutId = null;
	let messageHistory = [];
	let historyIndex = -1;
	let isDisconnecting = false;
	let headerMenuClickListener = null;

	// ── Session & message counters ──────────────────────
	let sessionStartTime = null;   // Date when WebSocket onOpen fired
	let sentCount = 0;             // PRIVMSG / raw sends (excluding PING keepalive)
	let recvCount = 0;             // all raw messages received from server

	function findChannel(channelName) {
		if (!channelName) return null;
		const lowerName = channelName.toLowerCase();
		
		let channel = channelMap.get(channelName);
		if (channel) return channel;
		
		for (let [key, value] of channelMap) {
			if (key.toLowerCase() === lowerName) {
				return value;
			}
		}
		return null;
	}

	function onLoad() {
		channels = document.getElementById("channelsContainer");
		channelContents = document.getElementById("channelContents");
		contentsWrapper = document.getElementById("contentsWrapper");
		emptyState = document.getElementById("emptyState");
		input = document.getElementById("input");

		loadSettings();

		let url = new URL(document.location);
		if (url.hash) {
			document.getElementById('channelInput').value = url.hash;
		}
		if (window.frameElement) {
			document.getElementById("caption").style.display = "none";
		}
		updateConnectionStatus('disconnected');

		if (input) {
			input.addEventListener('blur', handleInputBlur);
		}
	}
	
	function cleanupEventListeners() {
		removeInputBlurListener();
		
		if (headerMenuClickListener) {
			document.removeEventListener('click', headerMenuClickListener);
			headerMenuClickListener = null;
		}
		
		const menu = document.getElementById('headerMenuDropdown');
		if (menu && menu.classList.contains('menu-attached')) {
			menu.classList.remove('visible');
			menu.classList.remove('menu-attached');
			document.removeEventListener('click', closeHeaderMenuOnClickOutside);
		}
	}

	function saveSettings() {
		try {
			const settings = {
				wsUrl: document.getElementById('wsUrl').value,
				nickname: document.getElementById('nickInput').value,
				channel: document.getElementById('channelInput').value,
				autoReconnect: document.getElementById('autoReconnect').checked
			};
			localStorage.setItem('ircSettings', JSON.stringify(settings));
		} catch (e) {
			writeToLog(`[WARN] Failed to save settings: ${e.message}`);
		}
	}

	function loadSettings() {
		try {
			const settings = JSON.parse(localStorage.getItem('ircSettings') || '{}');
			if (settings.wsUrl) document.getElementById('wsUrl').value = settings.wsUrl;
			if (settings.nickname) document.getElementById('nickInput').value = settings.nickname;
			if (settings.channel) document.getElementById('channelInput').value = settings.channel;
			if (settings.autoReconnect !== undefined) document.getElementById('autoReconnect').checked = settings.autoReconnect;
		} catch (e) {
			writeToLog(`[WARN] Failed to load settings: ${e.message}`);
		}
	}

	function handleInputBlur() {
		if (inputBlurTimeoutId !== null) {
			clearTimeout(inputBlurTimeoutId);
		}
		inputBlurTimeoutId = setTimeout(() => {
			if (isConnected && document.activeElement !== input && document.hasFocus()) {
				input.focus();
			}
		}, 100);
	}
	
	function removeInputBlurListener() {
		if (input) {
			input.removeEventListener('blur', handleInputBlur);
		}
	}

	window.addEventListener("load", onLoad, false);

	function toggleHeaderMenu() {
		const menu = document.getElementById('headerMenuDropdown');
		if (menu) {
			menu.classList.toggle('visible');
			updateAutoReconnectMenuItem();
		}

		if (!menu.classList.contains('menu-attached')) {
			menu.classList.add('menu-attached');
			headerMenuClickListener = closeHeaderMenuOnClickOutside;
			document.addEventListener('click', headerMenuClickListener);
		}
	}

	function closeHeaderMenuOnClickOutside(event) {
		const menu = document.getElementById('headerMenuDropdown');
		const menuBtn = document.querySelector('.header-menu-btn');
		if (menu && !menu.contains(event.target) && !menuBtn.contains(event.target)) {
			menu.classList.remove('visible');
			menu.classList.remove('menu-attached');
			document.removeEventListener('click', closeHeaderMenuOnClickOutside);
		}
	}

	function toggleAutoReconnect() {
		const checkbox = document.getElementById('autoReconnect');
		if (checkbox) {
			checkbox.checked = !checkbox.checked;
			autoReconnect = checkbox.checked;
			updateAutoReconnectMenuItem();
			writeToLog(`[SETTINGS] Auto-reconnect: ${autoReconnect ? 'ENABLED' : 'DISABLED'}`);
			saveSettings();
		}
	}

	function updateAutoReconnectMenuItem() {
		const menuItems = document.querySelectorAll('.header-menu-item');
		const autoReconnectCheckbox = document.getElementById('autoReconnect');
		if (menuItems.length >= 4 && autoReconnectCheckbox) {
			const menuItem = menuItems[3];
			if (autoReconnectCheckbox.checked) {
				menuItem.classList.add('active');
			} else {
				menuItem.classList.remove('active');
			}
		}
	}

	function showPrivateChatList() {
		const privateChats = [];
		channelMap.forEach((channel, name) => {
			if (channel.isPrivate) {
				privateChats.push(name);
			}
		});

		if (privateChats.length === 0) {
			writeToScreen("var(--clr-info)", "当前没有私聊会话", statusChannel, "*");
		} else {
			writeToScreen("var(--clr-info)", `私聊会话列表 (${privateChats.length}): ${privateChats.join(', ')}`, statusChannel, "*");
		}
		writeToLog(`[PM] Private chat list: ${privateChats.join(', ') || 'none'}`);
	}

	function updateConnectionStatus(status) {
		const statusEl = document.getElementById('connectionStatus');
		const statusText = document.getElementById('statusText');
		if (!statusEl || !statusText) return;

		statusEl.classList.remove('connected', 'connecting', 'disconnected');

		if (status === 'connected') {
			statusEl.classList.add('connected');
			statusText.textContent = `已连接 (${nickname})`;
		} else if (status === 'connecting') {
			statusEl.classList.add('connecting');
			statusText.textContent = '连接中...';
		} else {
			statusEl.classList.add('disconnected');
			statusText.textContent = '未连接';
		}
	}

	function toggleLog() {
		const logContainer = document.getElementById('logContainer');
		if (logContainer) {
			logContainer.classList.toggle('visible');
			if (!logContainer.classList.contains('visible')) {
				logContainer.scrollTop = logContainer.scrollHeight;
			}
		}
	}

	function clearLog() {
		const logOutput = document.getElementById('logOutput');
		if (logOutput) {
			logOutput.innerHTML = '';
		}
	}

	// ── Log-level colour palette ────────────────────────
	const LOG_COLORS = {
		'ERROR':      '#ff0040',
		'WARN':       '#ffff00',
		'WARNING':    '#ffff00',
		'INFO':       '#00f0ff',
		'DEBUG':      '#888888',
		'OPEN':       '#00ff00',
		'CLOSE':      '#ff6600',
		'SEND':       '#00d4ff',
		'RECV':       '#cc88ff',
		'IRC':        '#aaffaa',
		'CAP':        '#88ddff',
		'NOTICE':     '#ffcc44',
		'PING':       '#558855',
		'KEEP-ALIVE': '#445544',
		'RECONNECT':  '#ffaa00',
		'PM':         '#ff88ff',
		'SETTINGS':   '#aaaaff',
		'SERVER':     '#ddddaa',
		'TAB':        '#77bbdd',
		'SYSTEM':     '#cccccc',
		'PART':       '#ff8844',
		'WebSocket':  '#44ccff',
	};

	function writeToLog(message) {
		const logOutput = document.getElementById('logOutput');
		const now = new Date();
		const ts = now.toISOString().replace('T', ' ').substring(0, 23) + 'Z';
		const fullMessage = `[${ts}] ${message}`;

		if (logOutput) {
			// Detect level tag like [ERROR], [WARN], [IRC], etc.
			const tagMatch = message.match(/^\[([A-Za-z_\-\/→←]+)/);
			const line = document.createElement('span');
			if (tagMatch) {
				const tag = tagMatch[1].toUpperCase().split('/')[0].split('→')[0].split('←')[0];
				line.style.color = LOG_COLORS[tag] || '#e0e0e0';
			} else {
				line.style.color = '#e0e0e0';
			}
			line.textContent = fullMessage;
			logOutput.appendChild(line);

			// Keep max 500 log lines to avoid memory growth
			while (logOutput.children.length > 500) {
				logOutput.removeChild(logOutput.firstChild);
			}
			logOutput.scrollTop = logOutput.scrollHeight;
		}

		console.log(fullMessage);
	}

	function showSSLWarning(url) {
		const warning = document.getElementById('sslWarning');
		const link = document.getElementById('sslLink');
		if (!warning || !link) return;

		let displayUrl = url || document.getElementById('wsUrl')?.value.trim();
		if (displayUrl) {
			link.href = displayUrl.replace('wss://', 'https://').replace('ws://', 'http://');
			link.textContent = link.href;
		} else {
			link.href = '#';
			link.textContent = '请先在WebSocket地址栏输入服务器地址';
		}
		warning.classList.add('visible');
		setTimeout(() => {
			if (warning) warning.classList.remove('visible');
		}, 6000);
	}

	function joinChannel() {
		const channelInput = document.getElementById('channelInput');
		if (!channelInput) return;
		
		let targetChannel = channelInput.value.trim();
		if (!targetChannel) return;
		
		if (!targetChannel.startsWith('#')) {
			targetChannel = '#' + targetChannel;
			channelInput.value = targetChannel;
		}
		
	if (isConnected && websocket && websocket.readyState === WebSocket.OPEN) {
		writeToLog(`[IRC] Sending JOIN → ${targetChannel}`);
		doSend("JOIN " + targetChannel);
	} else {
		writeToLog(`[WARN] JOIN requested but not connected — target: ${targetChannel}`);
		writeToScreen("var(--clr-warning)", "未连接, 无法加入频道", statusChannel, "*");
	}
	}
	
	function toggleConnection() {
		if (isConnected) {
			writeToLog('[SYSTEM] User requested disconnect — disabling auto-reconnect');
			autoReconnect = false;
			updateAutoReconnectMenuItem();
			if (websocket) {
				try {
					if (window.connectTimeout) {
						clearTimeout(window.connectTimeout);
						window.connectTimeout = null;
					}
					writeToLog('[SYSTEM] Closing WebSocket (code 1000 — user disconnected)');
					websocket.close(1000, "User disconnected");
				} catch (e) {
					writeToLog(`[ERROR] Exception while closing WebSocket: ${e.message}`);
				}
			}
		} else {
			doConnect();
		}
	}

	function validateNickname(nick) {
		if (!nick || nick.trim() === "") return false;
		return /^[a-zA-Z_\\`\[\]{}^|][a-zA-Z0-9_\\`\[\]{}^|-]*$/.test(nick);
	}

	function validateWsUrl(url) {
		if (!url) return false;
		return /^wss?:\/\/.+/.test(url);
	}

	function doConnect() {
		const wsUrlInput = document.getElementById('wsUrl');
		const nickInput = document.getElementById('nickInput');
		const channelInput = document.getElementById('channelInput');
		const reconnectCheckbox = document.getElementById('autoReconnect');
		const connectBtn = document.getElementById('connectBtn');

		if (!wsUrlInput || !nickInput || !channelInput || !connectBtn) {
			alert("界面元素加载错误, 请刷新页面重试");
			writeToLog('[ERROR] doConnect: critical UI elements missing — aborting');
			return;
		}

		wsUrl = wsUrlInput.value.trim();
		nickname = nickInput.value.trim();
		channelName = channelInput.value.trim();
		autoReconnect = reconnectCheckbox ? reconnectCheckbox.checked : false;

		if (!validateWsUrl(wsUrl)) {
			writeToLog(`[ERROR] Invalid WebSocket URL: "${wsUrl}" — must start with ws:// or wss://`);
			alert("WebSocket地址格式错误!必须以 ws:// 或 wss:// 开头");
			return;
		}
		if (!validateNickname(nickname)) {
			writeToLog(`[ERROR] Invalid nickname: "${nickname}" — must start with a letter or [_\`[]{}^|]`);
			alert("昵称格式无效!必须以字母或特定符号开头, 不能包含空格和特殊字符");
			return;
		}
		if (channelName && !channelName.startsWith('#')) {
			channelName = '#' + channelName;
			writeToLog(`[DEBUG] Channel name auto-prefixed with '#': ${channelName}`);
		}

		reconnectAttempts = 0;
		wsUrlInput.disabled = true;
		nickInput.disabled = true;

		connectBtn.textContent = '连接中...';
		connectBtn.disabled = true;

		isDisconnecting = false;
		saveSettings();
		updateConnectionStatus('connecting');

		writeToLog(`[SYSTEM] ── Initiating connection ─────────────────`);
		writeToLog(`[SYSTEM] Server  : ${wsUrl}`);
		writeToLog(`[SYSTEM] Nick    : ${nickname}`);
		writeToLog(`[SYSTEM] Channel : ${channelName || '(none)'}`);
		writeToLog(`[SYSTEM] Auto-reconnect: ${autoReconnect} | Attempt: ${reconnectAttempts + 1}`);

		channels.innerHTML = '';
		channelContents.innerHTML = '';
		channelMap.clear();
		contentsWrapper.classList.remove('hidden');
		contentsWrapper.classList.add('visible');
		if (emptyState) emptyState.style.display = 'none';
		if (input) document.getElementById('inputContainer').style.display = 'flex';

		statusChannel = new Tab_Create("Status", "Status Window", false);
		writeToLog(`[SYSTEM] Status tab created — calling WebSocket_Connect`);
		WebSocket_Connect(wsUrl);
	}

	function onDisconnect(reason = "") {

		if (isDisconnecting) {
			return;
		}
		isDisconnecting = true;

		stopKeepAlive();
		writeToLog(`[SYSTEM] ── Disconnect handler ────────────────────`);
		writeToLog(`[SYSTEM] Reason: "${reason || 'normal'}" | was-connected: ${isConnected}`);
		if (sessionStartTime) {
			writeToLog(`[SYSTEM] Session ended — duration: ${formatSessionDuration(sessionStartTime)} | sent: ${sentCount} | recv: ${recvCount}`);
			sessionStartTime = null;
		}
		isConnected = false;
		const wsUrlInput = document.getElementById('wsUrl');
		const nickInput = document.getElementById('nickInput');
		const channelInput = document.getElementById('channelInput');
		const reconnectCheckbox = document.getElementById('autoReconnect');
		const connectBtn = document.getElementById('connectBtn');

		if (wsUrlInput) wsUrlInput.disabled = false;
		if (nickInput) nickInput.disabled = false;
		if (channelInput) channelInput.disabled = false;

		if (connectBtn) {
			connectBtn.textContent = '连接';
			connectBtn.disabled = false;
			connectBtn.classList.remove('disconnect');
		}

		const joinChannelBtn = document.getElementById('joinChannelBtn');
	if (joinChannelBtn) joinChannelBtn.disabled = true;

	updateConnectionStatus('disconnected');

		if (statusChannel) {
			Tab_Show("Status");
		}

		let disconnectMessage = "DISCONNECTED";
		let logMessage = "[SYSTEM] Connection closed";

		if (reason === "user") {
			disconnectMessage = "用户主动断开连接";
			logMessage = "[SYSTEM] User-initiated disconnect";
		} else if (reason === "error") {
			disconnectMessage = "连接异常断开";
			logMessage = "[SYSTEM] Connection dropped abnormally";
		}

		writeToScreen("var(--clr-font)", disconnectMessage, statusChannel, "");
		writeToLog(logMessage);

		if (autoReconnect && reconnectAttempts < maxReconnectAttempts) {
			reconnectAttempts++;
			const delay = reconnectDelay * reconnectAttempts;
			writeToLog(`[RECONNECT] Attempt ${reconnectAttempts}/${maxReconnectAttempts} scheduled in ${Math.floor(delay / 1000)}s — server: ${wsUrl}`);
			setTimeout(() => {
				if (!isConnected && autoReconnect) {
					writeToLog(`[RECONNECT] Attempt ${reconnectAttempts}/${maxReconnectAttempts} starting now...`);
					doConnect();
				} else {
					writeToLog(`[RECONNECT] Skipped — already connected or auto-reconnect cancelled`);
				}
			}, delay);
		} else if (autoReconnect && reconnectAttempts >= maxReconnectAttempts) {
			writeToLog(`[RECONNECT] Max attempts reached (${maxReconnectAttempts}/${maxReconnectAttempts}) — giving up`);
			autoReconnect = false;
			updateAutoReconnectMenuItem();
			alert('自动重连失败, 请检查网络或服务器设置');
		}

		isDisconnecting = false;
	}

	function updateCharCount() {
		const charCount = document.getElementById('charCount');
		if (!charCount || !input) return;
		
		const text = input.value;
		const length = text.length;
		const maxLength = 512;
		
		charCount.textContent = `${length}/${maxLength}`;
		
		charCount.classList.remove('warning', 'danger');
		
		if (length > maxLength) {
			charCount.classList.add('danger');
		} else if (length > maxLength * 0.8) {
			charCount.classList.add('warning');
		}
	}

	function onKeyDown(e) {
		if (e && e.key === 'Enter') {
			send();
		} else if (e.key === 'Tab') {
			e.preventDefault();
			handleTabCompletion();
			return false;
		} else if (e.key === 'ArrowUp') {
			e.preventDefault();
			if (historyIndex > 0) {
				historyIndex--;
				input.value = messageHistory[historyIndex];
				updateCharCount();
			}
			return false;
		} else if (e.key === 'ArrowDown') {
			e.preventDefault();
			if (historyIndex < messageHistory.length - 1) {
				historyIndex++;
				input.value = messageHistory[historyIndex];
				updateCharCount();
			} else {
				historyIndex = messageHistory.length;
				input.value = "";
				updateCharCount();
			}
			return false;
		}
	}

	function handleTabCompletion() {
		if (!input || !activeChannel || !activeChannel.users) return;
		const cursorPos = input.selectionStart;
		const text = input.value.substring(0, cursorPos);
		const words = text.split(' ');
		const lastWord = words[words.length - 1];

		if (!lastWord) return;

		const matches = activeChannel.users
			.filter(user => user[1].toLowerCase().startsWith(lastWord.toLowerCase()))
			.sort((a, b) => a[1].localeCompare(b[1]));

		if (matches.length === 1) {
			words[words.length - 1] = matches[0][1] + (words.length > 1 ? ' ' : ': ');
			input.value = words.join(' ') + input.value.substring(cursorPos);
			input.setSelectionRange(cursorPos + matches[0][1].length + (words.length > 1 ? 1 : 2), cursorPos + matches[0][1].length + (words.length > 1 ? 1 : 2));
		} else if (matches.length > 1) {
			writeToScreen("var(--clr-info)", `匹配: ${matches.map(m => m[1]).join(', ')}`, activeChannel, "*");
		}
	}

	function Tab_onClick(evt) {
		if (!evt || !evt.currentTarget) return;

	function Tabs_Hide() {

	function Tab_Show(name) {

	function openPrivateChat(targetNick) {

	function HTML_escape(text) {
		if (!text) return "";
		let map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
		return text.replace(/[&<>"']/g, function (m) { return map[m]; });
	}

	function sortUserList(user_a, user_b) {
		if (!user_a || !user_b || user_a.length < 2 || user_b.length < 2) return 0;
		if (user_a[0][0] === user_b[0][0])
			return user_a[1].localeCompare(user_b[1], undefined, { sensitivity: 'accent' });
		if (!PrefixChars || !PrefixChars[1]) return 0;
		let aIndex = PrefixChars[1].indexOf(user_a[0][0]);
		let bIndex = PrefixChars[1].indexOf(user_b[0][0]);
		return aIndex - bIndex;
	}

	function Tab_Create(name, topic, createlist) {
		if (!name || !channels || !channelContents) {
			console.error("Tab_Create: missing required elements");
			writeToLog(`[ERROR] Tab_Create failed — name: "${name}", channels: ${!!channels}, contents: ${!!channelContents}`);
			return;
		}
		Tabs_Hide();
		this.name = name;
		let escapedName = HTML_escape(name);

		this.button = document.createElement("button");
		this.button.innerHTML = escapedName;
		this.button.value = name;
		this.button.onclick = Tab_onClick;

		channelContents.appendChild(this.channel);
		channelMap.set(name, this);
		activeChannel = this;

	function Tab_Close(evt) {
		evt.stopPropagation();
		if (!evt || !evt.currentTarget) return;
		const channelName = evt.currentTarget.value;

		if (channelName === "Status") {
			writeToScreen("var(--clr-warning)", "Status频道是系统状态窗口, 不能关闭", statusChannel, "*");
			writeToLog("[WARN] Attempted to close the Status tab — blocked (system window)");
			return;
		}

		let channel = findChannel(channelName);
		if (channel && channel.isPrivate) {
			writeToLog(`[PM] Closing private chat session: "${channelName}"`);
			Channel_Destroy(channelName);
			return;
		}

		if (isConnected && websocket && websocket.readyState === WebSocket.OPEN) {
			writeToLog(`[PART] Sending PART → ${channelName}`);
			doSend("PART " + channelName);
		} else {
			writeToLog(`[TAB] Not connected — destroying tab locally: "${channelName}"`);
			Channel_Destroy(channelName);
		}
	}

	function Channel_Destroy(name) {
		if (!name) return;
		let channel = findChannel(name);
		if (!channel) {
			writeToLog(`[WARN] Channel_Destroy: tab "${name}" not found`);
			return;
		}
		const wasActive = (activeChannel === channel);
		channel.button.remove();
		channel.channel.remove();
		if (wasActive) {
			activeChannel = statusChannel;
		}
		channelMap.delete(name);
		writeToLog(`[TAB] Tab destroyed: "${name}" | was-active: ${wasActive} | remaining tabs: ${channelMap.size}`);
		if (activeChannel) {
			Tab_Show(activeChannel.name);
		}
	}

	function Channel_InsertUser(nick, channel, prefix) {
		if (!nick || !channel || !channel.userlist) return;
		let user = document.createElement("li");
		let tmp = document.createElement("p");

		if (prefix && prefix !== " ") {
			const prefixChar = prefix[0];
			const prefixInfo = DefaultPrefixMap[prefixChar];
			if (prefixInfo) {
				tmp.innerHTML = prefixInfo.symbol;
				tmp.style.color = prefixInfo.color;
				tmp.title = prefixInfo.name;
			} else {
				tmp.innerHTML = prefixChar;
			}
		}
		user.appendChild(tmp);

		tmp = document.createElement("p");
		tmp.innerHTML = HTML_escape(nick);
		tmp.title = "点击与 " + nick + " 私聊";
		tmp.style.cursor = "pointer";
		tmp.onclick = function(e) {
			e.stopPropagation();
			openPrivateChat(nick);
		};
		user.appendChild(tmp);
		let i = 0;
		for (i; i < channel.users.length; i++) {
			if (channel.users[i] && channel.users[i][1]) {
				if (channel.users[i][1].localeCompare(nick, undefined, { sensitivity: 'accent' }) < 0) continue;
			}
			break;
		}
		channel.users.splice(i, 0, [prefix || " ", nick]);
		channel.userlist.insertBefore(user, channel.userlist.childNodes[i]);
	}

	function Channel_AppendUser(nick, channel, prefix) {
		if (!nick || !channel || !channel.userlist) return;
		let user = document.createElement("li");
		let tmp = document.createElement("p");
		if (prefix && prefix !== " ") {
			const prefixChar = prefix[0];
			const prefixInfo = DefaultPrefixMap[prefixChar];
			if (prefixInfo) {

		tmp = document.createElement("p");

	function Channel_RemoveUser(nick, channel) {
		if (!nick || !channel || !channel.userlist) return false;

		for (let i = 0; i < channel.users.length; i++) {
			if (channel.users[i] && channel.users[i][1] === nick) {
				for (let j = 0; j < channel.userlist.children.length; j++) {
					let userItem = channel.userlist.children[j];
					if (!userItem || !userItem.children[1]) continue;
					let anick = userItem.children[1].textContent;
					if (anick === nick) {
						userItem.remove();
						break;
					}
				}

				channel.users.splice(i, 1);
				return true;
			}
		}
		
		return false;
	}

	function Channel_RenameUser(nick, newnick, channel) {
		if (!nick || !newnick || !channel) return;
		if (!channel.userlist) return;
		for (let i = 0; i < channel.users.length; i++) {
			if (channel.users[i] && channel.users[i][1] == nick) {
				let prefix = channel.users[i][0];
				Channel_RemoveUser(nick, channel);
				Channel_InsertUser(newnick, channel, prefix);
				return true;
			}
		}
	}

	function Channel_UpdateUserPrefix(nick, channel, add, prefix) {
		if (!nick || !channel || !channel.users || !PrefixChars) return;
		for (let i = 0; i < channel.users.length; i++) {
			if (channel.users[i] && channel.users[i][1] == nick) {
				let pos = PrefixChars[0].indexOf(prefix);
				if (pos < 0) return;

				let prefixes = "";
				if (add === true || add === "true") {
					let ii;
					for (ii = 0; ii < channel.users[i][0].length; ii++) {
						if (PrefixChars[1].indexOf(channel.users[i][0][ii]) >= pos) break;
						prefixes += channel.users[i][0][ii];
					}
					prefixes += PrefixChars[1][pos];
					for (; ii < channel.users[i][0].length; ii++) {
						prefixes += channel.users[i][0][ii];
					}
				} else {
					let tmp = channel.users[i][0].indexOf(PrefixChars[1][pos]);
					if (tmp >= 0) {
						prefixes = channel.users[i][0].substring(0, tmp) + channel.users[i][0].substring(tmp + 1);
					}
				}
				if (prefixes == "") prefixes = " ";
				channel.users[i][0] = prefixes;

				Channel_RenameUser(nick, nick, channel);
				break;
			}
		}
	}

	function writeToScreen(color, message, channel, username) {
		if (!channel || !channel.content) return;
		let pre = document.createElement("p");
		pre.style.color = color;
		const now = new Date();
		const utcTime = now.toISOString().substr(11, 8);
		let displayMessage;
		if (username && username !== "" && username !== "*" && username !== "-") {
			const escapedUsername = HTML_escape(username);
			const usernameHtml = `<span class="clickable-username" onclick="openPrivateChat('${escapedUsername}')" title="点击与 ${escapedUsername} 私聊" style="cursor: pointer; color: var(--clr-secondary); font-weight: bold;">${escapedUsername}</span>`;
			displayMessage = `[${utcTime}] ${usernameHtml}: ${linkify(message || "")}`;
		} else {
			displayMessage = `[${utcTime}] ${linkify(message || "")}`;
		}
		pre.innerHTML = displayMessage;
		let output = channel.content;
		if (output) {
			output.appendChild(pre);
			while (output.children.length > 200) {
				output.removeChild(output.children[0]);
			}

			requestAnimationFrame(() => {
				output.scrollTop = output.scrollHeight;
			});
		}
	}

	function linkify(text) {
		const urlRegex = /(https?:\/\/[^\s<>{}|\\^`[\]]+)/g;
		const mediaMaxWidth = '300px';

		return text.replace(urlRegex, function (url) {
			const lowerUrl = url.toLowerCase();
			const isImage = /\.(jpg|jpeg|png|gif|webp|bmp|svg)(\?.*)?$/i.test(lowerUrl);
			const isAudio = /\.(mp3|wav|ogg|aac|m4a|flac)(\?.*)?$/i.test(lowerUrl);
			const isVideo = /\.(mp4|webm|ogg|mov|avi|mkv|flv|m4v|m3u8)(\?.*)?$/i.test(lowerUrl);

			if (isImage) {
				return `<img src="${url}" alt="Image" style="max-width: ${mediaMaxWidth}; height: auto; border-radius: 4px; box-shadow: 0 2px 6px rgba(0,0,0,0.1);">`;
			} else if (isAudio) {
				return `<audio controls src="${url}" style="max-width: ${mediaMaxWidth};"></audio>`;
			} else if (isVideo) {
				return `<video controls src="${url}" style="max-width: ${mediaMaxWidth}; height: auto; border-radius: 4px;"></video>`;
			} else {
				return `<a href="${url}" target="_blank" rel="noopener noreferrer" style="color: var(--clr-accent); text-decoration: underline; word-break: break-all;">${url}</a>`;
			}
		});
	}

	function send() {
		let text = input ? input.value.trim() : "";
		if (!text || !activeChannel) return;

		if (text[0] == "/") {
			if (text.indexOf("/me ") == 0) {
				const actionText = text.substring(4);
				const messages = splitIRCMessage("privmsg " + activeChannel.name + " :\x01ACTION " + actionText + "\x01");
				messages.forEach(msg => doSend(msg));
				writeToScreen("var(--clr-red)", `${nickname} ${actionText}`, activeChannel, "*");
				} else if (text.indexOf("/msg ") == 0) {
					const parts = text.substring(5).split(' ');
				if (parts.length >= 2) {
					const targetNick = parts[0];
					const msgText = parts.slice(1).join(' ');
					let pmChannel = findChannel(targetNick);
					if (!pmChannel) {
						pmChannel = new Tab_Create(targetNick, `与 ${targetNick} 的私聊`, false);
						pmChannel.isPrivate = true;
						if (pmChannel.button) {
							pmChannel.button.classList.add('private');
						}
					}
					Tab_Show(targetNick);
					const messages = splitIRCMessage("privmsg " + targetNick + " :" + msgText);
					messages.forEach((msg, index) => {
						doSend(msg);
						if (index === 0) {
							writeToScreen("var(--clr-font)", msgText, pmChannel, nickname);
						}
					});
					writeToLog(`[PM] You → ${targetNick}: ${msgText}`);
				} else {
					writeToScreen("var(--clr-warning)", "用法: /msg <昵称> <消息>", statusChannel, "*");
				}
			} else {
				writeToScreen("var(--clr-font)", text, statusChannel, "");
				const messages = splitIRCMessage(text.substring(1));
				messages.forEach(msg => doSend(msg));
			}
		} else {
			const target = activeChannel.isPrivate ? activeChannel.name : activeChannel.name;
			const messages = splitIRCMessage("privmsg " + target + " :" + text);
			messages.forEach((msg, index) => {
				doSend(msg);
				if (index === 0) {
					writeToScreen("var(--clr-font)", text, activeChannel, nickname);
				}
			});
		if (activeChannel.isPrivate) {
			writeToLog(`[PM] You → ${target}: ${text}`);
		}
		}

		if (text[0] != "/") {
			messageHistory.push(text);
			historyIndex = messageHistory.length;
		}
		if (input) input.value = "";
	}

	function splitIRCMessage(message) {
		const MAX_LENGTH = 512;
		
		const isPrivmsg = message.startsWith("privmsg ");
		const fullMessage = message + "\n";
		if (!isPrivmsg || fullMessage.length <= MAX_LENGTH) {
			return [fullMessage];
		}

		const colonIndex = message.indexOf(':');
		if (colonIndex === -1) {
			return [fullMessage];
		}
		
		const baseCommand = message.substring(0, colonIndex + 1);
		const messageContent = message.substring(colonIndex + 1);
		const maxContentLength = MAX_LENGTH - baseCommand.length - 2;
		
		if (messageContent.length <= maxContentLength) {
			return [fullMessage];
		}

		const messages = [];
		for (let i = 0; i < messageContent.length; i += maxContentLength) {
			const chunk = messageContent.substring(i, i + maxContentLength);
			messages.push(baseCommand + chunk + "\n");
		}

		return messages;
	}

	function WebSocket_Connect(wsUri) {
		if (!wsUri) {
			writeToLog("[ERROR] WebSocket URL is empty — aborting connection");
			return;
		}
		try {
			if (websocket) {
				try {
					websocket.onclose = null;
					websocket.onerror = null;
					websocket.onopen = null;
					websocket.onmessage = null;
					if (websocket.readyState !== WebSocket.CLOSED) {
						writeToLog(`[WebSocket] Cleaning up previous connection (state: ${websocket.readyState})`);
						websocket.close(1000, "Reconnecting");
					}
				} catch (e) {
					writeToLog(`[WARN] Error cleaning up previous connection: ${e.message}`);
				}
				websocket = null;
			}
			writeToLog(`[WebSocket] Creating new WebSocket → ${wsUri}`);
			websocket = new WebSocket(wsUri);
			websocket.binaryType = 'blob';

			if (window.connectTimeout) {
				clearTimeout(window.connectTimeout);
			}
			window.connectTimeout = setTimeout(() => {
				if (websocket && websocket.readyState === WebSocket.CONNECTING) {
					writeToLog(`[ERROR] Connection timeout (30s) — forcing close → ${wsUri}`);
					try {
						websocket.close(1006, "Connection timeout");
					} catch (e) {
						writeToLog(`[ERROR] Failed to close timed-out WebSocket: ${e.message}`);
					}
				}
			}, 30000);

			websocket.onclose = function handleOnClose(evt) {
				if (window.connectTimeout) {
					clearTimeout(window.connectTimeout);
					window.connectTimeout = null;
				}
				onClose(evt);
			};
			websocket.onerror = function handleOnError(evt) {
				onError(evt);
			};
			websocket.onopen = function handleOnOpen(evt) {
				if (window.connectTimeout) {
					clearTimeout(window.connectTimeout);
					window.connectTimeout = null;
				}
				onOpen(evt);
			};
			websocket.onmessage = function handleOnMessage(evt) {
				onMessage(evt);
			};
		} catch (e) {
			writeToLog(`[ERROR] WebSocket creation failed: ${e.message}`);
			onDisconnect();
			if (wsUrl && wsUrl.startsWith('wss://')) {
				showSSLWarning(wsUrl);
			}
			alert(`连接失败: ${e.message}\n\n如果是SSL证书错误, 请点击"SSL帮助"查看解决方案`);
		}
	}


	window.addEventListener('beforeunload', function cleanup() {
		cleanupEventListeners();
		
		stopKeepAlive();
		if (inputBlurTimeoutId !== null) {
			clearTimeout(inputBlurTimeoutId);
		}
		if (websocket) {
			websocket.onclose = null;
			websocket.onerror = null;
			websocket.onopen = null;
			websocket.onmessage = null;
			if (websocket.readyState === WebSocket.OPEN) {
				websocket.close(1000, "Page unload");
			}
		}
	});

	function onClose(evt) {
		if (websocket) {
			websocket.onclose = null;
			websocket.onerror = null;
			websocket.onopen = null;
			websocket.onmessage = null;
			websocket = null;
		}

		if (!isConnected && isDisconnecting) {
			return;
		}

		isConnected = false;
		let reason = evt.reason || 'Connection closed';
		let code = evt.code;

			let isUserDisconnect = false;

		if (isDisconnecting) {
			isUserDisconnect = true;
		} else if (code === 1000 && reason.includes("User disconnected")) {
			isUserDisconnect = true;
			reason = "User-initiated disconnect";
		} else if (code === 1000) {
			reason = "Normal closure";
		}

		let logMsg = `[CLOSE] Code: ${code}`;

		switch (code) {
			case 1000: logMsg += isUserDisconnect ? ' (user-initiated)' : ' (normal closure)'; break;
			case 1001: logMsg += ' (endpoint going away)'; break;
			case 1002: logMsg += ' (protocol error)'; break;
			case 1003: logMsg += ' (unsupported data type)'; break;
			case 1005: logMsg += ' (no status code)'; break;
			case 1006: logMsg += ' (abnormal closure — possible network issue)'; break;
			case 1011: logMsg += ' (server internal error)'; break;
			case 1015: logMsg += ' (TLS handshake failed)'; break;
			default: if (code >= 4000 && code <= 4999) { logMsg += ' (application-level error)'; }
		}
		logMsg += ` — reason: "${reason}"`;

		writeToLog(logMsg);

		let disconnectReason = "";
		if (isUserDisconnect) {
			disconnectReason = "user";
		} else if (code === 1006 || code >= 4000) {
			disconnectReason = "error";
		}
		onDisconnect(disconnectReason);
	}

	function onError(evt) {
		let errorType = 'WebSocket error';
		if (evt && evt.target) {
			if (evt.target.readyState === WebSocket.CONNECTING) {
				errorType = 'Connection failed';
			} else if (evt.target.readyState === WebSocket.OPEN) {
				errorType = 'Message error';
			}
		}
		writeToScreen("var(--clr-red)", `ERROR: ${errorType}`, statusChannel, "");
		writeToLog(`[ERROR] ${errorType}: ${evt.data || 'unknown error'}`);
		if (wsUrl && wsUrl.startsWith('wss://')) {
			showSSLWarning(wsUrl);
		}
	}

	function onOpen(evt) {
		if (websocket && websocket.readyState === WebSocket.OPEN) {
			isConnected = true;
			reconnectAttempts = 0;
			sessionStartTime = new Date();
			sentCount = 0;
			recvCount = 0;
			writeToScreen("var(--clr-font)", "CONNECTED", statusChannel, "");
			writeToLog(`[OPEN] WebSocket connected: ${wsUrl}`);
			writeToLog(`[SYSTEM] Session started at ${sessionStartTime.toISOString()}`);
			updateConnectionStatus('connected');

			const connectBtn = document.getElementById('connectBtn');
			if (connectBtn) {
				connectBtn.textContent = '断开';
				connectBtn.disabled = false;
				connectBtn.classList.add('disconnect');
			}

			const joinChannelBtn = document.getElementById('joinChannelBtn');
			if (joinChannelBtn) joinChannelBtn.disabled = false;

			doSend("CAP LS 302");

			startKeepAlive();
		} else {
			writeToLog(`[ERROR] onOpen called but WebSocket state is abnormal: ${websocket ? websocket.readyState : 'null'}`);
		}
	}

	function onMessage(evt) {
		if (!evt) return;
		
		if (!websocket || websocket.readyState !== WebSocket.OPEN) {
			if (isConnected) {
				isConnected = false;
				updateConnectionStatus('disconnected');
			}
			writeToLog(`[WARNING] Message received but WebSocket is not connected — ignored`);
			return;
		}
		
		if (!isConnected) {
			isConnected = true;
			updateConnectionStatus('connected');
		}
		
		const rawData = evt.data;
		recvCount++;
		writeToLog(`[RECV] ${typeof rawData === 'string' ? rawData.trim() : '[binary data]'}`);
		if (rawData instanceof Blob) {
			let fileReader = new FileReader();
			
			fileReader.onloadend = function handleLoadEnd(event) {
				if (!event || !event.target) return;
				const fileReader = event.target;
				const raw = fileReader.result;
				writeToLog(`[RECV] (Blob→Text): ${raw.trim()}`);
				process(raw);
				
				fileReader.onloadend = null;
			};
			
			fileReader.readAsText(rawData);
		} else {
			process(rawData);
		}
	}

	function doSend(message) {
		if (!message) return;
		
		if (websocket) {
			if (websocket.readyState === WebSocket.OPEN) {
				if (!isConnected) {
					isConnected = true;
					updateConnectionStatus('connected');
				}
			} else if (websocket.readyState === WebSocket.CLOSED || websocket.readyState === WebSocket.CLOSING) {
				if (isConnected) {
					isConnected = false;
					updateConnectionStatus('disconnected');
				}
			writeToLog(`[ERROR] WebSocket not connected — cannot send: ${message.trim()}`);
			writeToScreen("var(--clr-red)", "未连接, 消息未发送", statusChannel, "");
			return;
		}
	} else {
		if (isConnected) {
			isConnected = false;
			updateConnectionStatus('disconnected');
		}
		writeToLog(`[ERROR] WebSocket is null — cannot send: ${message.trim()}`);
		writeToScreen("var(--clr-red)", "未连接, 消息未发送", statusChannel, "");
		return;
	}
	
	try {
		websocket.send(message);
		if (!message.trim().toUpperCase().startsWith('PING')) sentCount++;
		writeToLog(`[SEND] ${message.trim()}`);
	} catch (e) {
		writeToLog(`[ERROR] Failed to send message: ${e.message}`);
		writeToScreen("var(--clr-red)", "发送失败: " + e.message, statusChannel, "");
		if (isConnected) {
			isConnected = false;
			updateConnectionStatus('disconnected');
		}
	}
}


	const DefaultPrefixMap = {
		'~': { symbol: '~', name: 'founder', color: 'var(--clr-purple)' },
		'&': { symbol: '&', name: 'admin', color: 'var(--clr-red)' },
		'%': { symbol: '%', name: 'halfop', color: 'var(--clr-green)' },
		'@': { symbol: '@', name: 'op', color: 'var(--clr-blue)' },
		'+': { symbol: '+', name: 'voice', color: 'var(--clr-gold)' }
	};

	var Commands = new Map();
	Commands.set("CAP", function (nick, data) {
		if (!data || data.length < 4) return;

		const target = data[2];
		const subCommand = data[3].toUpperCase();
		let caps = "";

		for (let i = 4; i < data.length; i++) {
			if (data[i].startsWith(':')) {
				caps = data[i].substring(1);
				for (let j = i + 1; j < data.length; j++) {
					caps += ' ' + data[j];
				}
				break;
			} else {
				caps += (caps ? ' ' : '') + data[i];
			}
		}

		writeToLog(`[CAP] Received: target=${target}, subcommand=${subCommand}, caps="${caps}"`);

		if (subCommand === "LS") {
			writeToScreen("var(--clr-info)", `服务器支持的能力: ${caps}`, statusChannel, "*");

			const availableCaps = caps.split(' ').map(c => c.trim().toLowerCase()).filter(c => c);
			const requestedCaps = ["multi-prefix", "away-notify", "account-notify", "extended-join"]
				.filter(cap => availableCaps.includes(cap.toLowerCase()))
				.join(' ');

			if (requestedCaps) {
				writeToLog(`[CAP] Requesting capabilities: ${requestedCaps}`);
				doSend("CAP REQ :" + requestedCaps);
			} else {
				writeToLog(`[CAP] No matching capabilities — ending CAP negotiation`);
				doSend("CAP END");
				sendRegistration();
			}

		} else if (subCommand === "ACK") {
			const ackedCaps = caps || "(none)";
			writeToScreen("var(--clr-green)", `已启用能力: ${ackedCaps}`, statusChannel, "*");
			writeToLog(`[CAP] Capabilities acknowledged (ACK): ${ackedCaps}`);

			doSend("CAP END");
			sendRegistration();

		} else if (subCommand === "NAK") {
			const rejectedCaps = caps || "(none)";
			writeToScreen("var(--clr-warning)", `能力被拒绝: ${rejectedCaps}`, statusChannel, "*");
			writeToLog(`[CAP] Capabilities rejected (NAK): ${rejectedCaps}`);

			doSend("CAP END");
			sendRegistration();

		} else if (subCommand === "LIST") {
			const activeCaps = caps || "(none)";
			writeToScreen("var(--clr-info)", `当前启用的能力: ${activeCaps}`, statusChannel, "*");
		} else if (subCommand === "NEW") {
			writeToScreen("var(--clr-info)", `服务器新增能力: ${caps}`, statusChannel, "*");
		} else if (subCommand === "DEL") {
			writeToScreen("var(--clr-warning)", `服务器移除能力: ${caps}`, statusChannel, "*");
		}
	});

	Commands.set("001", function (nick, data) {
		if (channelName) {
			writeToLog(`[IRC] RPL_WELCOME (001) received — auto-joining: ${channelName}`);
			doSend("join " + channelName);
		} else {
			writeToLog(`[IRC] RPL_WELCOME (001) received — no auto-join channel configured`);
		}
	});
	Commands.set("005", function (nick, data) {
		if (!data) return;
		for (let i = 2; i < data.length; i++) {
			if (data[i].indexOf("PREFIX=") == 0) {
				let tmp = data[i].substring(8) + " ";
				if (tmp) {
					PrefixChars = tmp.split(")");
					writeToScreen("var(--clr-brown)", "PREFIX CHARS: " + PrefixChars[0] + " " + PrefixChars[1], statusChannel, "");
					writeToLog(`[IRC] Server PREFIX support: modes="${PrefixChars[0]}" chars="${PrefixChars[1]}"`);
				}
			}
		}
	});
	Commands.set("332", function (nick, data) {
		if (!data || data.length < 5) return;
		let channel = findChannel(data[3]);
		if (!channel || !channel.topic) return;
		let text = data[4].substring(1);
		for (let i = 5; i < data.length; i++) {
			text += " " + data[i];
		}
		channel.topic.innerHTML = HTML_escape(text || "No topic set");
		writeToLog(`[IRC] RPL_TOPIC (332): channel=${data[3]} topic="${text}"`);
	});
	Commands.set("353", function (nick, data) {
		if (!data || data.length < 6) return;
		let channel = findChannel(data[4]);
		if (!channel) return;
		if (channel.names_end == true) {
			channel.users = [];
			channel.names_end = false;
		}
		data[5] = data[5].substring(1);
		for (let i = 5; i < data.length; i++) {
			let prefix = "";
			let ii = 0;
			while (PrefixChars && PrefixChars[1] && PrefixChars[1].indexOf(data[i][ii]) >= 0) {
				prefix += data[i][ii];
				ii++;
			}
			if (prefix == "") prefix = " ";
			channel.users.push([prefix, data[i].substring(ii)]);
		}
		writeToLog(`[IRC] RPL_NAMREPLY (353): channel=${data[4]} users so far=${channel.users.length}`);
	});
	Commands.set("366", function (nick, data) {
		if (!data || data.length < 4) return;
		let channel = findChannel(data[3]);
		if (!channel) return;
		channel.users.sort(sortUserList);
		channel.userlist.innerHTML = "";
		for (let i = 0; i < channel.users.length; i++) {
			Channel_AppendUser(channel.users[i][1], channel, channel.users[i][0]);
		}
		channel.names_end = true;
		writeToLog(`[IRC] RPL_ENDOFNAMES (366): channel=${data[3]} total users=${channel.users.length}`);
	});
	Commands.set("432", function (nick, data) {
		nickname = prompt("错误: 昵称包含非法字符\n请输入新的昵称", "");
		if (nickname) {
			doSend("nick " + nickname);
			writeToLog(`[IRC] ERR_ERRONEUSNICKNAME (432) — retrying with: "${nickname}"`);
		}
	});
	Commands.set("433", function (nick, data) {
		nickname = prompt("错误: 昵称已被占用\n请输入新的昵称", "");
		if (nickname) {
			doSend("nick " + nickname);
			writeToLog(`[IRC] ERR_NICKNAMEINUSE (433) — retrying with: "${nickname}"`);
		}
	});
	Commands.set("477", function (nick, data) {
		if (!data || data.length < 4) return;
		const targetNick = data[2];
		const errorMsg = data[3].substring(1);
		writeToScreen("var(--clr-red)", `错误: ${errorMsg}`, statusChannel, "*");
		writeToLog(`[ERROR] ERR_NOCHANMODES (477): target=${targetNick} — ${errorMsg}`);
	});
	Commands.set("JOIN", function (nick, data) {
		if (!data || data.length < 3) return;

		let serverChannelName = data[2];
		if (serverChannelName[0] == ":") serverChannelName = serverChannelName.substring(1);

		writeToLog(`[IRC] JOIN event: nick=${nick}, channel=${serverChannelName}, isSelf=${isSelfJoin}`);

		const isSelfJoin = data[0].startsWith(":" + nickname + "!") ||
						   data[0].toLowerCase().startsWith(":" + nickname.toLowerCase() + "!");

		if (!isSelfJoin) {
			let channel = findChannel(serverChannelName);
			if (!channel) return;

			let userPrefix = " ";
			const prefixMatch = data[0].match(/^:([^!]+)([@+%&~])/);
			if (prefixMatch) {
				userPrefix = prefixMatch[2] || " ";
			}

			Channel_InsertUser(nick, channel, userPrefix);
			writeToScreen("var(--clr-green)", `${nick} 加入频道`, channel, "*");
			writeToLog(`[IRC] User joined: ${nick} → ${serverChannelName}`);
		} else {
			let channel = findChannel(serverChannelName);

			if (channel) {
				if (channel.name !== serverChannelName) {
					channelMap.delete(channel.name);
					channel.name = serverChannelName;
					channel.button.innerHTML = HTML_escape(serverChannelName);
					channel.button.value = HTML_escape(serverChannelName);
					channel.button.querySelector('.x').value = HTML_escape(serverChannelName);
					channelMap.set(serverChannelName, channel);
				}
			} else {
				channel = new Tab_Create(serverChannelName, "", true);
			}

			window.channelName = serverChannelName;
			writeToScreen("var(--clr-green)", `你已加入频道 ${serverChannelName}`, channel, "*");
			writeToLog(`[IRC] Self joined channel: ${serverChannelName}`);
		}
	});
	Commands.set("KICK", function (nick, data) {
		if (!data || data.length < 5) return;
		let channel = findChannel(data[2]);
		if (!channel) return;
		let text = data[4].substring(1);
		for (let i = 5; i < data.length; i++) {
			text += " " + data[i];
		}
		if (data[3] != nickname) {
			if (Channel_RemoveUser(data[3], channel)) {
				writeToScreen("var(--clr-red)", `${data[3]} 被 ${nick} 踢出 (原因: ${text})`, channel, "*");
			}
		} else {
			Channel_Destroy(data[2]);
			writeToScreen("var(--clr-red)", `你被 ${nick} 踢出 ${data[2]} (原因: ${text})`, statusChannel, "");
		}
		writeToLog(`[IRC] KICK: channel=${data[2]}, kicked=${data[3]}, by=${nick}, reason="${text}"`);
	});
	Commands.set("MODE", function (nick, data) {
		if (!data || data.length < 4) return;
		let channel = findChannel(data[2]);
		if (!channel) return;

		let text = data[3];
		for (let i = 4; i < data.length; i++) {
			text += " " + data[i];
		}
		writeToScreen("var(--clr-blue)", `${nick} 设置模式: ${text}`, channel, "*");

		if (!PrefixChars || data[3].length < 1) return;

		if (data.length >= 5 && data[4].startsWith(":")) {
			const modeChar = data[3][data[3].length - 1];
			const targetNick = data[4].substring(1);

			let mappedPrefix = modeChar;
			if (modeChar === 'y') mappedPrefix = '~';
			else if (modeChar === 'a') mappedPrefix = '&';
			else if (modeChar === 'h') mappedPrefix = '%';

			const status = true;

			const prefixPos = PrefixChars[1].indexOf(mappedPrefix);
			if (prefixPos >= 0) {
				Channel_UpdateUserPrefix(targetNick, channel, status, PrefixChars[0][prefixPos]);
			}
		} else {
			let ii = 4;
		let status = false;
		for (let i = 0; i < data[3].length; i++) {
						if (data[3][i] == "+") status = true;
						else if (data[3][i] == "-") status = false;
				else {
					if (ii < data.length) {
						Channel_UpdateUserPrefix(data[ii], channel, status, data[3][i]);
						ii++;
					}
				}
			}
		}
		writeToLog(`[IRC] MODE: channel=${data[2]} mode="${text}" by ${nick}`);
	});
	Commands.set("NICK", function (nick, data) {
		if (!data || data.length < 3) return;
		let newnick = data[2].substring(1);
		if (nick == nickname) nickname = newnick;
		channelMap.forEach(function (channel, name) {
			if (Channel_RenameUser(nick, newnick, channel)) {
				if (newnick == nickname) {
					writeToScreen("var(--clr-green)", `你现在的新昵称是 ${newnick}`, channel, "*");
				} else {
					writeToScreen("var(--clr-green)", `${nick} 更名为 ${newnick}`, channel, "*");
				}
			}
		});
		writeToLog(`[IRC] NICK change: ${nick} → ${newnick}${nick === nickname ? ' (self)' : ''}`);
	});
	Commands.set("PART", function (nick, data) {
		if (!data || data.length < 3) return;

		let channelName = data[2];
		if (channelName[0] == ":") channelName = channelName.substring(1);

		let channel = findChannel(channelName);

		if (!channel) {
			writeToLog(`[WARN] PART received for unknown channel: "${channelName}"`);
			return;
		}

		const isSelf = data[0].startsWith(":" + nickname + "!") ||
						data[0].toLowerCase().startsWith(":" + nickname.toLowerCase() + "!");

		if (isSelf) {
			Channel_Destroy(channel.name);
			writeToScreen("var(--clr-green)", `你已离开频道 ${channel.name}`, statusChannel, "");
			writeToLog(`[IRC] Self parted channel: ${channelName}`);
		} else {
			if (Channel_RemoveUser(nick, channel)) {
				writeToScreen("var(--clr-green)", `${nick} 离开频道`, channel, "*");
			}
			writeToLog(`[IRC] User parted: ${nick} ← ${channelName}`);
		}
	});
	Commands.set("TOPIC", function (nick, data) {
		if (!data || data.length < 4) return;
		let channel = findChannel(data[2]);
		if (!channel || !channel.topic) return;
		let text = data[3].substring(1);
		for (let i = 4; i < data.length; i++) {
			text += " " + data[i];
		}
		channel.topic.innerHTML = HTML_escape(text || "No topic set");
		writeToScreen("var(--clr-blue)", `${nick} 设置主题为: ${text}`, channel, "*");
		writeToLog(`[IRC] TOPIC changed: channel=${data[2]} new-topic="${text}" by ${nick}`);
	});
	Commands.set("QUIT", function (nick, data) {
		channelMap.forEach(function (channel, name) {
			if (Channel_RemoveUser(nick, channel)) {
				writeToScreen("var(--clr-purple)", `${nick} 退出IRC`, channel, "*");
			}
		});
		writeToLog(`[IRC] User quit: ${nick}`);
	});
	Commands.set("PRIVMSG", function (nick, data) {
		if (!data || data.length < 4) return;
		let target = data[2];
		let text = data[3].substring(1);
		for (let i = 4; i < data.length; i++) {
			text += " " + data[i];
		}
		nick = data[0].substring(1).split("!")[0];

		const isPrivateMessage = !target.startsWith('#') && target.toLowerCase() === nickname.toLowerCase();

		let channel;
		if (isPrivateMessage) {
			channel = findChannel(nick);
			if (!channel) {
				channel = new Tab_Create(nick, `与 ${nick} 的私聊`, false);
				channel.isPrivate = true;
				if (channel.button) {
					channel.button.classList.add('private');
				}
				writeToLog(`[PM] Incoming PM from ${nick} — auto-creating PM tab`);
			}
		} else {
			channel = findChannel(target);
			if (!channel) channel = statusChannel;
		}

		if (text[0] == "\x01") {
			if (text.indexOf("\x01ACTION ") == 0) {
				writeToScreen("var(--clr-red)", `${nick} ${text.substring(8)}`, channel, "*");
			} else {
				writeToScreen("var(--clr-red)", `${nick} ${text}`, channel, "*");
			}
		} else {
			writeToScreen("var(--clr-font)", text, channel, nick);
			if (channel && channel !== activeChannel && channel !== statusChannel) {
				addUnreadBadge(channel);
			}
		}

		if (isPrivateMessage) {
			writeToLog(`[PM] ${nick} → you: ${text}`);
		}
	});
	Commands.set("NOTICE", function (nick, data) {
		if (!data || data.length < 4) return;
		let channel = findChannel(data[2]);
		if (!channel) channel = statusChannel;
		let text = data[3].substring(1);
		for (let i = 4; i < data.length; i++) {
			text += " " + data[i];
		}
		nick = data[0].substring(1).split("!")[0];
		writeToScreen("var(--clr-gold)", `通知 ${nick}: ${text}`, channel, "-");
		writeToLog(`[NOTICE] ${nick}: ${text}`);
	});

	function process(rawData) {
		if (!rawData) return;
		let data = rawData.split(" ");
		if (!data || data.length < 2) {
			return;
		}
		let nick = data[0].substring(1).split("!")[0];
		let command = data[1].toUpperCase();
		let fn = Commands.get(command);
		if (fn) {
			fn(nick, data);
			return;
		}
		if (!isNaN(parseInt(data[1]))) {
			let text = data[1];
			for (let i = 3; i < data.length; i++) {
				text += " " + data[i];
			}
			writeToScreen("var(--clr-gold)", text, statusChannel, "");
			writeToLog(`[SERVER] ${data[1]}: ${text}`);
			return;
		}
		if (data[0] == "PING") {
			let pongResponse = rawData.replace("PING", "PONG");
			writeToScreen("var(--clr-brown)", pongResponse, statusChannel, "");
			doSend(pongResponse);
			writeToLog(`[PING/PONG] ${pongResponse}`);
			return;
		}
		if (data[0] == "ERROR") {
			writeToScreen("var(--clr-font)", rawData, statusChannel, "");
			writeToLog(`[ERROR] ${rawData}`);
			return;
		}

	}

	function startKeepAlive() {
		stopKeepAlive();
		keepAliveTimer = setInterval(() => {
			if (isConnected && websocket && websocket.readyState === WebSocket.OPEN) {
				writeToLog(`[KEEP-ALIVE] Sending PING keepalive | session: ${formatSessionDuration(sessionStartTime)} | sent: ${sentCount} | recv: ${recvCount}`);
				doSend("PING keepalive");
			}
		}, keepAliveInterval);
	}

	function stopKeepAlive() {
		if (keepAliveTimer) {
			clearInterval(keepAliveTimer);
			keepAliveTimer = null;
		}
	}

	// Returns a human-readable duration string from a start Date to now
	function formatSessionDuration(startTime) {
		if (!startTime) return 'N/A';
		const secs = Math.floor((Date.now() - startTime.getTime()) / 1000);
		const h = Math.floor(secs / 3600);
		const m = Math.floor((secs % 3600) / 60);
		const s = secs % 60;
		if (h > 0) return `${h}h ${m}m ${s}s`;
		if (m > 0) return `${m}m ${s}s`;
		return `${s}s`;
	}

	function sendRegistration() {
		doSend("NICK " + nickname);
		doSend("USER websocket * * :WebSocket User");
		writeToLog(`[IRC] Sending registration: NICK=${nickname}, USER=websocket`);
	}

</script>
